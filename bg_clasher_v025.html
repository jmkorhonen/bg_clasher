    const mid = L.latLng((a.lat+b.lat)/2, (a.lng+b.lng)/2);
    L.marker(mid, {
      icon: L.divIcon({
        className: 'move-label ' + unit.side,
        html: `<b>${segLabel}</b> — ${formatDist(a.distanceTo(b))}`,
        iconSize: null, iconAnchor: [0, 0]
      }),
      interactive: false
    }).addTo(LG.tempDraw);
  }

  // Live summary on endpoint
  if (movementDraft.points.length > 1) {
    const total = computePolylineDistance(movementDraft.points);
    const turns = computeTurnsForSegments(unit, movementDraft.points, movementDraft.segmentModes);
    const endpoint = movementDraft.points[movementDraft.points.length - 1];
    L.marker(endpoint, {
      icon: L.divIcon({
        className: 'move-label ' + unit.side,
        html: `<b>${typeDef.name.toUpperCase()} · ${(total/1000).toFixed(2)} km · ${turns.toFixed(1)} turns</b><br>next: <u>${currentDraftMode}</u> · Enter=accept</span>`,
        iconSize: null, iconAnchor: [0, 0]
      }),
      interactive: false
    }).addTo(LG.tempDraw);
  }
}

function setDraftMode(mode) {
  if (!movementDraft) return;
  currentDraftMode = mode;
  const unit = getUnit(movementDraft.unitId);
  const type = getOrderType(movementDraft.orderType || 'move');
  if (unit) updateDraftModeDisplay(unit, type);
  updateMovementDraft();
}

function finishMovementOrder() {
  if (!movementDraft) return;
  const minPoints = movementDraft.kind === 'path' ? 2 : 1;
  if (movementDraft.points.length < minPoints) {
    cancelMovementDraft();
    return;
  }
  const unit = getUnit(movementDraft.unitId);
  if (!unit) { cancelMovementDraft(); return; }

  // Determine sequenceIndex (append to end of this unit's chain)
  const existing = getOrdersForUnit(unit);
  const sequenceIndex = existing.length;

  const order = {
    id: uid(),
    unitId: movementDraft.unitId,
    orderType: movementDraft.orderType || 'move',
    sequenceIndex,
    points: cloneDeep(movementDraft.points),
    segmentModes: cloneDeep(movementDraft.segmentModes || []),
    startTime: null,
    endTime: null,
    duration: movementDraft.kind !== 'path' ? 60 : null, // default 60 min for non-movement
    notes: '',
    turn: state.turnNumber
  };
  state.movementOrders.push(order);
  const s = movementOrderSummary(unit, order);
  const typeName = getOrderType(order.orderType).name;
  let detail;
  if (movementDraft.kind === 'path') {
    detail = `${s.totalKm.toFixed(2)} km, ${s.turns.toFixed(1)} turns`;
  } else if (movementDraft.kind === 'area' && order.points.length >= 2) {
    detail = `area (${order.points.length} vtx)`;
  } else {
    detail = `at ${s.destLat.toFixed(4)}°N ${s.destLng.toFixed(4)}°E`;
  }
  logCommitted(`${typeName} order for ${unit.name}${unit.designation?' '+unit.designation:''} → ${detail}`);
  cancelMovementDraft();
  renderMovementOrders();
  renderUnit(unit); // refresh tooltip with new order info
  setTool('pan');
  if (document.getElementById('panelTitle').textContent === unit.name) {
    renderUnitEditPanel(document.getElementById('panelBody'), unit);
  }
}

function computePolylineDistance(points) {
  let total = 0;
  for (let i = 1; i < points.length; i++) {
    total += L.latLng(points[i-1]).distanceTo(L.latLng(points[i]));
  }
  return total;
}

function computeTurnsForSegments(unit, points, modes) {
  let turns = 0;
  for (let i = 1; i < points.length; i++) {
    const distKm = L.latLng(points[i-1]).distanceTo(L.latLng(points[i])) / 1000;
    const mode = modes[i-1] || 'easy';
    const speed = getMovementSpeed(unit, mode) || 1;
    if (speed > 0) turns += distKm / speed;
  }
  return turns;
}

function polygonAreaM2(points) {
  if (!points || points.length < 3) return 0;
  // Spherical excess approximation — reasonable accuracy for small polygons
  const R = 6378137;
  let area = 0;
  for (let i = 0; i < points.length; i++) {
    const [lat1, lng1] = points[i];
    const [lat2, lng2] = points[(i + 1) % points.length];
    area += (lng2 - lng1) * Math.PI / 180 *
            (2 + Math.sin(lat1 * Math.PI / 180) + Math.sin(lat2 * Math.PI / 180));
  }
  return Math.abs(area * R * R / 2);
}

function formatArea(m2) {
  if (m2 < 1e4) return Math.round(m2) + ' m²';
  if (m2 < 1e6) return (m2 / 1e4).toFixed(1) + ' ha';
  return (m2 / 1e6).toFixed(2) + ' km²';
}

function movementOrderSummary(unit, order) {
  const typeDef = getOrderType(order.orderType || 'move');
  const isPath = typeDef.kind === 'path' && order.points.length >= 2;
  const isArea = typeDef.kind === 'area';
  const totalM = isPath ? computePolylineDistance(order.points) : 0;
  const turns = isPath
    ? computeTurnsForSegments(unit, order.points, order.segmentModes || [])
    : ((order.duration || 0) / state.scenario.turnDurationMinutes);
  const startPt = order.points[0] || unit.latlng;
  const dest = order.points[order.points.length - 1] || startPt;

  // Compute start time
  let startMs;
  if (order.startTime) {
    startMs = new Date(order.startTime).getTime();
  } else if (order.endTime) {
    // Back-calculate from a manually set end time minus duration
    const endMsTmp = new Date(order.endTime).getTime();
    const durMin = isPath
      ? turns * state.scenario.turnDurationMinutes
      : (order.duration || 0);
    startMs = endMsTmp - durMin * 60 * 1000;
  } else {
    // Auto: use previous order's end, or scenario start + current turn
    const prevOrders = getOrdersForUnit(unit).filter(o => (o.sequenceIndex || 0) < (order.sequenceIndex || 0));
    if (prevOrders.length > 0) {
      const prev = prevOrders[prevOrders.length - 1];
      const prevSummary = movementOrderSummary(unit, prev);
      startMs = new Date(prevSummary.endIso).getTime();
    } else {
      const scenStart = new Date(state.scenario.startDateTime);
      startMs = isNaN(scenStart.getTime()) ? Date.now() : scenStart.getTime() + order.turn * state.scenario.turnDurationMinutes * 60 * 1000;
    }
  }
  // End time
  let endMs;
  if (order.endTime) {
    endMs = new Date(order.endTime).getTime();
  } else {
    const durMin = isPath
      ? turns * state.scenario.turnDurationMinutes
      : (order.duration || 0);
    endMs = startMs + durMin * 60 * 1000;
  }
  const startIso = new Date(startMs).toISOString();
  const endIso = new Date(endMs).toISOString();
  const etaText = endIso.replace('T',' ').slice(0,16) + 'Z';
  const startText = startIso.replace('T',' ').slice(0,16) + 'Z';

  return {
    totalKm: totalM/1000, totalM, turns,
    startLat: startPt[0], startLng: startPt[1],
    destLat: dest[0], destLng: dest[1],
    startIso, endIso, etaText, startText,
    durationMin: (endMs - startMs) / 60000,
    isPath, isArea
  };
}

// Offset a polyline by `offsetM` meters (positive = left, negative = right of travel direction)
function offsetPolyline(points, offsetM) {
  if (points.length < 2) return [];
  const out = [];
  for (let i = 0; i < points.length; i++) {
    const [lat, lng] = points[i];
    const cosLat = Math.cos(lat * Math.PI / 180);
    let px = 0, py = 0, count = 0;

    if (i > 0) {
      const [lat1, lng1] = points[i-1];
      const dx = (lng - lng1) * cosLat * 111320;
      const dy = (lat - lat1) * 111320;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 0) { px += -dy/len; py += dx/len; count++; }
    }
    if (i < points.length - 1) {
      const [lat2, lng2] = points[i+1];
      const dx = (lng2 - lng) * cosLat * 111320;
      const dy = (lat2 - lat) * 111320;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 0) { px += -dy/len; py += dx/len; count++; }
    }
    if (count > 0) { px /= count; py /= count; }

    const offLat = py * offsetM / 111320;
    const offLng = cosLat > 0.01 ? px * offsetM / (cosLat * 111320) : 0;
    out.push([lat + offLat, lng + offLng]);
  }
  return out;
}

function toggleOrderTooltips() {
  const modes = ['full', 'short', 'off'];
  const cur = state.orderLabelMode || 'full';
  state.orderLabelMode = modes[(modes.indexOf(cur) + 1) % modes.length];
  state.showOrderTooltips = state.orderLabelMode !== 'off';
  updateTooltipButtonLabel();
  renderMovementOrders();
  renderAllMarkers();
}

function updateTooltipButtonLabel() {
  const btn = document.getElementById('toggleTooltipsBtn');
  if (!btn) return;
  const icons = { full: '📋 Full', short: '📋 Short', off: '📋 Off' };
  btn.textContent = icons[state.orderLabelMode || 'full'];
  btn.classList.toggle('active', state.orderLabelMode !== 'off');
}

function renderMovementOrders() {
  LG.movement.clearLayers();
  const role = state.viewRole;

  state.movementOrders.forEach(o => {
    const unit = getUnit(o.unitId);
    if (!unit) return;
    // Visibility: own side + umpire always; opponents can't see orders
    if (role !== 'umpire' && unit.side !== role) return;
    // Respect the orders layer visibility toggle for this side
    const ordLayer = getOrdersLayer(unit.side);
    if (ordLayer && !ordLayer.visible) return;

    const color = unit.side === 'bluefor' ? '#2a6bc4' : '#a83030';
    const typeDef = getOrderType(o.orderType || 'move');
    const isPath = typeDef.kind === 'path' && o.points.length >= 2;
    const isArea = typeDef.kind === 'area';
    const handleClick = () => { if (currentTool === 'edit') openMovementOrderEditor(o); };

    // Area orders: polygon or point
    if (isArea && o.points.length > 0) {
      const s = movementOrderSummary(unit, o);
      let centroid;
      if (o.points.length === 1) {
        const pt = o.points[0];
        centroid = pt;
        const marker = L.circleMarker(pt, { radius: 9, color, fillColor: color, fillOpacity: 0.25, weight: 2 });
        marker._orderId = o.id;
        marker.on('click', handleClick);
        LG.movement.addLayer(marker);
      } else {
        const poly = L.polygon(o.points, { color, weight: 2, fillOpacity: 0.18, opacity: 0.9 });
        poly._orderId = o.id;
        poly.on('click', handleClick);
        LG.movement.addLayer(poly);
        centroid = [
          o.points.reduce((s,p)=>s+p[0],0)/o.points.length,
          o.points.reduce((s,p)=>s+p[1],0)/o.points.length
        ];
      }

      // Dashed approach line: previous endpoint (or unit position) → area centroid
      const prevOrders = getOrdersForUnit(unit).filter(x => (x.sequenceIndex || 0) < (o.sequenceIndex || 0));
      let fromPt;
      if (prevOrders.length > 0) {
        const prev = prevOrders[prevOrders.length - 1];
        fromPt = prev.points[prev.points.length - 1];
      } else {
        fromPt = unit.latlng;
      }
      if (fromPt) {
        const approach = L.polyline([fromPt, centroid], {
          color, weight: 1, dashArray: '5,5', opacity: 0.7, interactive: false
        });
        approach._orderId = o.id;
        LG.movement.addLayer(approach);
      }
      const mode = state.orderLabelMode || 'full';
      if (mode === 'full') {
        // Only the detailed tooltip in full mode
        const tipMarker = L.marker(centroid, {
          icon: L.divIcon({
            className: 'move-label ' + unit.side,
            html: `<b>${typeDef.name.toUpperCase()}</b> · ${esc(unit.name)}${unit.designation?' '+esc(unit.designation):''}<br>${s.startText} → ${s.etaText}<br>(${s.durationMin.toFixed(0)} min${o.points.length >= 3 ? ' · ' + formatArea(polygonAreaM2(o.points)) : ''})${o.notes ? '<br><i>'+esc(o.notes)+'</i>' : ''}`,
            iconSize: null, iconAnchor: [-10, 10]
          }),
          interactive: false
        });
        tipMarker._orderId = o.id;
        LG.movement.addLayer(tipMarker);
      } else if (mode === 'short') {
        const compactMarker = L.marker(centroid, {
          icon: L.divIcon({
            className: 'move-label ' + unit.side,
            html: `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`,
            iconSize: null, iconAnchor: [-10, 10]
          }),
          interactive: false
        });
        compactMarker._orderId = o.id;
        LG.movement.addLayer(compactMarker);
      }
      // 'off' = no label at all
      return;
    }

    if (!isPath) {
      // Static order (legacy) — place a verb-labelled circle marker
      const pt = o.points[0];
      const marker = L.circleMarker(pt, { radius: 9, color, fillColor: color, fillOpacity: 0.25, weight: 2 });
      marker._orderId = o.id;
      marker.on('click', handleClick);
      LG.movement.addLayer(marker);
      const s = movementOrderSummary(unit, o);
      const mode = state.orderLabelMode || 'full';
      if (mode !== 'off') {
        const labelHtml = mode === 'full'
          ? `<b>${typeDef.name.toUpperCase()}</b>${unit.designation?' · '+esc(unit.designation):''}<br>${s.startText} → ${s.etaText}<br>(${s.durationMin.toFixed(0)} min)${o.notes ? '<br><i>'+esc(o.notes)+'</i>' : ''}`
          : `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`;
        const labelMarker = L.marker(pt, {
          icon: L.divIcon({ className: 'move-label ' + unit.side, html: labelHtml, iconSize: null, iconAnchor: [-10, 10] }),
          interactive: false
        });
        labelMarker._orderId = o.id;
        LG.movement.addLayer(labelMarker);
      }
      return;
    }

    // Path order
    const n = o.points.length;
    const [latA, lngA] = o.points[n-2];
    const [latB, lngB] = o.points[n-1];
    const cosLat = Math.cos(latB * Math.PI / 180);
    const dx = (lngB - lngA) * cosLat * 111320;
    const dy = (latB - latA) * 111320;
    const lastSegLen = Math.sqrt(dx*dx + dy*dy);
    const ux = lastSegLen > 0 ? dx/lastSegLen : 0;
    const uy = lastSegLen > 0 ? dy/lastSegLen : 0;

    // Order-type visual style
    const ostyle = getOrderStyle(o.orderType || 'move');

    // Arrowhead geometry (filled arrows are bigger)
    const hasArrowhead = ostyle.arrowhead === 'bracket' || ostyle.arrowhead === 'filled';
    const bracketLen = ostyle.arrowhead === 'filled' ? 380 : 280;
    const halfAngle = 28 * Math.PI / 180;
    const axialBack = bracketLen * Math.cos(halfAngle);
    const sideSpread = bracketLen * Math.sin(halfAngle);
    const trimmedPath = [...o.points];
    if (hasArrowhead) {
      const trimBack = Math.min(axialBack * 0.85, lastSegLen * 0.9);
      const trimLat = latB - uy * trimBack / 111320;
      const trimLng = lngB - ux * trimBack / (cosLat * 111320);
      trimmedPath[trimmedPath.length - 1] = [trimLat, trimLng];
    }

    // Hook radius (also used to offset the start of the line so it's tangent to the hook circle)
    const hookR = 90;

    // If this order has a hook, shift the line's starting point perpendicular to travel
    // (to the LEFT-of-travel side) by hookR, so the line runs tangent to a circle
    // centered on the unit with radius hookR.
    if (ostyle.hook && o.points.length >= 2) {
      const sp = o.points[0];
      const cosLatH = Math.cos(sp[0] * Math.PI / 180);
      const [latNx, lngNx] = o.points[1];
      const dxH = (lngNx - sp[1]) * cosLatH * 111320;
      const dyH = (latNx - sp[0]) * 111320;
      const lenH = Math.sqrt(dxH*dxH + dyH*dyH) || 1;
      const uxH = dxH / lenH, uyH = dyH / lenH;
      // Left-of-travel perpendicular in (lng-metres, lat-metres): (-uy, ux)
      trimmedPath[0] = [
        sp[0] + uxH * hookR / 111320,
        sp[1] + (-uyH) * hookR / (cosLatH * 111320)
      ];
    }

    const lineStyle = {
      color, weight: ostyle.weight, opacity: 0.9,
      lineCap: 'square', lineJoin: 'miter',
      dashArray: ostyle.dashArray || null
    };

    if (ostyle.singleLine) {
      // Single centered line (no parallel offset pair)
      const poly = L.polyline(trimmedPath, lineStyle);
      poly._orderId = o.id;
      poly.on('click', handleClick);
      LG.movement.addLayer(poly);
    } else {
      const offsetM = 55;
      const leftPath = offsetPolyline(trimmedPath, offsetM);
      const rightPath = offsetPolyline(trimmedPath, -offsetM);
      const polyL = L.polyline(leftPath, lineStyle);
      const polyR = L.polyline(rightPath, lineStyle);
      polyL._orderId = o.id; polyR._orderId = o.id;
      polyL.on('click', handleClick);
      polyR.on('click', handleClick);
      LG.movement.addLayer(polyL);
      LG.movement.addLayer(polyR);
    }

    // Hook for Withdraw orders: 270° arc centered on the unit, tangent to the line (APP-6 withdrawal)
    if (ostyle.hook && o.points.length >= 2) {
      const startPt = o.points[0];
      const cosLatS = Math.cos(startPt[0] * Math.PI / 180);
      const [latA2, lngA2] = o.points[1];
      const dxS = (lngA2 - startPt[1]) * cosLatS * 111320;
      const dyS = (latA2 - startPt[0]) * 111320;
      const lenS = Math.sqrt(dxS*dxS + dyS*dyS) || 1;
      const uxS = dxS/lenS, uyS = dyS/lenS;

      // Tangent point sits on the LEFT-of-travel perpendicular from the unit, at radius hookR.
      // Its angle from the unit centre (in standard math convention, angle 0 = +lng, π/2 = +lat):
      //   atan2(uxS, -uyS)  — derived from perp vector (-uy, ux) in (lng, lat).
      const theta0 = Math.atan2(uxS, -uyS);
      // Sweep 270° counter-clockwise so the arc wraps around the right-of-travel side,
      // leaving a 90° opening on the same side as the trailing line.
      const sweep = 1.5 * Math.PI;
      const steps = 48;
      const hookPts = [];
      for (let i = 0; i <= steps; i++) {
        const th = theta0 + sweep * i / steps;
        hookPts.push([
          startPt[0] + Math.sin(th) * hookR / 111320,
          startPt[1] + Math.cos(th) * hookR / (cosLatS * 111320)
        ]);
      }
      const hook = L.polyline(hookPts, {
        color, weight: ostyle.weight, opacity: 0.9,
        lineCap: 'round', lineJoin: 'round'
      });
      hook._orderId = o.id;
      hook.on('click', handleClick);
      LG.movement.addLayer(hook);
    }

    // Letter label (e.g. "W" for Withdraw): placed at the midpoint of the trimmed line,
    // coloured to match the arrow, no background.
    if (ostyle.letter) {
      let total = 0;
      const segLens = [];
      for (let i = 0; i < trimmedPath.length - 1; i++) {
        const [la, lo] = trimmedPath[i];
        const [lb, lob] = trimmedPath[i+1];
        const cL = Math.cos(la * Math.PI / 180);
        const sx = (lob - lo) * cL * 111320;
        const sy = (lb - la) * 111320;
        const sl = Math.sqrt(sx*sx + sy*sy);
        segLens.push(sl);
        total += sl;
      }
      const half = total / 2;
      let acc = 0, mLat = trimmedPath[0][0], mLng = trimmedPath[0][1];
      for (let i = 0; i < segLens.length; i++) {
        if (acc + segLens[i] >= half) {
          const t = segLens[i] > 0 ? (half - acc) / segLens[i] : 0;
          mLat = trimmedPath[i][0] + (trimmedPath[i+1][0] - trimmedPath[i][0]) * t;
          mLng = trimmedPath[i][1] + (trimmedPath[i+1][1] - trimmedPath[i][1]) * t;
          break;
        }
        acc += segLens[i];
      }
      const letterHtml = `<div style="color:${color};font-weight:700;font-size:20px;font-family:Arial,sans-serif;line-height:1;white-space:nowrap;">${esc(ostyle.letter)}</div>`;
      const letterMarker = L.marker([mLat, mLng], {
        icon: L.divIcon({ className: '', html: letterHtml, iconSize: [18, 20], iconAnchor: [9, 10] }),
        interactive: false
      });
      letterMarker._orderId = o.id;
      LG.movement.addLayer(letterMarker);
    }

    // Gap mark for Breach orders: small cross on the midpoint
    if (ostyle.gapMark) {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      const gapMarker = L.circleMarker(midPt, { radius: 7, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2 });
      gapMarker._orderId = o.id;
      LG.movement.addLayer(gapMarker);
    }

    // Zigzag mark for Disrupt
    if (ostyle.zigzag) {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      L.marker(midPt, {
        icon: L.divIcon({ className: 'move-label ' + unit.side, html: '⚡', iconSize: null, iconAnchor: [-4, -4] }),
        interactive: false
      }).addTo(LG.movement);
    }

    // Disrupt fork: at midpoint, perpendicular branches lead to two offset lines with bracket arrowheads, staggered echelon-left
    if (ostyle.disruptFork && trimmedPath.length >= 2) {
      // ── Find midpoint along the trimmed path ──
      let fTotal = 0;
      const fSegLens = [];
      for (let fi = 0; fi < trimmedPath.length - 1; fi++) {
        const [fla, flo] = trimmedPath[fi];
        const [flb, flob] = trimmedPath[fi + 1];
        const fcL = Math.cos(fla * Math.PI / 180);
        const fsx = (flob - flo) * fcL * 111320;
        const fsy = (flb - fla) * 111320;
        fSegLens.push(Math.sqrt(fsx * fsx + fsy * fsy));
        fTotal += fSegLens[fi];
      }
      const fHalf = fTotal / 2;
      let fAcc = 0, fmLat = trimmedPath[0][0], fmLng = trimmedPath[0][1], fMidIdx = 0;
      for (let fi = 0; fi < fSegLens.length; fi++) {
        if (fAcc + fSegLens[fi] >= fHalf) {
          const ft = fSegLens[fi] > 0 ? (fHalf - fAcc) / fSegLens[fi] : 0;
          fmLat = trimmedPath[fi][0] + (trimmedPath[fi + 1][0] - trimmedPath[fi][0]) * ft;
          fmLng = trimmedPath[fi][1] + (trimmedPath[fi + 1][1] - trimmedPath[fi][1]) * ft;
          fMidIdx = fi;
          break;
        }
        fAcc += fSegLens[fi];
      }

      // ── Build second-half path: midpoint → end of trimmedPath ──
      const secHalf = [[fmLat, fmLng]];
      for (let fi = fMidIdx + 1; fi < trimmedPath.length; fi++) {
        secHalf.push([trimmedPath[fi][0], trimmedPath[fi][1]]);
      }

      // ── Offset the second half to create left/right fork paths ──
      const forkOff = 100; // perpendicular offset in metres
      const leftFork = offsetPolyline(secHalf, forkOff);
      const rightFork = offsetPolyline(secHalf, -forkOff);

      // ── Stagger: shorten left fork, extend right fork ──
      const secLen = fTotal - fHalf;
      const stag = Math.min(secLen * 0.12, 150);
      function adjustEnd(path, dist) {
        if (path.length < 2) return path;
        const r = path.map(p => [p[0], p[1]]);
        const pn = r.length;
        const [pa, poa] = r[pn - 2];
        const [pb, pob] = r[pn - 1];
        const pcL = Math.cos(pb * Math.PI / 180);
        const pdx = (pob - poa) * pcL * 111320;
        const pdy = (pb - pa) * 111320;
        const psl = Math.sqrt(pdx * pdx + pdy * pdy);
        if (psl < 0.1) return r;
        r[pn - 1] = [
          pb + (pdy / psl) * dist / 111320,
          pob + (pdx / psl) * dist / (pcL * 111320)
        ];
        return r;
      }
      const leftForkAdj = adjustEnd(leftFork, -stag);
      const rightForkAdj = adjustEnd(rightFork, stag);

      // ── Render each fork: trimmed line + bracket arrowhead ──
      function renderForkLine(forkPath) {
        const fn = forkPath.length;
        if (fn < 2) return;
        const [fEndA_lat, fEndA_lng] = forkPath[fn - 2];
        const [fEndB_lat, fEndB_lng] = forkPath[fn - 1];
        const fcLat = Math.cos(fEndB_lat * Math.PI / 180);
        const fdx = (fEndB_lng - fEndA_lng) * fcLat * 111320;
        const fdy = (fEndB_lat - fEndA_lat) * 111320;
        const fsl = Math.sqrt(fdx * fdx + fdy * fdy);
        if (fsl < 1) return;
        const fux = fdx / fsl, fuy = fdy / fsl;

        // Draw fork line (no trim — line runs all the way to the arrowhead tip)
        const fl = L.polyline(forkPath, lineStyle);
        fl._orderId = o.id;
        fl.on('click', handleClick);
        LG.movement.addLayer(fl);

        // Small bracket arrowhead at line end
        const fBracket = 50;
        const fHalfAng = 28 * Math.PI / 180;
        const fAxial = fBracket * Math.cos(fHalfAng);
        const fSpread = fBracket * Math.sin(fHalfAng);
        const lwLat = fEndB_lat + (-fuy * fAxial + fux * fSpread) / 111320;
        const lwLng = fEndB_lng + (-fux * fAxial + (-fuy) * fSpread) / (fcLat * 111320);
        const rwLat = fEndB_lat + (-fuy * fAxial - fux * fSpread) / 111320;
        const rwLng = fEndB_lng + (-fux * fAxial - (-fuy) * fSpread) / (fcLat * 111320);
        const wSt = { color, weight: Math.max(ostyle.weight, 3), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const wL = L.polyline([[fEndB_lat, fEndB_lng], [lwLat, lwLng]], wSt);
        const wR = L.polyline([[fEndB_lat, fEndB_lng], [rwLat, rwLng]], wSt);
        wL._orderId = o.id; wR._orderId = o.id;
        wL.on('click', handleClick); wR.on('click', handleClick);
        LG.movement.addLayer(wL);
        LG.movement.addLayer(wR);
      }
      renderForkLine(leftForkAdj);
      renderForkLine(rightForkAdj);

      // ── Center arrowhead (same small bracket as forks) ──
      if (lastSegLen > 0) {
        const cBracket = 50;
        const cHalfAng = 28 * Math.PI / 180;
        const cAxial = cBracket * Math.cos(cHalfAng);
        const cSpread = cBracket * Math.sin(cHalfAng);
        const ceLat = trimmedPath[trimmedPath.length - 1][0];
        const ceLng = trimmedPath[trimmedPath.length - 1][1];
        const ccL = Math.cos(ceLat * Math.PI / 180);
        const clwLat = ceLat + (-uy * cAxial + ux * cSpread) / 111320;
        const clwLng = ceLng + (-ux * cAxial + (-uy) * cSpread) / (ccL * 111320);
        const crwLat = ceLat + (-uy * cAxial - ux * cSpread) / 111320;
        const crwLng = ceLng + (-ux * cAxial - (-uy) * cSpread) / (ccL * 111320);
        const cwSt = { color, weight: Math.max(ostyle.weight, 3), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const cwL = L.polyline([[ceLat, ceLng], [clwLat, clwLng]], cwSt);
        const cwR = L.polyline([[ceLat, ceLng], [crwLat, crwLng]], cwSt);
        cwL._orderId = o.id; cwR._orderId = o.id;
        cwL.on('click', handleClick); cwR.on('click', handleClick);
        LG.movement.addLayer(cwL);
        LG.movement.addLayer(cwR);
      }

      // ── Perpendicular connectors: center midpoint → fork starts ──
      const connSt = { color, weight: ostyle.weight, opacity: 0.9, lineCap: 'square' };
      const cL = L.polyline([[fmLat, fmLng], leftFork[0]], connSt);
      const cR = L.polyline([[fmLat, fmLng], rightFork[0]], connSt);
      cL._orderId = o.id; cR._orderId = o.id;
      cL.on('click', handleClick); cR.on('click', handleClick);
      LG.movement.addLayer(cL);
      LG.movement.addLayer(cR);
    }

    // Start bar for Breach: perpendicular line across the unit spanning the corridor width
    if (ostyle.startBar && o.points.length >= 2) {
      const sp = o.points[0];
      const cosLatB = Math.cos(sp[0] * Math.PI / 180);
      const [latNx, lngNx] = o.points[1];
      const dxB = (lngNx - sp[1]) * cosLatB * 111320;
      const dyB = (latNx - sp[0]) * 111320;
      const lenB = Math.sqrt(dxB*dxB + dyB*dyB) || 1;
      const uxB = dxB/lenB, uyB = dyB/lenB;
      const barHalf = 55; // matches offsetM used for the parallel lines
      const bLat1 = sp[0] + uxB * barHalf / 111320;
      const bLng1 = sp[1] + (-uyB) * barHalf / (cosLatB * 111320);
      const bLat2 = sp[0] - uxB * barHalf / 111320;
      const bLng2 = sp[1] - (-uyB) * barHalf / (cosLatB * 111320);
      const bar = L.polyline([[bLat1, bLng1], [bLat2, bLng2]], {
        color, weight: ostyle.weight, opacity: 0.9, lineCap: 'square'
      });
      bar._orderId = o.id;
      bar.on('click', handleClick);
      LG.movement.addLayer(bar);
    }

    // End ticks for Breach: 45° flanges centered on each parallel line's endpoint, angling outward
    if (ostyle.endTicks && lastSegLen > 0 && !ostyle.singleLine) {
      const tickLen = 80; // metres (total length, half each side)
      const halfTick = tickLen / 2;
      const offsetM_local = 55;
      const lp = offsetPolyline(trimmedPath, offsetM_local);
      const rp = offsetPolyline(trimmedPath, -offsetM_local);
      const leftEnd = lp[lp.length - 1];
      const rightEnd = rp[rp.length - 1];
      const norm = Math.SQRT1_2;
      // Left tick direction: 45° angled outward = combine travel with outward-perp (-uy, ux)
      const lxDir = (ux + uy) * norm, lyDir = (uy - ux) * norm;
      // Right tick direction: 45° angled outward = combine travel with outward-perp (uy, -ux)
      const rxDir = (ux - uy) * norm, ryDir = (uy + ux) * norm;
      const cosLatL = Math.cos(leftEnd[0] * Math.PI / 180);
      const cosLatR = Math.cos(rightEnd[0] * Math.PI / 180);
      const leftTickA = [
        leftEnd[0] - lyDir * halfTick / 111320,
        leftEnd[1] - lxDir * halfTick / (cosLatL * 111320)
      ];
      const leftTickB = [
        leftEnd[0] + lyDir * halfTick / 111320,
        leftEnd[1] + lxDir * halfTick / (cosLatL * 111320)
      ];
      const rightTickA = [
        rightEnd[0] - ryDir * halfTick / 111320,
        rightEnd[1] - rxDir * halfTick / (cosLatR * 111320)
      ];
      const rightTickB = [
        rightEnd[0] + ryDir * halfTick / 111320,
        rightEnd[1] + rxDir * halfTick / (cosLatR * 111320)
      ];
      const tickStyle = { color, weight: ostyle.weight, opacity: 0.9, lineCap: 'square' };
      const tL = L.polyline([leftTickA, leftTickB], tickStyle);
      const tR = L.polyline([rightTickA, rightTickB], tickStyle);
      tL._orderId = o.id; tR._orderId = o.id;
      tL.on('click', handleClick); tR.on('click', handleClick);
      LG.movement.addLayer(tL);
      LG.movement.addLayer(tR);
    }

    // Arrowhead — bracket (open) or filled (solid triangle)
    if (lastSegLen > 0 && hasArrowhead) {
      const leftWingLat  = latB + (-uy * axialBack + (ux)  * sideSpread) / 111320;
      const leftWingLng  = lngB + (-ux * axialBack + (-uy) * sideSpread) / (cosLat * 111320);
      const rightWingLat = latB + (-uy * axialBack - (ux)  * sideSpread) / 111320;
      const rightWingLng = lngB + (-ux * axialBack - (-uy) * sideSpread) / (cosLat * 111320);
      if (ostyle.arrowhead === 'filled') {
        const tri = L.polygon([[latB, lngB], [leftWingLat, leftWingLng], [rightWingLat, rightWingLng]], {
          color, fillColor: color, fillOpacity: 0.9, weight: 2, lineJoin: 'miter'
        });
        tri._orderId = o.id;
        tri.on('click', handleClick);
        LG.movement.addLayer(tri);
      } else {
        const wingStyle = { color, weight: Math.max(ostyle.weight, 4), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const wingL = L.polyline([[latB, lngB], [leftWingLat, leftWingLng]],  wingStyle);
        const wingR = L.polyline([[latB, lngB], [rightWingLat, rightWingLng]], wingStyle);
        wingL._orderId = o.id; wingR._orderId = o.id;
        wingL.on('click', handleClick); wingR.on('click', handleClick);
        LG.movement.addLayer(wingL);
        LG.movement.addLayer(wingR);
      }
    }

    // Precompute summary
    const s = movementOrderSummary(unit, o);
    const mode = state.orderLabelMode || 'full';

    if (mode !== 'off') {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      const midHtml = mode === 'full'
        ? `<b>${typeDef.name.toUpperCase()}</b>${unit.designation?' · '+esc(unit.designation):''}<br>${s.totalKm.toFixed(2)} km · ${s.turns.toFixed(1)} t · ${s.durationMin.toFixed(0)} min${o.notes ? '<br><i>'+esc(o.notes).slice(0,40)+(o.notes.length>40?'…':'')+'</i>' : ''}`
        : `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`;
      const verbLabel = L.marker(midPt, {
        icon: L.divIcon({ className: 'move-label ' + unit.side, html: midHtml, iconSize: null, iconAnchor: [-8, -6] }),
        interactive: false
      });
      verbLabel._orderId = o.id;
      LG.movement.addLayer(verbLabel);
    }

    // Endpoint tooltip: full mode only
    if (mode === 'full') {
      const endpoint = o.points[n-1];
      const labelMarker = L.marker(endpoint, {
        icon: L.divIcon({
          className: 'move-label ' + unit.side,
          html: `<b>${esc(unit.name)}${unit.designation?' '+esc(unit.designation):''}</b><br>${s.startText} → ${s.etaText}`,
          iconSize: null, iconAnchor: [-10, 14]
        }),
        interactive: false
      });
      labelMarker._orderId = o.id;
      LG.movement.addLayer(labelMarker);
    }
  });
}

function openMovementOrderEditor(order) {
  const unit = getUnit(order.unitId);
  if (!unit) return;
  const typeDef = getOrderType(order.orderType || 'move');
  const s = movementOrderSummary(unit, order);
  const isPath = order.points.length >= 2;

  const typeOpts = ORDER_TYPES.map(t =>
    `<option value="${t.id}" ${order.orderType===t.id?'selected':''}>${esc(t.name)}</option>`
  ).join('');

  let segHtml = '';
  if (isPath) {
    const mvEntries = getActiveMovement(unit);
    for (let i = 1; i < order.points.length; i++) {
      const mode = order.segmentModes && order.segmentModes[i-1] || (mvEntries.length>1?mvEntries[1].id:mvEntries[0]?.id||'');
      const dist = L.latLng(order.points[i-1]).distanceTo(L.latLng(order.points[i]));
      const opts = mvEntries.map(e => {
        const spd = getMovementSpeed(unit, e.id);
        return `<option value="${e.id}" ${mode===e.id?'selected':''}>${esc(e.abbr||e.name)} (${spd.toFixed(1)} km/t)</option>`;
      }).join('');
      segHtml += `<div class="inline-row">
        <span class="label">Seg ${i} (${formatDist(dist)})</span>
        <select onchange="setMovementSegmentMode('${order.id}',${i-1},this.value)">
          ${opts}
        </select>
      </div>`;
    }
  }

  // Convert ISO to datetime-local format (strip seconds and Z)
  const toLocal = iso => iso ? iso.slice(0,16) : '';
  const startVal = toLocal(order.startTime || s.startIso);
  const endVal = toLocal(order.endTime || s.endIso);

  showModal(`
    <h3>Edit Order — ${esc(unit.name)}</h3>
    <div class="field-group"><label>Order Type</label>
      <select onchange="setOrderType('${order.id}',this.value)">${typeOpts}</select>
      <p style="font-size:10px;color:var(--text-dim);margin-top:3px">${esc(typeDef.desc)}</p>
    </div>
    <div class="field-group row">
      <div><label>Start Time (UTC)</label>
        <input type="datetime-local" value="${startVal}" oninput="setOrderTime('${order.id}','startTime',this.value)"></div>
      <div><label>End Time (UTC)</label>
        <input type="datetime-local" value="${endVal}" oninput="setOrderTime('${order.id}','endTime',this.value)"></div>
    </div>
    <div class="btn-row">
      <button class="small ghost" onclick="clearOrderTime('${order.id}','startTime');this.closest('.modal-overlay').remove();openMovementOrderEditor(state.movementOrders.find(x=>x.id==='${order.id}'))">Auto start</button>
      <button class="small ghost" onclick="clearOrderTime('${order.id}','endTime');this.closest('.modal-overlay').remove();openMovementOrderEditor(state.movementOrders.find(x=>x.id==='${order.id}'))">Auto end</button>
    </div>
    ${!isPath ? `<div class="field-group"><label>Duration (minutes)</label>
      <input type="number" value="${order.duration || 60}" min="1" oninput="setOrderDuration('${order.id}',parseInt(this.value)||0)"></div>` : ''}
    <div class="field-group"><label>Notes</label>

}

function setOrderType(orderId, type) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.orderType = type;
  const typeDef = getOrderType(type);
  // If switching between path/static, warn about geometry but don't auto-convert
  renderMovementOrders();
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) { overlay.remove(); openMovementOrderEditor(o); }
}

function setOrderTime(orderId, field, val) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o[field] = val ? val + ':00Z' : null;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function clearOrderTime(orderId, field) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o[field] = null;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function setOrderDuration(orderId, minutes) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.duration = minutes;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function setOrderNotes(orderId, notes) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.notes = notes;
  renderMovementOrders();
}

function refreshUnitPanelIfOpen(unitId) {
  const unit = getUnit(unitId);
  if (!unit) return;
  renderUnit(unit); // refresh tooltip since orders may affect it
  if (document.getElementById('panelTitle').textContent === unit.name) {
    renderUnitEditPanel(document.getElementById('panelBody'), unit);
  }
}

function setMovementSegmentMode(orderId, segIdx, mode) {
  const order = state.movementOrders.find(o => o.id === orderId);
  if (!order) return;
  order.segmentModes[segIdx] = mode;
  renderMovementOrders();
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) { overlay.remove(); openMovementOrderEditor(order); }
}

function cancelMovementOrder(orderId) {
  const order = state.movementOrders.find(o => o.id === orderId);
  if (order) {
    const unit = getUnit(order.unitId);
    const typeName = getOrderType(order.orderType || 'move').name;
    logCommitted(`${typeName} order cancelled: ${unit ? unit.name : '?'}`);
  }
  const unitId = order ? order.unitId : null;
  state.movementOrders = state.movementOrders.filter(o => o.id !== orderId);
  if (unitId) {
    const remaining = state.movementOrders.filter(o => o.unitId === unitId)
      .sort((a,b) => (a.sequenceIndex||0) - (b.sequenceIndex||0));
    remaining.forEach((o, i) => { o.sequenceIndex = i; });
  }
  renderMovementOrders();
  if (unitId) {
    const u = getUnit(unitId);
    if (u) renderUnit(u); // refresh tooltip
    refreshUnitPanelIfOpen(unitId);
  }
}

  const role = state.viewRole;
  // Determine which sides' OOB the current role can deploy from
  const sides = role === 'umpire' ? ['bluefor', 'opfor'] : [role];
  // Gather undeployed units from accessible OOBs
  const pool = [];
  sides.forEach(side => {
    collectUndeployedUnits(state.oob[side], side, pool, '');

    // No OOB entries — only umpire can place raw template units
    if (role !== 'umpire') {
      alert('No units available in OOB. Add units to your side\'s OOB via the Scenario Builder.');
      return;

    showPlaceUnitFromTemplateModal(latlng);
    return;
  }

  const opts = pool.map(p => `<option value="${p.entry.id}">[${p.side.toUpperCase()}] ${esc(p.pathLabel)}${esc(p.entry.name)}${p.entry.designation?' ('+esc(p.entry.designation)+')':''}</option>`).join('');
  const fromTemplateLink = role === 'umpire'
    ? `<div style="margin-top:8px;font-size:11px"><a href="#" onclick="this.closest('.modal-overlay').remove();showPlaceUnitFromTemplateModal({lat:${latlng.lat},lng:${latlng.lng}});return false">Place from raw template (umpire only)</a></div>`
    : '';

  showModal(`
    <h3>Deploy Unit from OOB</h3>
    <div class="field-group"><label>Available units</label>
      <select id="pu_oob">${opts}</select></div>
    <div class="btn-row">

      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>
    ${fromTemplateLink}`);
}

function collectUndeployedUnits(list, side, pool, pathPrefix) {
  if (!list) return;
  list.forEach(e => {
    if (e.type === 'unit' && !e.deployed) {
      pool.push({ entry: e, side, pathLabel: pathPrefix });
    } else if (e.type === 'formation') {
      const nextPath = pathPrefix + e.name + ' / ';
      collectUndeployedUnits(e.children, side, pool, nextPath);
    }
  });
}

    case 'turns': title.textContent = 'Turn History'; renderTurnsPanel(body); break;

// ── OOB (hierarchical) ────────────────────────────────────────────
function findOOBEntry(id, list) {
  const roots = list || [...state.oob.bluefor, ...state.oob.opfor];
  for (const entry of roots) {
    if (entry.id === id) return entry;
    if (entry.children && entry.children.length) {
      const f = findOOBEntry(id, entry.children);
      if (f) return f;
    }
  }
  return null;
}

function findOOBParent(entryId, side) {
  const roots = state.oob[side];
  function search(list) {
    for (const e of list) {
      if (e.children) {
        if (e.children.find(c => c.id === entryId)) return e;
        const p = search(e.children);
        if (p) return p;
      }
    }
    return null;
  }
  return search(roots);
}

function removeOOBEntry(id, side) {
  function remove(list) {
    const idx = list.findIndex(e => e.id === id);
    if (idx >= 0) { list.splice(idx, 1); return true; }
    for (const e of list) {
      if (e.children && remove(e.children)) return true;
    }
    return false;
  }
  remove(state.oob[side]);
}

function addOOBEntry(side, parentId, entry) {
  entry.id = entry.id || uid();
  entry.side = side;
  entry.children = entry.children || [];
  if (parentId) {
    const parent = findOOBEntry(parentId);
    if (parent) { parent.children.push(entry); return entry; }
  }
  state.oob[side].push(entry);
  return entry;
}

function renderOOB(c, side) {
  const roots = state.oob[side];
  let html = `<div class="section-head">OOB — ${side.toUpperCase()}</div>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Define units and formations. During play, each side can only deploy units from its own OOB.</p>
    <div class="btn-row">
      <button class="small" onclick="promptAddOOB('${side}',null,'formation')">+ Formation</button>
      <button class="small" onclick="promptAddOOB('${side}',null,'unit')">+ Unit</button>
    </div>
    <div style="margin-top:10px">${renderOOBList(roots, side, 0)}</div>`;
  c.innerHTML = html;
}

function renderOOBList(list, side, depth) {
  if (!list || list.length === 0) return depth === 0 ? '<p style="font-size:11px;color:var(--text-dim)">Empty.</p>' : '';
  let html = '';
  list.forEach(e => {
    const indent = depth * 16;
    const isFormation = e.type === 'formation';
    const deployed = e.deployed ? '✓' : '';
    const icon = isFormation ? '📁' : '▲';
    const deployedStyle = e.deployed ? 'color:var(--success)' : '';
    html += `<div class="list-item" style="margin-left:${indent}px">
      <span>${icon}</span>
      <span class="name">${esc(e.name)}${e.designation?' ('+esc(e.designation)+')':''}</span>
      ${!isFormation ? `<span class="meta" style="${deployedStyle}">${e.deployed ? 'deployed' : 'pool'}</span>` : ''}
      <div class="actions">
        ${isFormation ? `
          <button class="small" onclick="promptAddOOB('${side}','${e.id}','formation')">+F</button>
          <button class="small" onclick="promptAddOOB('${side}','${e.id}','unit')">+U</button>
        ` : `
          ${!e.deployed ? `<button class="small" onclick="startDeployOOBEntry('${e.id}')">Deploy</button>` : `<button class="small" onclick="withdrawOOBUnit('${e.id}')">Withdraw</button>`}
        `}
        <button class="small" onclick="editOOBEntry('${e.id}')">Edit</button>
        <button class="small danger" onclick="confirmDeleteOOB('${e.id}','${side}')">×</button>
      </div>
    </div>`;
    if (e.children && e.children.length) {
      html += renderOOBList(e.children, side, depth + 1);
    }
  });
  return html;
}

function promptAddOOB(side, parentId, type) {
  if (type === 'formation') {
    const name = prompt('Formation name:', 'Battlegroup Alpha');
    if (!name) return;
    addOOBEntry(side, parentId, { type: 'formation', name });
    renderOOB(document.getElementById('scenContent'), side);
    return;
  }
  // Unit: pick template first
  const opts = state.unitTemplates.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
  showModal(`
    <h3>Add Unit to OOB</h3>
    <div class="field-group"><label>From Template</label>
      <select id="oob_tmpl">${opts}</select></div>
    <div class="field-group"><label>Custom Name (optional)</label>
      <input type="text" id="oob_name"></div>
    <div class="field-group"><label>Designation</label>
      <input type="text" id="oob_desig" placeholder="e.g. 1/49"></div>
    <div class="btn-row">
      <button onclick="confirmAddOOBUnit('${side}','${parentId||''}');this.closest('.modal-overlay').remove()">Add</button>
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>`);
}

function confirmAddOOBUnit(side, parentId) {
  const tid = document.getElementById('oob_tmpl').value;
  const tmpl = state.unitTemplates.find(t => t.id === tid);
  if (!tmpl) return;
  const name = document.getElementById('oob_name').value || tmpl.name;
  const desig = document.getElementById('oob_desig').value;
  const entry = {
    type: 'unit',
    templateId: tmpl.id,
    name,
    designation: desig,
    description: tmpl.description || '',
    states: cloneDeep(tmpl.states || []),
    customSVG: tmpl.customSVG || null,
    notes: '',
    deployed: false,
    unitId: null
  };
  addOOBEntry(side, parentId === '' ? null : parentId, entry);
  renderOOB(document.getElementById('scenContent'), side);
}

function editOOBEntry(id) {
  const entry = findOOBEntry(id);
  if (!entry) return;
  if (entry.type === 'formation') {
    const newName = prompt('Formation name:', entry.name);
    if (newName) { entry.name = newName; renderOOB(document.getElementById('scenContent'), entry.side); }
    return;
  }
  // Unit entry — full editor
  let stateRows = '';
  (entry.states||[]).forEach((s, idx) => {
    stateRows += `<div class="inline-row">
      <input type="text" value="${esc(s.name)}" placeholder="state name" oninput="findOOBEntry('${id}').states[${idx}].name=this.value">
      <input type="text" value="${esc(s.customSVG||'')}" placeholder="optional SVG overlay" style="flex:2;font-family:var(--mono);font-size:10px" oninput="findOOBEntry('${id}').states[${idx}].customSVG=this.value||null">
      <button class="small danger" onclick="findOOBEntry('${id}').states.splice(${idx},1);editOOBEntry('${id}')">×</button>
    </div>`;
  });
  showModal(`
    <h3>Edit OOB Unit — ${esc(entry.name)}</h3>
    <div class="field-group"><label>Name</label>
      <input type="text" value="${esc(entry.name)}" oninput="findOOBEntry('${id}').name=this.value"></div>
    <div class="field-group"><label>Designation</label>
      <input type="text" value="${esc(entry.designation||'')}" oninput="findOOBEntry('${id}').designation=this.value"></div>
    <div class="field-group"><label>Description</label>
      <input type="text" value="${esc(entry.description||'')}" oninput="findOOBEntry('${id}').description=this.value"></div>
    <p style="font-size:10px;color:var(--text-dim);margin:6px 0">Stats, movement, and range rings are defined per-state in the template and editable on the deployed unit.</p>
    <div class="section-head">States (name + optional SVG overlay)</div>
    ${stateRows}
    <button class="small" onclick="if(!findOOBEntry('${id}').states)findOOBEntry('${id}').states=[];findOOBEntry('${id}').states.push({name:'State',customSVG:null});editOOBEntry('${id}')">+ Add</button>
    <div class="section-head">Custom Unit SVG (overrides icon)</div>
    <textarea style="min-height:60px;font-family:var(--mono);font-size:10px" oninput="findOOBEntry('${id}').customSVG=this.value||null">${esc(entry.customSVG||'')}</textarea>
    <div class="section-head">Notes</div>
    <textarea oninput="findOOBEntry('${id}').notes=this.value">${esc(entry.notes||'')}</textarea>
    <div class="btn-row">
      <button onclick="this.closest('.modal-overlay').remove();renderOOB(document.getElementById('scenContent'),'${entry.side}')">Close</button>
    </div>`);
}

function confirmDeleteOOB(id, side) {
  const entry = findOOBEntry(id);
  if (!entry) return;
  const childCount = entry.children ? entry.children.length : 0;
  if (!confirm(`Delete "${entry.name}"${childCount>0?' and '+childCount+' children':''}?`)) return;
  if (entry.deployed && entry.unitId) {
    // also remove deployed unit
    withdrawUnit(entry.unitId);
  }
  removeOOBEntry(id, side);
  renderOOB(document.getElementById('scenContent'), side);
}

let deploymentPending = null; // {entryId}
function startDeployOOBEntry(entryId) {
  deploymentPending = { entryId };
  setTool('unit');
  document.getElementById('modeDisplay').textContent = `Click map to deploy OOB unit (panel stays open)`;
  // Panel stays open so user can deploy multiple units in succession
}

function withdrawOOBUnit(entryId) {
  const entry = findOOBEntry(entryId);
  if (!entry || !entry.deployed || !entry.unitId) return;
  if (!confirm(`Withdraw ${entry.name} from the map? (Entry remains in OOB, ready to redeploy.)`)) return;
  withdrawUnit(entry.unitId);
  renderOOB(document.getElementById('scenContent'), entry.side);
}

function deployOOBEntry(entryId, latlng) {
  const entry = findOOBEntry(entryId);
  if (!entry || entry.type !== 'unit') return null;
  const tmpl = state.unitTemplates.find(t => t.id === entry.templateId);
  if (!tmpl) { alert('Template not found'); return null; }
  const unit = createUnitFromTemplate(tmpl, latlng, entry.side, {
    oobEntryId: entry.id,
    name: entry.name,
    designation: entry.designation,
    description: entry.description,
    states: cloneDeep(entry.states),
    notes: entry.notes || '',
    customSVG: entry.customSVG
  });
  entry.deployed = true;
  entry.unitId = unit.id;
  logCommitted(`Unit deployed: ${unit.name}${unit.designation?' '+unit.designation:''} (${entry.side})`);
  return unit;
}

}

let _tmplEditStateIdx = 0;
function editUnitTemplate(id, stateIdx) {
  const t = state.unitTemplates.find(x => x.id === id);
  if (!t) return;
  if (!t.states || t.states.length === 0) t.states = [makeState('Combat Ready', 'Ready')];
  if (t.notes == null) t.notes = '';
  if (stateIdx != null) _tmplEditStateIdx = stateIdx;
  if (_tmplEditStateIdx >= t.states.length) _tmplEditStateIdx = 0;
  const tp = `state.unitTemplates.find(x=>x.id==='${id}')`;
  const c = document.getElementById('scenContent');

  const stateOpts = t.states.map((s, i) =>
    `<option value="${i}" ${i===_tmplEditStateIdx?'selected':''}>${esc(s.name)} (${esc(s.abbr||'')})</option>`
  ).join('');
  const st = t.states[_tmplEditStateIdx];
  const si = _tmplEditStateIdx;
  const sp = `${tp}.states[${si}]`;

  let html = `
    <button class="small ghost" onclick="switchScenTab('units')">← Back</button>
    <h3 style="margin:10px 0;color:var(--accent)">Edit Unit Template</h3>
    <div class="field-group"><label>Name</label>
      <input type="text" value="${esc(t.name)}" oninput="updateTemplateField('${id}','name',this.value)"></div>
    <div class="field-group row">
      <div><label>Type</label>
        <select oninput="updateTemplateField('${id}','type',this.value);editUnitTemplate('${id}')">
          ${ALL_UNIT_TYPES.map(k =>
            `<option value="${k.id}" ${t.type===k.id?'selected':''}>${esc(k.name)}</option>`).join('')}
        </select></div>
      <div><label>Echelon</label>
        <select oninput="updateTemplateField('${id}','echelon',this.value);editUnitTemplate('${id}')">
          ${['none','squad','section','platoon','company','battalion','regiment','brigade'].map(k =>
            `<option value="${k}" ${(t.echelon||'platoon')===k?'selected':''}>${k}</option>`).join('')}
        </select></div>
    </div>
    <div class="field-group"><label>Icon Preview</label>
      <div class="inline-row" id="tmplIconPreview" style="gap:12px;align-items:center;min-height:40px">
        <span style="font-size:10px;color:var(--text-dim)">Loading...</span>
      </div>
    </div>
    <div class="field-group"><label>Brief Description</label>
      <input type="text" value="${esc(t.description||'')}" oninput="updateTemplateField('${id}','description',this.value)"></div>

    <div class="section-head">States</div>
    <div class="inline-row" style="margin-bottom:6px">
      <select style="flex:1;font-weight:700" onchange="_tmplEditStateIdx=parseInt(this.value);editUnitTemplate('${id}')">${stateOpts}</select>
      <button class="small" onclick="${tp}.states.push(makeState('New State','New'));editUnitTemplate('${id}',${t.states.length})">+ Add</button>
    </div>`;

  // ── Editing selected state ──
  if (st) {
    html += `<div style="background:var(--bg-alt);padding:8px;border-radius:6px;margin-bottom:8px">
      <div class="inline-row">
        <input type="text" value="${esc(st.name)}" placeholder="State name" oninput="${sp}.name=this.value" style="flex:2">
        <input type="text" value="${esc(st.abbr||'')}" placeholder="Abbr" oninput="${sp}.abbr=this.value" style="width:55px">
        ${t.states.length > 1 ? `<button class="small danger" onclick="${tp}.states.splice(${si},1);editUnitTemplate('${id}',0)">× Del</button>` : ''}
      </div>
      <div class="field-group" style="margin-top:4px"><label>Custom SVG (this state)</label>
        <textarea style="min-height:40px;font-family:var(--mono);font-size:10px" oninput="${sp}.customSVG=this.value||null">${esc(st.customSVG||'')}</textarea>
      </div>
    </div>`;

    // Stats
    html += `<div class="section-head">Stats — ${esc(st.abbr||st.name)}</div>`;
    (st.stats||[]).forEach((s, idx) => {
      html += `<div style="background:var(--bg-alt);padding:4px;border-radius:3px;margin-bottom:2px;font-size:11px">
        <div class="inline-row">
          <input type="text" value="${esc(s.name)}" placeholder="Name" oninput="${sp}.stats[${idx}].name=this.value" style="flex:2">
          <input type="text" value="${esc(s.abbr||'')}" placeholder="Abbr" oninput="${sp}.stats[${idx}].abbr=this.value" style="width:45px">
          <input type="text" value="${esc(String(s.value||''))}" placeholder="Value" oninput="${sp}.stats[${idx}].value=this.value" style="width:50px">
          <button class="small danger" onclick="${sp}.stats.splice(${idx},1);editUnitTemplate('${id}')">×</button>
        </div>
        <div class="inline-row" style="margin-top:1px">
          <input type="text" value="${esc(s.notes||'')}" placeholder="Notes" oninput="${sp}.stats[${idx}].notes=this.value" style="flex:1;font-size:10px;color:var(--text-dim)">
        </div>
      </div>`;
    });
    html += `<button class="small" onclick="${sp}.stats.push({id:uid(),name:'',abbr:'',value:'',notes:'',showTooltip:true,showOpponent:false});editUnitTemplate('${id}')">+ Add Stat</button>`;

    // Movement
    html += `<div class="section-head">Movement (km/h) — ${esc(st.abbr||st.name)}</div>`;
    (st.movement||[]).forEach((m, idx) => {
      html += `<div class="inline-row">
        <input type="text" value="${esc(m.name)}" placeholder="Name" oninput="${sp}.movement[${idx}].name=this.value" style="flex:1;font-size:11px">

        <button class="small danger" onclick="${sp}.movement.splice(${idx},1);editUnitTemplate('${id}')">×</button>
      </div>`;
    });
    html += `<button class="small" onclick="${sp}.movement.push({id:uid(),name:'',abbr:'',value:0,notes:'',showTooltip:false,showOpponent:false});editUnitTemplate('${id}')">+ Add Movement Rate</button>`;

    // Range Rings
    html += `<div class="section-head">Range Rings — ${esc(st.abbr||st.name)}</div>`;
    (st.rangeRings||[]).forEach((r, idx) => {
      html += `<div class="inline-row">
        <input type="text" value="${esc(r.name)}" placeholder="Name" oninput="${sp}.rangeRings[${idx}].name=this.value" style="flex:1;font-size:11px">
        <input type="text" value="${esc(r.abbr||'')}" placeholder="Abbr" oninput="${sp}.rangeRings[${idx}].abbr=this.value" style="width:45px;font-size:11px">
        <input type="number" value="${r.value}" step="100" min="0" oninput="${sp}.rangeRings[${idx}].value=parseFloat(this.value)||0" style="width:60px">
        <input type="color" value="${r.color||'#ff0000'}" oninput="${sp}.rangeRings[${idx}].color=this.value" style="width:30px">
        <button class="small danger" onclick="${sp}.rangeRings.splice(${idx},1);editUnitTemplate('${id}')">×</button>
      </div>`;
    });
    html += `<button class="small" onclick="${sp}.rangeRings.push({id:uid(),name:'',abbr:'',value:0,color:'#e94560',visible:false,notes:'',showTooltip:true,showOpponent:false});editUnitTemplate('${id}')">+ Add Range Ring</button>`;
  }

  html += `
    <div class="section-head">Custom Unit SVG (overrides generated icon)</div>
    <textarea style="min-height:60px;font-family:var(--mono);font-size:10px" oninput="${tp}.customSVG=this.value||null">${esc(t.customSVG||'')}</textarea>
    <div class="section-head">Default Notes</div>
    <textarea style="min-height:40px" oninput="${tp}.notes=this.value">${esc(t.notes||'')}</textarea>`;
  c.innerHTML = html;

  // Async: fetch and display icon previews for both sides
  const previewEl = document.getElementById('tmplIconPreview');
  if (previewEl) {
    Promise.all([
      fetchIcon('bluefor', t.type, t.echelon || 'platoon'),
      fetchIcon('opfor', t.type, t.echelon || 'platoon')
    ]).then(([bluSvg, opfSvg]) => {
      let ph = '';
      if (bluSvg) {
        const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(bluSvg);
        ph += `<div style="text-align:center"><img src="${url}" style="height:40px"><div style="font-size:9px;color:var(--blue-side)">BLUFOR</div></div>`;
      }
      if (opfSvg) {
        const url = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(opfSvg);
        ph += `<div style="text-align:center"><img src="${url}" style="height:40px"><div style="font-size:9px;color:var(--red-side)">OPFOR</div></div>`;
      }
      if (!ph) ph = '<span style="font-size:10px;color:var(--text-dim)">No icon found for this type/echelon</span>';
      previewEl.innerHTML = ph;
    });
  }
}

        <button class="small danger" onclick="if(confirm('Delete?')){state.symbolTemplates=state.symbolTemplates.filter(x=>x.id!=='${t.id}');switchScenTab('symbols')}">×</button>
      </div>`;
    });
  });
  html += `<div class="btn-row" style="margin-top:10px">
    <button onclick="createNewSymbolTemplate()">+ New Symbol</button>
    <button onclick="importSymbolsFromLibrary()" title="Fetch manifest JSON from Scenario → Symbol Library URL">⬇ Import from URL</button>
  </div>
  <p style="font-size:10px;color:var(--text-dim);margin-top:6px">Manifest format: <code>{"symbols":[{"id":"s_xxx","name":"…","category":"…","svg":"&lt;svg…&gt;"}]}</code>. URL is set in Scenario → General.</p>`;
  c.innerHTML = html;
}

async function importSymbolsFromLibrary() {
  const url = state.scenario.symbolLibraryURL;
  if (!url) { alert('Set Symbol Library URL in Scenario → General first.'); return; }
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!data.symbols || !Array.isArray(data.symbols)) throw new Error('Expected {symbols:[…]}');
    let added = 0, replaced = 0;
    data.symbols.forEach(s => {
      if (!s.id || !s.svg || !s.name) return;
      const idx = state.symbolTemplates.findIndex(x => x.id === s.id);
      if (idx >= 0) { state.symbolTemplates[idx] = s; replaced++; }
      else { state.symbolTemplates.push({ id: s.id, name: s.name, category: s.category || 'imported', svg: s.svg }); added++; }
    });
    alert(`Imported symbols: ${added} new, ${replaced} replaced.`);
    switchScenTab('symbols');
  } catch (err) {
    alert('Import failed: ' + err.message + '\n\nNote: browsers restrict cross-origin fetch. If using GitHub, use raw.githubusercontent.com URLs and host a CORS-friendly source, or save locally.');
  }
}

// ── LAYERS PANEL ─────────────────────────────────────────────────
function renderLayersPanel(body) {
  let html = '<div class="section-head">Map Layers</div>';
  state.layers.forEach(l => {
    const visBadgeCls = 'vis-' + l.visibility;
    const isCurrent = l.id === state.currentLayerId;
    html += `<div class="layer-item ${isCurrent?'current':''}">
      <input type="checkbox" ${l.visible?'checked':''} onchange="toggleLayerVisible('${l.id}')">
      <span class="layer-dot" style="background:${l.color}"></span>
      <span class="name">${esc(l.name)}</span>
      <span class="vis-badge ${visBadgeCls}">${l.visibility}</span>
      <button class="small" onclick="setCurrentLayer('${l.id}')" ${isCurrent?'disabled':''}>Use</button>
      <button class="small" onclick="editLayer('${l.id}')">Edit</button>
      <button class="small danger" onclick="confirmDeleteLayer('${l.id}')">×</button>
    </div>`;
  });
  html += `<div class="btn-row"><button onclick="createNewLayer()">+ New Layer</button></div>
    <p style="font-size:11px;color:var(--text-dim);margin-top:10px">Umpire role sees all layers. BLUFOR/OPFOR see only "all" + their own side's layers.</p>`;
  body.innerHTML = html;
}

function toggleLayerVisible(id) {
  const l = getLayer(id);
  if (!l) return;
  l.visible = !l.visible;
  renderAll();
  renderLayersPanel(document.getElementById('panelBody'));
}

function setCurrentLayer(id) {
  state.currentLayerId = id;
  updateCurrentLayerDisplay();
  renderLayersPanel(document.getElementById('panelBody'));
}

function createNewLayer() {
  const l = addLayer('New Layer', 'all', '#ff8800');
  editLayer(l.id);
}

function confirmDeleteLayer(id) {
  const drawingCount = state.drawings.filter(d => d.layerId === id).length;
  if (!confirm(`Delete this layer and ${drawingCount} drawing(s) on it?`)) return;
  deleteLayer(id);
  renderLayersPanel(document.getElementById('panelBody'));
}

function editLayer(id) {
  const l = getLayer(id);
  if (!l) return;
  showModal(`
    <h3>Edit Layer</h3>
    <div class="field-group"><label>Name</label>
      <input type="text" id="el_name" value="${esc(l.name)}"></div>
    <div class="field-group"><label>Visibility</label>
      <select id="el_vis">
        <option value="all" ${l.visibility==='all'?'selected':''}>Visible to all</option>
        <option value="bluefor" ${l.visibility==='bluefor'?'selected':''}>BLUFOR only</option>
        <option value="opfor" ${l.visibility==='opfor'?'selected':''}>OPFOR only</option>
        <option value="umpire" ${l.visibility==='umpire'?'selected':''}>Umpire only</option>
      </select></div>
    <div class="field-group"><label>Default Color</label>
      <input type="color" id="el_color" value="${l.color}"></div>
    <div class="btn-row">
      <button onclick="saveLayerEdit('${id}');this.closest('.modal-overlay').remove()">Save</button>
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>

}

function saveLayerEdit(id) {
  const l = getLayer(id);
  if (!l) return;
  l.name = document.getElementById('el_name').value;
  l.visibility = document.getElementById('el_vis').value;
  l.color = document.getElementById('el_color').value;
  updateCurrentLayerDisplay();
  renderAll();
  if (document.getElementById('panel').classList.contains('open')) renderLayersPanel(document.getElementById('panelBody'));

// ── UNITS PANEL (list) ────────────────────────────────────────────
function renderUnitsPanel(body) {

  let html = '';

function addUnitState(unitId) {
  const u = getUnit(unitId);
  if (!u) return;
  const ns = makeState('New State', 'New');
  u.states.push(ns);
  u.activeStateId = ns.id;
  renderUnit(u);
  renderUnitRangeRings(u);
  renderUnitEditPanel(document.getElementById('panelBody'), u);
}
function removeUnitState(unitId, stateId) {
  const u = getUnit(unitId);
  if (!u || (u.states||[]).length <= 1) return;
  if (!confirm('Delete this state and all its data?')) return;
  u.states = u.states.filter(s => s.id !== stateId);
  if (u.activeStateId === stateId) u.activeStateId = u.states[0].id;
  renderUnit(u);
  renderUnitRangeRings(u);
  renderUnitEditPanel(document.getElementById('panelBody'), u);
}

// Helper: ensure fieldVisibility sub-object exists
function ensureFV(unitId, field) {
  const u = getUnit(unitId);
  if (!u) return {};
  if (!u.fieldVisibility) u.fieldVisibility = {};
  if (!u.fieldVisibility[field]) u.fieldVisibility[field] = { showTooltip: true, showOpponent: false };
  return u.fieldVisibility[field];
}

function setUnitDetection(unitId, side, state_) {
  const unit = getUnit(unitId);
  if (!unit) return;
  const wasDetected = unit.detection[side] === 'detected';
  unit.detection[side] = state_;
  if (state_ === 'detected' && !wasDetected && unit.detectionId[side] == null) {
    state.detectionCounters[side]++;
    unit.detectionId[side] = state.detectionCounters[side];
    logCommitted(`Enemy unit detected (${side} view): assigned #${unit.detectionId[side]}`);
  } else if (state_ === 'suspected' && !wasDetected) {
    logCommitted(`Enemy activity suspected (${side} view)`);
  }
  renderUnit(unit);
}

let recentDiceRolls = [];
function rollDiceNotation(notation, label) {
  const m = notation.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if (!m) { alert('Invalid dice notation. Use format like "2d6" or "1d20+3"'); return; }
  const n = parseInt(m[1]), sides = parseInt(m[2]), mod = m[3] ? parseInt(m[3]) : 0;
  if (n > 100 || sides > 1000) { alert('Too many dice or sides'); return; }
  const rolls = [];
  for (let i = 0; i < n; i++) rolls.push(1 + Math.floor(Math.random() * sides));
  const total = rolls.reduce((a,b) => a+b, 0) + mod;
  const result = { notation, rolls, mod, total, label, time: new Date().toISOString() };
  recentDiceRolls.unshift(result);
  if (recentDiceRolls.length > 20) recentDiceRolls.pop();
  renderDiceResults();
  logAction(`Rolled ${label ? label+': ' : ''}${notation} = ${total} [${rolls.join(',')}${mod ? (mod>0?'+':'')+mod : ''}]`, 'dice');
}

function renderDiceResults() {
  const c = document.getElementById('diceResults');
  if (!c) return;
  c.innerHTML = recentDiceRolls.map(r =>
    `<div class="dice-result">
      <div class="total">${r.total}</div>
      <div class="detail">${r.label ? r.label + ' · ' : ''}${r.notation} = [${r.rolls.join(', ')}]${r.mod ? (r.mod>0?'+':'')+r.mod : ''}</div>
    </div>`
  ).join('');
}

function endTurn() {
  const pending = state.movementOrders.length;
  const msg = `End Turn ${state.turnNumber}?\n\n` +
    `This will snapshot current state (units, markers, notes, orders) and advance to Turn ${state.turnNumber + 1}.\n\n` +
    `Pending movement orders: ${pending}\n\n` +
    `Continue?`;
  if (!confirm(msg)) return;

  // Save notes snapshot per unit for this turn
  state.units.forEach(u => {
    if (!u.notesHistory) u.notesHistory = {};
    u.notesHistory[state.turnNumber] = u.notes || '';
  });

  state.turnHistory.push({
    turnNumber: state.turnNumber,
    timestamp: new Date().toISOString(),
    units: cloneDeep(state.units),
    markers: cloneDeep(state.markers),
    drawings: cloneDeep(state.drawings),
    movementOrders: cloneDeep(state.movementOrders),
    syncMatrix: cloneDeep(state.syncMatrix)
  });
  state.turnNumber++;
  logCommitted(`=== Turn ${state.turnNumber - 1} ended; Turn ${state.turnNumber} begins ===`, 'turn');
  logAction(`=== End Turn ${state.turnNumber - 1} ===`, 'turn');
  document.getElementById('turnDisplay').textContent = `Turn ${state.turnNumber}`;
  updateScenTimeDisplay();
}

function logCommitted(text, type) {
  if (!text) return;
  state.committedLog.push({
    text, type: type || 'commit',
    turn: state.turnNumber,
    time: new Date().toISOString()
  });
  // Also echo to action log for completeness
  logAction(text, type);
}

// ═══════════════════════════════════════════════════════════════════
// SYNC MATRIX
// ═══════════════════════════════════════════════════════════════════
function getSyncRows(side) {
  const roots = state.oob[side] || [];
  const rows = [];
  function walk(list, depth) {
    list.forEach(e => {
      if (e.type === 'formation') {
        rows.push({ id: e.id, name: e.name, depth, kind: 'formation' });
        if (e.children && e.children.length) walk(e.children, depth + 1);
      } else if (depth === 0 && rows.length === 0) {
        // No formation seen yet at top level — allow loose units as fallback rows
        rows.push({ id: e.id, name: e.name + (e.designation?' '+e.designation:''), depth, kind: 'unit' });
      }
    });
  }
  walk(roots, 0);
  // Fallback: if no formations at all, enumerate top-level units
  if (rows.length === 0) {
    roots.forEach(e => {
      if (e.type === 'unit') {
        rows.push({ id: e.id, name: e.name + (e.designation?' '+e.designation:''), depth: 0, kind: 'unit' });
      }
    });
  }
  return rows;
}

function renderSyncPanel(body, side) {
  if (!state.syncMatrix) state.syncMatrix = { bluefor: {}, opfor: {} };
  if (!state.syncMatrix[side]) state.syncMatrix[side] = {};
  const rows = getSyncRows(side);
  const turnLimit = state.scenario.turnLimit != null ? state.scenario.turnLimit : 6;
  const cols = turnLimit === 0 ? Math.min(10, Math.max(6, state.turnNumber + 3)) : Math.min(10, turnLimit);

  const canSeeBoth = state.viewRole === 'umpire' && !state.gameMode;
  let html = '';
  if (canSeeBoth) {
    html += `<div class="tabs" style="margin:-12px -14px 10px -14px">
      <button class="${side==='bluefor'?'active':''}" onclick="openPanel('sync',{side:'bluefor'})">BLUFOR</button>
      <button class="${side==='opfor'?'active':''}" onclick="openPanel('sync',{side:'opfor'})">OPFOR</button>
    </div>`;
  }
  html += `<div class="section-head">${side.toUpperCase()} Sync Matrix — ${cols} turns</div>`;
  if (turnLimit === 0) {
    html += `<p style="font-size:10px;color:var(--text-dim)">Turn limit is off; matrix shows current + 3 turns (max 10 cols).</p>`;
  }
  if (rows.length === 0) {
    html += `<p style="color:var(--text-dim);font-size:12px">No formations or units in ${side.toUpperCase()} OOB. Build the OOB first in the Scenario Builder.</p>`;
    body.innerHTML = html;
    return;
  }
  html += `<div style="overflow:auto;max-width:100%"><table class="sync-matrix"><thead><tr><th></th>`;
  for (let t = 0; t < cols; t++) {
    const isCurrent = t === state.turnNumber;
    html += `<th class="${isCurrent?'current-turn':''}">Turn ${t}${isCurrent?' ●':''}</th>`;
  }
  html += `</tr></thead><tbody>`;
  rows.forEach(r => {
    const pad = r.depth * 10 + 4;
    html += `<tr><td class="row-name ${r.kind}" style="padding-left:${pad}px">${esc(r.name)}</td>`;
    const rowData = state.syncMatrix[side][r.id] || {};
    for (let t = 0; t < cols; t++) {
      const val = rowData[t] || '';
      const cls = t === state.turnNumber ? 'current-turn' : '';
      html += `<td class="${cls}"><textarea data-side="${side}" data-rowid="${esc(r.id)}" data-turn="${t}" oninput="setSyncCell('${side}','${esc(r.id)}',${t},this.value)">${esc(val)}</textarea></td>`;
    }
    html += `</tr>`;
  });
  html += `</tbody></table></div>
    <p style="font-size:10px;color:var(--text-dim);margin-top:8px">Rows auto-generated from ${side.toUpperCase()} OOB formations. Drag panel edge to widen.</p>`;
  body.innerHTML = html;
}

function setSyncCell(side, rowId, turn, value) {
  if (!state.syncMatrix) state.syncMatrix = { bluefor: {}, opfor: {} };
  if (!state.syncMatrix[side]) state.syncMatrix[side] = {};
  if (!state.syncMatrix[side][rowId]) state.syncMatrix[side][rowId] = {};
  state.syncMatrix[side][rowId][turn] = value;
}

// ═══════════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════════
function exportScenario() {
  const data = cloneDeep(state);
  downloadJSON(data, `scenario-${state.scenario.name.replace(/\s+/g,'_')}-T${state.turnNumber}.json`);
}

function importScenario(event) {
  const f = event.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) { alert('Invalid file'); return; }
      Object.assign(state, data);
      document.getElementById('turnDisplay').textContent = `Turn ${state.turnNumber}`;
      if (state.layers.length > 0 && !state.currentLayerId) state.currentLayerId = state.layers[0].id;
      updateCurrentLayerDisplay();
      updateScenTimeDisplay();
      renderAll();
      logAction(`Scenario imported: ${state.scenario.name}`);
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(f);
  event.target.value = '';
}

function exportTemplates() {
  downloadJSON({
    unitTemplates: state.unitTemplates,
    markerTemplates: state.markerTemplates,
    symbolTemplates: state.symbolTemplates,
    diceTemplates: state.diceTemplates
  }, `bg-templates-${new Date().toISOString().slice(0,10)}.json`);
}

function importTemplates(event) {
  const f = event.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('Merge templates (Cancel = Replace)?')) {
        if (data.unitTemplates) state.unitTemplates = data.unitTemplates;
        if (data.markerTemplates) state.markerTemplates = data.markerTemplates;
        if (data.symbolTemplates) state.symbolTemplates = data.symbolTemplates;
        if (data.diceTemplates) state.diceTemplates = data.diceTemplates;
      } else {
        if (data.unitTemplates) state.unitTemplates.push(...data.unitTemplates);
        if (data.markerTemplates) state.markerTemplates.push(...data.markerTemplates);
        if (data.symbolTemplates) state.symbolTemplates.push(...data.symbolTemplates);
        if (data.diceTemplates) state.diceTemplates.push(...data.diceTemplates);
      }
      alert('Templates imported');
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(f);
  event.target.value = '';
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════
// FULL RERENDER
// ═══════════════════════════════════════════════════════════════════
function renderAll() {
  renderDrawings();
  renderAllUnits();
  renderAllMarkers();
  renderMovementOrders();
  // Sync icon scale slider
  const sl = document.getElementById('iconScaleSlider');
  const sv = document.getElementById('iconScaleVal');
  const sc = state.scenario.unitIconScale || 0.3;
  if (sl) {
    sl.min = state.scenario.iconScaleMin || 0.1;
    sl.max = state.scenario.iconScaleMax || 0.5;
    sl.value = sc;
  }
  if (sv) { sv.textContent = Math.round(sc * 100) + '%'; }
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;

  // Enter accepts active drawing / movement / measurement
  if (e.key === 'Enter') {
    if (movementDraft) {
      const minPts = movementDraft.kind === 'path' ? 2 : 1;
      if (movementDraft.points.length >= minPts) {
        finishMovementOrder();
        e.preventDefault();
        return;
      }
    }
    if (drawHandler && drawHandler._finishShape) {
      try { drawHandler._finishShape(); } catch(err) {}
      e.preventDefault();
      return;
    }
    if (currentTool === 'measure' && measurePoints.length >= 2) {
      setTool('pan');
      e.preventDefault();
      return;
    }
  }

  // Number keys for movement mode in draft
  if (movementDraft) {
    if (movementDraft && '12345678'.includes(e.key)) {
      const unit = getUnit(movementDraft.unitId);
      if (unit) {
        const mvEntries = getActiveMovement(unit);
        const idx = parseInt(e.key) - 1;
        if (idx < mvEntries.length) { setDraftMode(mvEntries[idx].id); e.preventDefault(); return; }
      }
    }
  }

  switch (e.key) {
    case 'Escape': setTool('pan'); closePanel(); break;
    case 'u': case 'U': setTool('unit'); break;
    case 'v': case 'V': setTool('move'); break;
    case 'k': case 'K': setTool('marker'); break;
    case 'y': case 'Y': setTool('symbol'); break;
    case 'l': case 'L': setTool('line'); break;
    case 'p': case 'P': setTool('poly'); break;
    case 'c': case 'C': setTool('circle'); break;
    case 't': case 'T': setTool('text'); break;
    case 'm': case 'M': setTool('measure'); break;
    case 'r': case 'R': setTool('ring'); break;
    case 'e': case 'E': setTool('edit'); break;
    case 'z': case 'Z': if (moveUndoUnitId || moveUndoMarkerId) undoLastMove(); break;
  }
});

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
function init() {
  state.unitTemplates = cloneDeep(DEFAULT_UNIT_TEMPLATES);
  state.markerTemplates = cloneDeep(DEFAULT_MARKER_TEMPLATES);
  state.symbolTemplates = cloneDeep(DEFAULT_SYMBOL_TEMPLATES);
  state.diceTemplates = cloneDeep(DEFAULT_DICE_TEMPLATES);
  state.layers = cloneDeep(DEFAULT_LAYERS);
  state.currentLayerId = state.layers[0].id;
  updateCurrentLayerDisplay();
  updateScenTimeDisplay();
  updateTooltipButtonLabel();
  updateScenarioAccess();
  setupPanelResize();
}

function setupPanelResize() {
  const handle = document.getElementById('panelResizeHandle');
  const panel = document.getElementById('panel');
  if (!handle || !panel) return;
  let dragging = false;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.max(280, Math.min(window.innerWidth * 0.8, window.innerWidth - e.clientX));
    panel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.userSelect = '';
    }
  });
}
init();
</script>
