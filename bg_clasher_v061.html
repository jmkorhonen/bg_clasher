function wireModifierEditor(overlay, m, isEdit) {
  const $ = sel => overlay.querySelector(sel);
  function renderLevels() {
    const levelsEl = $('#mod_levels');
    const startEl = $('#mod_startLevel');
    const remEl = $('#mod_removeAt');
    levelsEl.innerHTML = '';
    (m.levels || []).forEach((lvl, idx) => {
      const row = document.createElement('div');
      row.className = 'inline-row';
      row.innerHTML = `
        <span style="font-size:10px;color:var(--text-dim);min-width:20px">#${idx}</span>
        <input type="text" placeholder="Abbr" value="${esc(lvl.abbr||'')}" maxlength="8" data-field="abbr" style="width:60px">
        <input type="text" placeholder="Label (tooltip text)" value="${esc(lvl.label||'')}" data-field="label" style="flex:1">
        <input type="color" value="${lvl.color||'#888'}" data-field="color">
        <button class="small danger" data-del="${idx}" ${m.levels.length<=1?'disabled':''}>×</button>`;
      row.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', e => {
          m.levels[idx][e.target.dataset.field] = e.target.value;
        });
      });
      row.querySelector('[data-del]').addEventListener('click', () => {
        m.levels.splice(idx, 1);
        if (m.startLevel >= m.levels.length) m.startLevel = 0;
        renderLevels();
      });
      levelsEl.appendChild(row);
    });
    // start + removeAt dropdowns
    startEl.innerHTML = m.levels.map((l,i)=>`<option value="${i}" ${m.startLevel===i?'selected':''}>#${i} ${esc(l.abbr||'')}</option>`).join('');
    remEl.innerHTML = `<option value="">(never)</option>` + m.levels.map((l,i)=>`<option value="${i}" ${m.removeAtLevel===i?'selected':''}>#${i} ${esc(l.abbr||'')}</option>`).join('');
  }
  $('#mod_type').addEventListener('change', e => {
    m.type = e.target.value;
    $('#mod_booleanFields').style.display = m.type === 'boolean' ? 'block' : 'none';
    $('#mod_counterFields').style.display = m.type === 'counter' ? 'block' : 'none';
    $('#mod_stepWrap').style.display = m.type === 'counter' ? 'block' : 'none';
    if (m.type === 'counter' && (!m.levels || m.levels.length < 2)) {
      m.levels = [ { abbr: 'A', label: '', color: '#888' }, { abbr: 'B', label: '', color: '#666' } ];
      renderLevels();
    }
  });
  $('#mod_addLevel')?.addEventListener('click', () => {
    m.levels.push({ abbr: '', label: '', color: '#888' });
    renderLevels();
  });
  $('#mod_startLevel')?.addEventListener('change', e => { m.startLevel = parseInt(e.target.value) || 0; });
  $('#mod_removeAt')?.addEventListener('change', e => {
    m.removeAtLevel = e.target.value === '' ? null : parseInt(e.target.value);
  });
  if (m.type === 'counter') renderLevels();
  $('#mod_save').addEventListener('click', () => {
    m.name = $('#mod_name').value.trim();
    m.abbr = $('#mod_abbr').value.trim();
    m.description = $('#mod_desc').value;
    m.stackPriority = parseInt($('#mod_prio').value) || 5;
    m.addPermission = $('#mod_addP').value;
    m.removePermission = $('#mod_remP').value;
    m.visibleToOpponent = $('#mod_visOpp').checked;
    if (m.type === 'boolean') {
      m.color = $('#mod_color').value;
      m.iconSVG = $('#mod_iconSVG').value;
      m.levels = undefined;
      m.startLevel = undefined;
      m.removeAtLevel = undefined;
      m.stepPermission = undefined;
    } else {
      m.stepPermission = $('#mod_stepP').value;
      m.iconSVG = undefined; m.color = undefined;
    }
    if (!m.name) { alert('Name is required.'); return; }
    if (!state.scenario.modifiers) state.scenario.modifiers = [];
    if (isEdit) {
      const idx = state.scenario.modifiers.findIndex(x => x.id === m.id);
      if (idx >= 0) state.scenario.modifiers[idx] = m;
    } else {
      state.scenario.modifiers.push(m);
    }
    overlay.remove();
    renderScenModifiers(document.getElementById('scenContent'));
    renderAllUnits();
  });
}

// Checklist of scenario modifiers for template's availableModifierIds whitelist.
function renderTemplateModifierList(t) {
  const mods = (state.scenario.modifiers || []).slice()
    .sort((a,b) => (a.stackPriority||99) - (b.stackPriority||99));
  if (mods.length === 0) {
    return `<p style="font-size:11px;color:var(--text-dim)">No modifiers in scenario library yet. Add some in the Modifiers tab.</p>`;
  }
  const sel = new Set(t.availableModifierIds || []);
  let html = '<div style="display:flex;flex-direction:column;gap:2px">';
  mods.forEach(m => {
    html += `<label style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:normal;cursor:pointer">
      <input type="checkbox" ${sel.has(m.id)?'checked':''} onchange="toggleTemplateModifier('${t.id}','${m.id}',this.checked)">
      <span><b>${esc(m.name)}</b> <span style="color:var(--text-dim);font-size:10px">(${esc(m.abbr||'')})</span></span>
    </label>`;
  });
  html += '</div>';
  return html;
}

function toggleTemplateModifier(templateId, modifierId, checked) {
  const t = state.unitTemplates.find(x => x.id === templateId);
  if (!t) return;
  if (!t.availableModifierIds) t.availableModifierIds = [];
  if (checked) {
    if (!t.availableModifierIds.includes(modifierId)) t.availableModifierIds.push(modifierId);
  } else {
    t.availableModifierIds = t.availableModifierIds.filter(id => id !== modifierId);
  }
}

// ─── Unit-level modifier ops ─────────────────────────────────────────────
// Which modifiers can be added to this unit by the current viewer? Filters scenario
// library by (1) template's availability whitelist, (2) role's add permission, and
// (3) not already attached (for booleans) or always-available (for counters user could
// re-attach after removal).
function getAvailableModifiersForUnit(unit) {
  const lib = (state.scenario.modifiers || []).slice()
    .sort((a,b) => (a.stackPriority||99) - (b.stackPriority||99));
  const template = state.unitTemplates.find(t => t.id === unit.templateId);
  const whitelist = (template && template.availableModifierIds && template.availableModifierIds.length > 0)
    ? new Set(template.availableModifierIds) : null; // null = all allowed
  const activeIds = new Set((unit.modifiers||[]).map(mi => mi.modifierId));
  return lib.filter(def => {
    if (whitelist && !whitelist.has(def.id)) return false;
    if (!roleHasPermission(def.addPermission || 'owner', unit.side)) return false;
    if (activeIds.has(def.id)) return false; // already attached — no duplicate instances
    return true;
  });
}

function addUnitModifier(unitId, modifierId) {
  const unit = getUnit(unitId);
  const def = findModifierDef(modifierId);
  if (!unit || !def) return;
  if (!unit.modifiers) unit.modifiers = [];
  if (unit.modifiers.find(mi => mi.modifierId === modifierId)) return;
  unit.modifiers.push({
    modifierId,
    level: def.type === 'counter' ? (def.startLevel || 0) : 0,
    addedBy: state.viewRole,
    addedTurn: state.turnNumber,
    notes: ''
  });
  logCommitted(`${unit.name}: +${def.abbr || def.name}${def.type==='counter' ? ' [' + ((def.levels||[])[def.startLevel||0]?.abbr || '?') + ']' : ''}`);
  renderUnit(unit);
  refreshUnitEditPanelIfShowing(unitId);
}

function removeUnitModifier(unitId, modifierId) {
  const unit = getUnit(unitId);
  const def = findModifierDef(modifierId);
  if (!unit || !unit.modifiers) return;
  unit.modifiers = unit.modifiers.filter(mi => mi.modifierId !== modifierId);
  logCommitted(`${unit.name}: -${(def && (def.abbr||def.name)) || modifierId}`);
  renderUnit(unit);
  refreshUnitEditPanelIfShowing(unitId);
}

// Step a counter modifier forward (+1) or backward (-1). Returns silently if unit has no
// such instance, if def isn't a counter, or if the step would go out of range. Applies
// auto-removal when stepping onto removeAtLevel.
function stepUnitModifier(unitId, modifierId, delta) {
  const unit = getUnit(unitId);
  const def = findModifierDef(modifierId);
  if (!unit || !def || def.type !== 'counter') return;
  const inst = (unit.modifiers||[]).find(mi => mi.modifierId === modifierId);
  if (!inst) return;
  const maxIdx = (def.levels||[]).length - 1;
  const next = (inst.level || 0) + delta;
  if (next < 0 || next > maxIdx) return;
  inst.level = next;
  // Auto-remove if we've stepped onto the configured removal level.
  if (def.removeAtLevel != null && next === def.removeAtLevel) {
    logCommitted(`${unit.name}: ${def.abbr||def.name} exhausted → removed`);
    unit.modifiers = unit.modifiers.filter(mi => mi.modifierId !== modifierId);
  } else {
    const lvl = (def.levels||[])[next];
    logCommitted(`${unit.name}: ${def.abbr||def.name} → [${lvl?.abbr||'?'}]`);
  }
  renderUnit(unit);
  refreshUnitEditPanelIfShowing(unitId);
}

// ─── Unit edit panel: Modifiers section ──────────────────────────────────
function renderUnitModifiersSection(unit) {
  const role = state.viewRole;
  const active = (unit.modifiers || []).slice()
    .map(mi => ({ inst: mi, def: findModifierDef(mi.modifierId) }))
    .filter(x => x.def)
    .filter(x => canViewerSeeModifier(unit, x.def))
    .sort((a,b) => (a.def.stackPriority||99) - (b.def.stackPriority||99));
  const available = (role === 'umpire' || role === unit.side || role === 'bluefor' || role === 'opfor')
    ? getAvailableModifiersForUnit(unit) : [];

  let html = `<div class="section-head">Modifiers</div>`;
  if (active.length === 0) {
    html += `<p style="font-size:11px;color:var(--text-dim);margin:0 0 6px 0">None active.</p>`;
  } else {
    active.forEach(({ inst, def }) => {
      const isCounter = def.type === 'counter';
      const lvl = isCounter ? (def.levels||[])[inst.level||0] : null;
      const chipColor = (lvl && lvl.color) || def.color || '#888';
      const chipText = isCounter ? (lvl?.abbr || '?') : (def.abbr || '?');
      const chipTitle = esc((isCounter ? (lvl?.label || '') : (def.description || '')) || def.name);
      const canStep = isCounter && roleHasPermission(def.stepPermission || 'owner', unit.side);
      const canRemove = roleHasPermission(def.removePermission || 'owner', unit.side);
      const maxIdx = isCounter ? ((def.levels||[]).length - 1) : 0;
      const atMin = (inst.level||0) <= 0;
      const atMax = (inst.level||0) >= maxIdx;
      // Step buttons: hidden entirely when the role has no step permission. Shown but
      // disabled when the role CAN step but the counter is at an end of its range.
      const stepButtons = isCounter && canStep
        ? `<button class="small" ${atMin?'disabled':''} onclick="stepUnitModifier('${unit.id}','${def.id}',-1)" title="Step back">◀</button>
           <button class="small" ${atMax?'disabled':''} onclick="stepUnitModifier('${unit.id}','${def.id}',1)" title="Step forward">▶</button>`
        : '';
      // Remove button: hidden entirely when the role has no remove permission.
      const removeButton = canRemove
        ? `<button class="small danger" onclick="removeUnitModifier('${unit.id}','${def.id}')" title="Remove modifier">×</button>`
        : '';
      html += `<div class="inline-row" style="font-size:11px">
        <span title="${chipTitle}" style="background:${chipColor};color:#fff;padding:2px 8px;border-radius:3px;font-weight:700;min-width:40px;text-align:center">${esc(chipText)}</span>
        <span style="flex:1">${esc(def.name)}${isCounter && lvl ? ` <span style="color:var(--text-dim);font-size:10px">— ${esc(lvl.label||'')}</span>` : ''}</span>
        ${stepButtons}
        ${removeButton}
      </div>`;
    });
  }
  if (available.length > 0) {
    const opts = available.map(d => `<option value="${d.id}">${esc(d.name)} (${esc(d.abbr||'')})</option>`).join('');
    html += `<div class="inline-row" style="margin-top:4px">
      <select id="mod_add_${unit.id}" style="flex:1;font-size:11px"><option value="">Add modifier…</option>${opts}</select>
      <button class="small" onclick="(function(){var s=document.getElementById('mod_add_${unit.id}');if(s.value){addUnitModifier('${unit.id}',s.value);s.value='';}})()">Add</button>
    </div>`;
  }
  return html;
}

// ─── Map-side modifier badges ────────────────────────────────────────────
// Produce HTML for modifier chips to stack beside a unit's icon. Empty string if none
// visible. Chips stack vertically, sized relative to the unit icon, with tooltips.
function renderUnitModifierBadges(unit, iconW, iconH, fontSz) {
  if (!unit.modifiers || unit.modifiers.length === 0) return '';
  const badges = unit.modifiers
    .map(mi => ({ inst: mi, def: findModifierDef(mi.modifierId) }))
    .filter(x => x.def && canViewerSeeModifier(unit, x.def))
    .sort((a,b) => (a.def.stackPriority||99) - (b.def.stackPriority||99));
  if (badges.length === 0) return '';
  const badgeFont = Math.max(9, Math.round(fontSz * 0.8));
  const badgeH = Math.round(badgeFont * 1.6);
  let out = '';
  badges.forEach((b, idx) => {
    const { inst, def } = b;
    const isCounter = def.type === 'counter';
    const lvl = isCounter ? (def.levels||[])[inst.level||0] : null;
    const color = (lvl && lvl.color) || def.color || '#555';
    const abbr = isCounter ? (lvl?.abbr || '?') : (def.abbr || '?');
    const title = esc(((lvl && lvl.label) || def.description || def.name) + ` [${def.name}]`);
    const topPx = idx * (badgeH + 2);
    // Use an iconSVG if provided; otherwise colored chip with abbr text.
    if ((isCounter && lvl && lvl.iconSVG) || (!isCounter && def.iconSVG)) {
      const svg = isCounter ? lvl.iconSVG : def.iconSVG;
      const svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      out += `<img src="${svgUrl}" title="${title}" style="position:absolute;left:100%;top:${topPx}px;margin-left:2px;height:${badgeH}px;pointer-events:none">`;
    } else {
      out += `<span title="${title}" style="position:absolute;left:100%;top:${topPx}px;margin-left:2px;background:${color};color:#fff;padding:0 5px;height:${badgeH}px;line-height:${badgeH}px;border-radius:3px;font:bold ${badgeFont}px Arial,sans-serif;white-space:nowrap;pointer-events:none;box-shadow:0 0 0 1px #000">${esc(abbr)}</span>`;
    }
  });
  return out;
}

async function importSymbolsFromLibrary() {
  const url = state.scenario.symbolLibraryURL;
  if (!url) { alert('Set Symbol Library URL in Scenario → General first.'); return; }
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (!data.symbols || !Array.isArray(data.symbols)) throw new Error('Expected {symbols:[…]}');
    let added = 0, replaced = 0;
    data.symbols.forEach(s => {
      if (!s.id || !s.svg || !s.name) return;
      const idx = state.symbolTemplates.findIndex(x => x.id === s.id);
      if (idx >= 0) { state.symbolTemplates[idx] = s; replaced++; }
      else { state.symbolTemplates.push({ id: s.id, name: s.name, category: s.category || 'imported', svg: s.svg }); added++; }
    });
    alert(`Imported symbols: ${added} new, ${replaced} replaced.`);
    switchScenTab('symbols');
  } catch (err) {
    alert('Import failed: ' + err.message + '\n\nNote: browsers restrict cross-origin fetch. If using GitHub, use raw.githubusercontent.com URLs and host a CORS-friendly source, or save locally.');
  }
}

// ── LAYERS PANEL ─────────────────────────────────────────────────
const layerObjectsExpanded = {};
const layerGroupExpanded = {};
function renderLayersPanel(body) {
  const role = state.viewRole;
  const isUmpire = role === 'umpire';
  let html = '<div class="section-head">Map Layers</div>';
  state.layers.forEach(l => {
    const canSee = isUmpire || l.visibility === 'all' || l.visibility === role;
    if (!canSee) return;
    const visBadgeCls = 'vis-' + l.visibility;
    const isCurrent = l.id === state.currentLayerId;
    const drawings = state.drawings.filter(d => d.layerId === l.id);
    const expanded = layerObjectsExpanded[l.id];
    html += `<div class="layer-item ${isCurrent?'current':''}" style="cursor:pointer" onclick="setCurrentLayer('${l.id}')">
      <input type="checkbox" ${l.visible?'checked':''} onclick="event.stopPropagation()" onchange="toggleLayerVisible('${l.id}')">
      <span class="layer-dot" style="background:${l.color}"></span>
      <span class="name" style="flex:1">${esc(l.name)}</span>
      <span class="vis-badge ${visBadgeCls}">${l.visibility}</span>
      <span style="font-size:10px;color:var(--text-dim)">(${drawings.length})</span>
      ${drawings.length > 0 ? `<button class="small" style="font-size:10px;padding:1px 4px" title="Show/hide objects and markers" onclick="event.stopPropagation();layerObjectsExpanded['${l.id}']=!layerObjectsExpanded['${l.id}'];renderLayersPanel(document.getElementById('panelBody'))">${expanded?'▼':'▶'}</button>` : ''}
      ${isUmpire ? `<button class="small" onclick="event.stopPropagation();editLayer('${l.id}')">Edit</button>
      <button class="small danger" onclick="event.stopPropagation();confirmDeleteLayer('${l.id}')">×</button>` : ''}
    </div>`;
    if (expanded && drawings.length > 0) {
      html += `<div style="padding:0 0 6px 20px;font-size:11px">`;
      const grouped = {};
      const ungrouped = [];
      drawings.forEach(d => {
        const gid = d.properties?.group;
        if (gid) {
          if (!grouped[gid]) grouped[gid] = { label: d.properties?.groupLabel || '', type: d.properties?.groupType || '', items: [] };
          grouped[gid].items.push(d);
        } else { ungrouped.push(d); }
      });
      Object.entries(grouped).forEach(([gid, g]) => {
        const gExpanded = layerGroupExpanded[gid] !== false;
        const isRangeRing = g.type === 'Range ring';
        // Range ring: bold label (or fallback), show centre coords in header, collapse centre marker lines into one row
        if (isRangeRing) {
          const centerItems = g.items.filter(d => d.properties?.label === 'Center');
          const ringItems = g.items.filter(d => d.properties?.label !== 'Center');
          const labelText = g.label || 'Range ring';
          // Derive centre coordinates: circles have geometry.center; else use first polyline midpoint
          let centerLat = null, centerLng = null, centerColor = null;
          if (ringItems.length > 0 && ringItems[0].geometry?.center) {
            centerLat = ringItems[0].geometry.center[0];
            centerLng = ringItems[0].geometry.center[1];
          } else if (centerItems.length > 0 && centerItems[0].geometry?.points?.length >= 2) {
            const p1 = centerItems[0].geometry.points[0];
            const p2 = centerItems[0].geometry.points[1];
            centerLat = (p1[0] + p2[0]) / 2;
            centerLng = (p1[1] + p2[1]) / 2;
          }
          if (centerItems.length > 0) centerColor = centerItems[0].style?.color || l.color;
          const coordStr = (centerLat !== null) ? ` <span style="font-weight:400;color:var(--text-dim);font-size:9px">${centerLat.toFixed(5)}°N ${centerLng.toFixed(5)}°E</span>` : '';
          const allIds = g.items.map(d => "'" + d.id + "'").join(',');
          const centerIds = centerItems.map(d => "'" + d.id + "'").join(',');
          const groupVisible = g.items.some(d => d.visible !== false);
          const groupEye = groupVisible ? '👁' : '🚫';
          const groupDim = groupVisible ? '' : 'opacity:0.5;';
          const centerVisible = centerItems.some(d => d.visible !== false);
          const centerEye = centerVisible ? '👁' : '🚫';
          const centerDim = centerVisible ? '' : 'opacity:0.5;';
          html += `<div style="margin-bottom:4px;${groupDim}">
            <div class="inline-row" style="font-size:10px;padding:2px 0;align-items:center">
              <button class="small" style="font-size:10px;padding:1px 4px" title="Expand/collapse"
                onclick="event.stopPropagation();layerGroupExpanded['${gid}']=!(layerGroupExpanded['${gid}']!==false);renderLayersPanel(document.getElementById('panelBody'))">${gExpanded?'\u25bc':'\u25b6'}</button>
              <span style="flex:1"><b>${esc(labelText)}</b>${coordStr}</span>
              <button class="small" style="font-size:10px;padding:1px 4px" title="Show/hide all ring items"
                onclick="event.stopPropagation();toggleDrawingsVisible([${allIds}])">${groupEye}</button>
              <button class="small danger" style="font-size:9px;padding:1px 4px" onclick="event.stopPropagation();deleteDrawingGroup([${allIds}])">×</button>
            </div>`;
          if (gExpanded) {
            html += `<div style="padding-left:12px">`;
            // Single condensed Center row with show/hide + delete
            if (centerItems.length > 0) {
              html += `<div class="list-item" style="padding:2px 4px;${centerDim}">
                <span style="color:${centerColor}">●</span>
                <span class="name" style="font-size:11px;flex:1">Center</span>
                <button class="small" style="font-size:10px;padding:1px 4px" title="Show/hide center"
                  onclick="event.stopPropagation();toggleDrawingsVisible([${centerIds}])">${centerEye}</button>
                <button class="small danger" style="font-size:9px;padding:1px 4px" onclick="event.stopPropagation();deleteDrawingGroup([${centerIds}])">×</button>
              </div>`;
            }
            ringItems.forEach(d => { html += drawingListItem(d, l); });
            html += `</div>`;
          }
          html += `</div>`;
          return;
        }
        const hasLabel = g.label && g.label !== g.type;
        const headerText = hasLabel ? `${esc(g.label)} \u00b7 ${esc(g.type)}` : esc(g.type || g.label || 'Group');
        const allIds = g.items.map(d => "'" + d.id + "'").join(',');
        const groupVisible = g.items.some(d => d.visible !== false);
        const groupEye = groupVisible ? '👁' : '🚫';
        const groupDim = groupVisible ? '' : 'opacity:0.5;';
        html += `<div style="margin-bottom:4px;${groupDim}">
          <div class="inline-row" style="font-size:10px;padding:2px 0;align-items:center">
            <button class="small" style="font-size:10px;padding:1px 4px" title="Expand/collapse"
              onclick="event.stopPropagation();layerGroupExpanded['${gid}']=!(layerGroupExpanded['${gid}']!==false);renderLayersPanel(document.getElementById('panelBody'))">${gExpanded?'\u25bc':'\u25b6'}</button>
            <span style="font-weight:600;color:var(--accent);flex:1">${headerText} (${g.items.length})</span>
            <button class="small" style="font-size:10px;padding:1px 4px" title="Show/hide all items in this group"
              onclick="event.stopPropagation();toggleDrawingsVisible([${allIds}])">${groupEye}</button>
            <button class="small danger" style="font-size:9px;padding:1px 4px" onclick="event.stopPropagation();deleteDrawingGroup([${allIds}])">×</button>
          </div>`;
        if (gExpanded) {
          // Subgroup items sharing same label if >1
          const subgroups = {};
          g.items.forEach(d => {
            const key = d.properties?.label || '';
            if (!subgroups[key]) subgroups[key] = [];
            subgroups[key].push(d);
          });
          const needsSub = Object.values(subgroups).some(a => a.length > 1);
          if (needsSub) {
            Object.entries(subgroups).forEach(([lbl, items]) => {
              if (items.length > 1) {
                const sgKey = gid + '_' + lbl;
                const sgExp = layerGroupExpanded[sgKey] !== false;
                const sgIds = items.map(d => "'" + d.id + "'").join(',');
                html += `<div style="padding-left:12px">
                  <div class="inline-row" style="font-size:10px;padding:1px 0;align-items:center">
                    <button class="small" style="font-size:9px;padding:1px 3px" title="Show/hide objects and markers"
                      onclick="event.stopPropagation();layerGroupExpanded['${sgKey}']=!(layerGroupExpanded['${sgKey}']!==false);renderLayersPanel(document.getElementById('panelBody'))">${sgExp?'\u25bc':'\u25b6'}</button>
                    <span style="font-weight:600;color:var(--text-dim);flex:1">${esc(lbl || 'Items')} (${items.length})</span>
                    <button class="small danger" style="font-size:9px;padding:1px 4px" onclick="event.stopPropagation();deleteDrawingGroup([${sgIds}])">×</button>
                  </div>`;
                if (sgExp) {
                  html += `<div style="padding-left:12px">`;
                  items.forEach(d => { html += drawingListItem(d, l); });
                  html += `</div>`;
                }
                html += `</div>`;
              } else {
                html += `<div style="padding-left:12px">`;
                items.forEach(d => { html += drawingListItem(d, l); });
                html += `</div>`;
              }
            });
          } else {
            html += `<div style="padding-left:12px">`;
            g.items.forEach(d => { html += drawingListItem(d, l); });
            html += `</div>`;
          }
        }
        html += `</div>`;
      });
      ungrouped.forEach(d => { html += drawingListItem(d, l); });
      html += `</div>`;
    }
  });
  html += `<div class="btn-row"><button onclick="createNewLayer()">+ New Layer</button></div>
    <p style="font-size:11px;color:var(--text-dim);margin-top:10px">Click a layer to select it. Expand \u25b6 to see objects.</p>`;
  body.innerHTML = html;
}

function deleteDrawingGroup(ids) {
  confirmModal('Delete this group and all its objects?').then(ok => {
    if (!ok) return;
    state.drawings = state.drawings.filter(d => !ids.includes(d.id));
    renderDrawings();
    refreshLayersPanelIfOpen();
  });
}

function drawingListItem(d, l) {
  const dlabel = d.properties?.label || '';
  let desc = '';
  if (d.type === 'polyline') {
    const pts = d.geometry.points || [];
    const dist = pts.length >= 2 ? computePolylineDistance(pts) : 0;
    desc = `Line · ${formatDist(dist)}`;
  } else if (d.type === 'polygon') {
    const pts = d.geometry.points || [];
    const area = pts.length >= 3 ? polygonAreaM2(pts) : 0;
    desc = `Polygon · ${formatArea(area)}`;
  } else if (d.type === 'circle') {
    desc = `Circle · r=${formatDist(d.geometry.radius)}`;
  } else if (d.type === 'text') {
    desc = `Text`;
  } else if (d.type === 'symbol') {
    const tmpl = state.symbolTemplates.find(s => s.id === d.properties?.symbolId);
    desc = `Symbol: ${esc(tmpl?.name || '?')}`;
  } else {
    desc = d.type || '?';
  }
  const displayName = dlabel || 'No label';
  const isVisible = d.visible !== false;
  const eye = isVisible ? '👁' : '🚫';
  const eyeTitle = isVisible ? 'Hide this object' : 'Show this object';
  const dimStyle = isVisible ? '' : 'opacity:0.5;';
  return `<div class="list-item" style="padding:2px 4px;cursor:pointer;${dimStyle}" onclick="panToDrawing('${d.id}');openDrawingEditor(state.drawings.find(x=>x.id==='${d.id}'))">
    <span style="color:${d.style?.color||l.color}">●</span>
    <span class="name" style="font-size:11px"><b>${esc(displayName)}</b> · ${desc}</span>
    <button class="small" style="font-size:10px;padding:1px 4px" title="${eyeTitle}" onclick="event.stopPropagation();toggleDrawingVisible('${d.id}')">${eye}</button>
    <button class="small danger" style="font-size:9px;padding:1px 4px" onclick="event.stopPropagation();deleteDrawing('${d.id}')">×</button>
  </div>`;
}

function toggleDrawingVisible(id) {
  const d = state.drawings.find(x => x.id === id);
  if (!d) return;
  d.visible = d.visible === false ? true : false;
  renderDrawings();
  refreshLayersPanelIfOpen();
}

// Bulk toggle: if any item is currently visible, hide them all; else show them all.
function toggleDrawingsVisible(ids) {
  const items = state.drawings.filter(d => ids.includes(d.id));
  if (items.length === 0) return;
  const anyVisible = items.some(d => d.visible !== false);
  items.forEach(d => { d.visible = anyVisible ? false : true; });
  renderDrawings();
  refreshLayersPanelIfOpen();
}

function panToDrawing(drawingId) {
  const d = state.drawings.find(x => x.id === drawingId);
  if (!d) return;
  if (d.type === 'circle') {
    map.setView(d.geometry.center, map.getZoom());
  } else if (d.geometry.latlng) {
    map.setView(d.geometry.latlng, map.getZoom());
  } else if (d.geometry.points && d.geometry.points.length > 0) {
    const pts = d.geometry.points;
    const midIdx = Math.floor(pts.length / 2);
    map.setView(pts[midIdx], map.getZoom());
  }
}

function toggleLayerVisible(id) {
  const l = getLayer(id);
  if (!l) return;
  l.visible = !l.visible;

// ── UNITS PANEL (list) ────────────────────────────────────────────
// Which formations are currently collapsed in the Units panel. Module-scoped (not
// persisted into the scenario save) — collapsibility is a view convenience, not data.
const unitsPanelCollapsed = new Set();

function toggleUnitsFormation(entryId) {
  if (unitsPanelCollapsed.has(entryId)) unitsPanelCollapsed.delete(entryId);
  else unitsPanelCollapsed.add(entryId);
  refreshUnitsPanelIfOpen();
}

function renderUnitsPanel(body) {
  // Sides visible to the current role. Umpire sees both; players see only their own.
  const sides = state.viewRole === 'umpire' ? ['bluefor', 'opfor'] : [state.viewRole];

  // Suspected-enemy markers that aren't tied to an OOB entry: show in a flat section per side.
  let html = '';
  sides.forEach(side => {
    const oob = state.oob[side] || [];
    const deployedInSide = state.units.filter(u => u.side === side && !u.isSuspectedMarker);
    const hasContent = oob.length > 0 || deployedInSide.length > 0;
    html += `<div class="section-head" style="color:${side==='bluefor'?'var(--blue-side)':'var(--red-side)'}">${sideAbbr(side)}</div>`;
    if (!hasContent) {
      html += `<p style="color:var(--text-dim);font-size:12px;margin:4px 0 10px 0">No OOB entries or deployed units.</p>`;
      return;
    }
    if (oob.length > 0) html += renderUnitsTree(oob, side, 0);

    // Any deployed units not linked to an OOB entry (e.g. placed directly via template)
    const orphaned = deployedInSide.filter(u => !u.oobEntryId);
    if (orphaned.length > 0) {
      html += `<div style="margin-top:8px;padding-left:4px;font-size:11px;color:var(--text-dim)">Not in OOB:</div>`;
      orphaned.forEach(u => { html += renderUnitsUnitRow(null, u, side, 0); });
    }
  });

  body.innerHTML = html || '<p style="color:var(--text-dim);font-size:12px">Nothing to show in current role.</p>';
}

function renderUnitsTree(list, side, depth) {
  let html = '';
  list.forEach(e => {
    if (e.type === 'formation') {
      const collapsed = unitsPanelCollapsed.has(e.id);
      const stats = getFormationDeployStats(e);
      const indent = depth * 12;
      const chev = collapsed ? '▶' : '▼';
      html += `<div class="list-item" style="padding-left:${indent+2}px;cursor:pointer" onclick="toggleUnitsFormation('${e.id}')">
        <span style="width:10px;display:inline-block">${chev}</span>
        <span>📁</span>
        <span class="name"><b>${esc(e.name)}</b>${e.abbr?` <span style="color:var(--text-dim);font-size:10px">(${esc(e.abbr)})</span>`:''}</span>
        <span class="meta" style="font-size:10px;color:var(--text-dim)">${stats.deployed}/${stats.total}</span>
      </div>`;
      if (!collapsed && e.children && e.children.length) {
        html += renderUnitsTree(e.children, side, depth + 1);
      }
    } else if (e.type === 'unit') {
      const unit = e.unitId ? getUnit(e.unitId) : null;
      html += renderUnitsUnitRow(e, unit, side, depth);
    }
  });
  return html;
}

function renderUnitsUnitRow(entry, unit, side, depth) {
  const indent = depth * 12 + 14;
  const name = entry ? entry.name : unit.name;
  const desig = entry ? entry.designation : unit.designation;
  const nameLabel = `${esc(name)}${desig?' ('+esc(desig)+')':''}`;

  // Derive status
  let status, statusColor, actions, clickAction = '';
  if (!unit) {
    status = 'in pool';
    statusColor = 'var(--text-dim)';
    actions = `<button class="small" onclick="event.stopPropagation();startDeployOOBEntry('${entry.id}')">Deploy</button>`;
  } else if (unit.transportedBy) {
    const carrier = getUnit(unit.transportedBy);
    status = carrier ? `in ${carrier.name}` : 'in transit';
    statusColor = 'var(--accent)';
    actions = `<button class="small" onclick="event.stopPropagation();dismountUnit('${unit.id}')">Dismount</button>
               <button class="small" onclick="event.stopPropagation();confirmWithdrawUnit('${unit.id}')">Withdraw</button>`;
  } else {
    status = 'deployed';
    statusColor = 'var(--success)';
    const passengers = state.units.filter(u => u.transportedBy === unit.id);
    const passengerBadge = passengers.length > 0 ? ` <span style="font-size:10px;color:var(--accent)">+${passengers.length}</span>` : '';
    status += passengerBadge;
    actions = `<button class="small" onclick="event.stopPropagation();openMountUnitModal('${unit.id}')" title="Mount this unit inside a carrier">Mount</button>
               <button class="small" onclick="event.stopPropagation();confirmWithdrawUnit('${unit.id}')">Withdraw</button>`;
    // Clicking the row pans to the unit and opens its edit panel
    clickAction = `onclick="map.setView(getUnit('${unit.id}').latlng,map.getZoom());openUnitPanel(getUnit('${unit.id}'))"`;
  }

  const dotColor = side === 'bluefor' ? 'var(--blue-side)' : side === 'opfor' ? 'var(--red-side)' : '#888';
  return `<div class="list-item" style="padding-left:${indent}px;${clickAction?'cursor:pointer':''}" ${clickAction}>
    <span class="layer-dot" style="background:${dotColor}"></span>
    <span class="name" style="font-size:11px">▲ ${nameLabel}</span>
    <span class="meta" style="color:${statusColor};font-size:10px">${status}</span>
    <div class="actions">${actions}</div>
  </div>`;
}

// Count deployed units (and total units) under a formation, recursively.
function getFormationDeployStats(formation) {
  let total = 0, deployed = 0;
  function walk(list) {
    list.forEach(e => {
      if (e.type === 'unit') {
        total++;
        if (e.unitId && getUnit(e.unitId)) deployed++;
      } else if (e.type === 'formation' && e.children) {
        walk(e.children);
      }
    });
  }
  if (formation.children) walk(formation.children);
  return { total, deployed };
}

// Modal for mounting a unit into a carrier. Eligible carriers: same side, currently deployed
// on the map, not a passenger themselves, not the unit being mounted.
function openMountUnitModal(unitId) {
  const unit = getUnit(unitId);
  if (!unit) return;
  const candidates = state.units.filter(c =>
    c.id !== unit.id &&
    c.side === unit.side &&
    !c.isSuspectedMarker &&
    !c.transportedBy &&
    c.id !== unit.transportedBy
  );
  if (candidates.length === 0) {
    alert('No eligible carriers: there are no other deployed ' + sideAbbr(unit.side) + ' units to mount into.');
    return;
  }
  const options = candidates.map(c => {
    const existing = state.units.filter(u => u.transportedBy === c.id).length;
    return `<option value="${c.id}">${esc(c.name)}${c.designation?' ('+esc(c.designation)+')':''}${existing?` — carrying ${existing}`:''}</option>`;
  }).join('');
  showModal(`
    <h3>Mount "${esc(unit.name)}"</h3>
    <p style="font-size:12px;color:var(--text-dim)">Choose a carrier. The passenger will be removed from the map until dismounted.</p>
    <div class="field-group"><label>Carrier</label>
      <select id="mount_carrier">${options}</select></div>
    <div class="btn-row">
      <button onclick="confirmMountUnit('${unit.id}');this.closest('.modal-overlay').remove()">Mount</button>
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>`);
}

function confirmMountUnit(unitId) {
  const carrierId = document.getElementById('mount_carrier').value;
  mountUnit(unitId, carrierId);
  // If the unit edit panel is showing this unit, refresh it so the transport section
  // updates from Deployed → In {carrier}.
  refreshUnitEditPanelIfShowing(unitId);
}

// Dismount + refresh the unit edit panel (if it's the active panel for this unit).
function dismountUnitAndRefresh(unitId) {
  dismountUnit(unitId);
  refreshUnitEditPanelIfShowing(unitId);
}

// Withdraw with confirm, then close the panel if it was showing this unit (unit no longer exists).
function withdrawFromEditPanel(unitId) {
  confirmWithdrawUnit(unitId);
  // confirmWithdrawUnit runs async; it'll close the panel itself via withdrawUnit's logic.
}

function refreshUnitEditPanelIfShowing(unitId) {
  const unit = getUnit(unitId);
  if (!unit) return;
  const title = document.getElementById('panelTitle');
  if (title && title.textContent === unit.name) {
    renderUnitEditPanel(document.getElementById('panelBody'), unit);
  }
}

// Transport section shown inside the unit edit panel. Contents depend on current state:
// deployed → Mount / Withdraw; transported → Dismount / Withdraw; otherwise nothing.
function renderUnitTransportSection(unit) {
  if (unit.isSuspectedMarker) return '';
  if (unit.transportedBy) {
    const carrier = getUnit(unit.transportedBy);
    const carrierName = carrier ? esc(carrier.name) : 'unknown carrier';
    return `<div class="section-head">Transport</div>
      <p style="font-size:11px;margin:0 0 6px 0">In <b>${carrierName}</b>. Dismount to place this unit back on the map (250 m NW of the carrier).</p>
      <div class="btn-row">
        <button class="small" onclick="dismountUnitAndRefresh('${unit.id}')">Dismount</button>
        <button class="small danger" onclick="withdrawFromEditPanel('${unit.id}')">Withdraw to pool</button>
      </div>`;
  }
  const passengers = state.units.filter(u => u.transportedBy === unit.id);
  const passengerLine = passengers.length > 0
    ? `<p style="font-size:11px;margin:0 0 6px 0">Currently carrying: ${passengers.map(p => esc(p.name)).join(', ')}.</p>`
    : '';
  return `<div class="section-head">Transport</div>
    ${passengerLine}
    <div class="btn-row">
      <button class="small" onclick="openMountUnitModal('${unit.id}')" title="Mount this unit inside another unit as a passenger">Mount…</button>
      <button class="small danger" onclick="withdrawFromEditPanel('${unit.id}')">Withdraw to pool</button>
    </div>`;
}

  } else {
    html += `<p style="font-size:11px;color:var(--text-dim)">No states defined. Add a state to configure unit capabilities.</p>`;
  }

  html += `
    <div class="btn-row">
      <button onclick="map.setView(getUnit('${unit.id}').latlng,map.getZoom())">Pan To</button>
      ${isUmpire ? `<button class="danger" onclick="confirmModal('Withdraw unit?').then(ok=>{if(ok)withdrawUnit('${unit.id}')})">Withdraw Unit</button>` : ''}
    </div>`;
  body.innerHTML = html;
}

function addUnitState(unitId) {
  const u = getUnit(unitId);
  if (!u) return;
  const ns = makeState('New State', 'New');
  u.states.push(ns);
  u.activeStateId = ns.id;
  renderUnit(u);
  renderUnitRangeRings(u);
  renderUnitEditPanel(document.getElementById('panelBody'), u);
}
function removeUnitState(unitId, stateId) {
  const u = getUnit(unitId);
  if (!u || (u.states||[]).length <= 1) return;
  confirmModal('Delete this state and all its data?').then(ok => {
    if (!ok) return;
    u.states = u.states.filter(s => s.id !== stateId);
    if (u.activeStateId === stateId) u.activeStateId = u.states[0].id;
    renderUnit(u);
    renderUnitRangeRings(u);
    renderUnitEditPanel(document.getElementById('panelBody'), u);
  });
}

// Helper: ensure fieldVisibility sub-object exists
function ensureFV(unitId, field) {
  const u = getUnit(unitId);
  if (!u) return {};
  if (!u.fieldVisibility) u.fieldVisibility = {};
  if (!u.fieldVisibility[field]) u.fieldVisibility[field] = { showTooltip: true, showOpponent: false };
  return u.fieldVisibility[field];
}

function setUnitDetection(unitId, side, state_) {
  const unit = getUnit(unitId);
  if (!unit) return;
  const wasIdentified = unit.detection[side] === 'identified';
  unit.detection[side] = state_;
  if (state_ === 'identified' && !wasIdentified && unit.detectionId[side] == null) {
    state.detectionCounters[side]++;
    unit.detectionId[side] = state.detectionCounters[side];
    logCommitted(`Enemy unit identified (${side} view): assigned #${unit.detectionId[side]}`);
  } else if (state_ === 'detected' && !wasIdentified) {
    logCommitted(`Enemy unit detected (${side} view)`);
  }
  renderUnit(unit);
}

let recentDiceRolls = [];
function rollDiceNotation(notation, label) {
  const m = notation.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if (!m) { alert('Invalid dice notation. Use format like "2d6" or "1d20+3"'); return; }
  const n = parseInt(m[1]), sides = parseInt(m[2]), mod = m[3] ? parseInt(m[3]) : 0;
  if (n > 100 || sides > 1000) { alert('Too many dice or sides'); return; }
  const rolls = [];
  for (let i = 0; i < n; i++) rolls.push(1 + Math.floor(Math.random() * sides));
  const total = rolls.reduce((a,b) => a+b, 0) + mod;
  const result = { notation, rolls, mod, total, label, time: new Date().toISOString() };
  recentDiceRolls.unshift(result);
  if (recentDiceRolls.length > 20) recentDiceRolls.pop();
  renderDiceResults();
  logAction(`Rolled ${label ? label+': ' : ''}${notation} = ${total} [${rolls.join(',')}${mod ? (mod>0?'+':'')+mod : ''}]`, 'dice');
}

function renderDiceResults() {
  const c = document.getElementById('diceResults');
  if (!c) return;
  c.innerHTML = recentDiceRolls.map(r =>
    `<div class="dice-result">
      <div class="total">${r.total}</div>
      <div class="detail">${r.label ? r.label + ' · ' : ''}${r.notation} = [${r.rolls.join(', ')}]${r.mod ? (r.mod>0?'+':'')+r.mod : ''}</div>
    </div>`
  ).join('');
}

function confirmEndTurn() {
  const saveFile = document.getElementById('et_saveFile')?.checked;
  const endedTurn = state.turnNumber;

  // Save notes snapshot per unit for this turn
  state.units.forEach(u => {
    if (!u.notesHistory) u.notesHistory = {};
    u.notesHistory[state.turnNumber] = u.notes || '';
  });

  state.turnHistory.push({
    turnNumber: state.turnNumber,
    timestamp: new Date().toISOString(),
    units: cloneDeep(state.units),
    markers: cloneDeep(state.markers),
    drawings: cloneDeep(state.drawings),
    movementOrders: cloneDeep(state.movementOrders),
    syncMatrix: cloneDeep(state.syncMatrix)
  });
  state.turnNumber++;
  logCommitted(`=== Turn ${state.turnNumber - 1} ended; Turn ${state.turnNumber} begins ===`, 'turn');
  logAction(`=== End Turn ${state.turnNumber - 1} ===`, 'turn');
  document.getElementById('turnDisplay').textContent = `Turn ${state.turnNumber}`;
  updateScenTimeDisplay();

  // Save scenario file with _END_OF_TURN suffix if requested
  if (saveFile) {
    try {
      const data = cloneDeep(state);
      downloadJSON(data, `scenario-${state.scenario.name.replace(/\s+/g,'_')}-T${endedTurn}_END_OF_TURN.json`);

function logCommitted(text, type) {

  });

  logAction(text, type);
  // Every committed change is a candidate for mirror sync. No-op outside editor mode.
  syncMirrors();
}

// ═══════════════════════════════════════════════════════════════════
// SYNC MATRIX
// ═══════════════════════════════════════════════════════════════════
function getSyncRows(side) {
  const roots = state.oob[side] || [];
  const rows = [];
  function walk(list, depth) {
    list.forEach(e => {
      if (e.type === 'formation') {
        rows.push({ id: e.id, name: e.name, abbr: e.abbr || '', depth, kind: 'formation' });
        if (e.children && e.children.length) walk(e.children, depth + 1);
      } else if (e.type === 'unit') {
        // Every unit gets its own row — nested inside formations or loose at root.
        const label = e.name + (e.designation ? ' ' + e.designation : '');
        rows.push({ id: e.id, name: label, abbr: '', depth, kind: 'unit' });
      }
    });
  }
  walk(roots, 0);
  return rows;
}

function renderSyncPanel(body, side) {
  if (!state.syncMatrix) state.syncMatrix = { bluefor: {}, opfor: {} };
  if (!state.syncMatrix[side]) state.syncMatrix[side] = {};
  const rows = getSyncRows(side);
  const turnLimit = state.scenario.turnLimit != null ? state.scenario.turnLimit : 6;
  const cols = turnLimit === 0 ? Math.min(10, Math.max(6, state.turnNumber + 3)) : Math.min(10, turnLimit);

  const canSeeBoth = state.viewRole === 'umpire' && !state.gameMode;
  let html = '';
  if (canSeeBoth) {
    html += `<div class="tabs" style="margin:-12px -14px 10px -14px">
      <button class="${side==='bluefor'?'active':''}" onclick="openPanel('sync',{side:'bluefor'})">BLUFOR</button>
      <button class="${side==='opfor'?'active':''}" onclick="openPanel('sync',{side:'opfor'})">OPFOR</button>
    </div>`;
  }
  html += `<div class="section-head">${sideAbbr(side)} Sync Matrix — ${cols} turns</div>`;
  if (turnLimit === 0) {
    html += `<p style="font-size:10px;color:var(--text-dim)">Turn limit is off; matrix shows current + 3 turns (max 10 cols).</p>`;
  }
  if (rows.length === 0) {
    html += `<p style="color:var(--text-dim);font-size:12px">No formations or units in ${sideAbbr(side)} OOB. Build the OOB first in the Scenario Builder.</p>`;
    body.innerHTML = html;
    return;
  }
  html += `<div style="overflow:auto;max-width:100%"><table class="sync-matrix"><thead><tr><th></th>`;
  for (let t = 0; t < cols; t++) {
    const isCurrent = t === state.turnNumber;
    html += `<th class="${isCurrent?'current-turn':''}">Turn ${t}${isCurrent?' ●':''}</th>`;
  }
  html += `</tr></thead><tbody>`;
  rows.forEach(r => {
    const pad = r.depth * 10 + 4;
    const labelText = r.abbr ? `${esc(r.abbr)} — ${esc(r.name)}` : esc(r.name);
    html += `<tr><td class="row-name ${r.kind}" style="padding-left:${pad}px">${labelText}</td>`;
    const rowData = state.syncMatrix[side][r.id] || {};
    for (let t = 0; t < cols; t++) {
      const val = rowData[t] || '';
      const cls = t === state.turnNumber ? 'current-turn' : '';
      html += `<td class="${cls}"><textarea data-side="${side}" data-rowid="${esc(r.id)}" data-turn="${t}" oninput="setSyncCell('${side}','${esc(r.id)}',${t},this.value)">${esc(val)}</textarea></td>`;
    }
    html += `</tr>`;
  });
  html += `</tbody></table></div>
    <p style="font-size:10px;color:var(--text-dim);margin-top:8px">Rows auto-generated from ${sideAbbr(side)} OOB formations. Drag panel edge to widen.</p>`;
  body.innerHTML = html;
}

function setSyncCell(side, rowId, turn, value) {
  if (!state.syncMatrix) state.syncMatrix = { bluefor: {}, opfor: {} };
  if (!state.syncMatrix[side]) state.syncMatrix[side] = {};
  if (!state.syncMatrix[side][rowId]) state.syncMatrix[side][rowId] = {};
  state.syncMatrix[side][rowId][turn] = value;
}

// ═══════════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════════
function exportScenario() {
  const data = cloneDeep(state);
  downloadJSON(data, `scenario-${state.scenario.name.replace(/\s+/g,'_')}-T${state.turnNumber}.json`);
}

function importScenario(event) {
  const f = event.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.version) { alert('Invalid file'); return; }
      Object.assign(state, data);
      // Migration: scenarios saved before the modifier system gain the default library
      // and every unit gets an empty .modifiers array so rendering code that iterates
      // over it doesn't need a null guard on every access.
      if (!state.scenario.modifiers || !Array.isArray(state.scenario.modifiers)) {
        state.scenario.modifiers = defaultModifierLibrary();
      }
      (state.units || []).forEach(u => { if (!Array.isArray(u.modifiers)) u.modifiers = []; });
      // Migration: scenarios saved before role passwords lack the rolePasswords field.
      if (!state.scenario.rolePasswords) {
        state.scenario.rolePasswords = { umpire: '', bluefor: '', opfor: '' };
      }
      if (!state.scenario.sideColors) {
        state.scenario.sideColors = {
          bluefor: { arrow: '#2a6bc4', tooltipBg: '#1f3355', tooltipText: '#e0e0ff' },
          opfor:   { arrow: '#a83030', tooltipBg: '#4a2525', tooltipText: '#ffd8d8' }
        };
      }
      if (!state.scenario.orderGraphics) {
        state.scenario.orderGraphics = { scale: 1.0, lineWeights: {} };
      }
      applySideColorsToDOM();
      // Migration: detection state values were renamed in v047 to match UI wording.
      //   old 'detected'  (had numeric ID)      → new 'identified'
      //   old 'suspected' (had question-mark)   → new 'detected'
      // 'unknown' and 'self' are unchanged. Must rename 'detected' FIRST so the
      // 'suspected' → 'detected' step doesn't collide with the old 'detected' values.
      (state.units || []).forEach(u => {
        if (!u.detection) return;
        ['bluefor','opfor'].forEach(s => {
          if (u.detection[s] === 'detected') u.detection[s] = 'identified';
        });
        ['bluefor','opfor'].forEach(s => {
          if (u.detection[s] === 'suspected') u.detection[s] = 'detected';
        });
      });
      // Migration: older files may carry a filename string in suspectedIcons rather than inline SVG.
      // Treat anything that doesn't look like SVG as empty (falls through to default GitHub fetch).
      if (state.scenario) {
        if (!state.scenario.suspectedIcons) state.scenario.suspectedIcons = { bluefor: '', opfor: '' };
        ['bluefor','opfor'].forEach(s => {
          const v = state.scenario.suspectedIcons[s];
          if (typeof v !== 'string' || !v.includes('<svg')) {
            state.scenario.suspectedIcons[s] = '';
          }
        });
      }
      document.getElementById('turnDisplay').textContent = `Turn ${state.turnNumber}`;
      if (state.layers.length > 0 && !state.currentLayerId) state.currentLayerId = state.layers[0].id;
      updateCurrentLayerDisplay();
      updateScenTimeDisplay();
      renderAll();
      logAction(`Scenario imported: ${state.scenario.name}`);
      syncMirrorsNow();
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(f);
  event.target.value = '';
}

function exportTemplates() {
  downloadJSON({
    unitTemplates: state.unitTemplates,
    markerTemplates: state.markerTemplates,
    symbolTemplates: state.symbolTemplates,
    diceTemplates: state.diceTemplates,
    modifiers: state.scenario.modifiers || []
  }, `bg-templates-${new Date().toISOString().slice(0,10)}.json`);
}

// Exports the OOB (both sides) together with the unit templates referenced from it,
// plus the modifier library (needed because templates' availableModifierIds reference
// modifier ids). Designed so the recipient can import into a fresh scenario and have
// a working OOB + all templates + modifiers they need to use it. OOB entries lose their
// `deployed` / `unitId` fields on export — the new scenario starts with all entries in
// the pool.
function exportOOB() {
  const cleanOOB = (tree) => (tree || []).map(e => {
    const copy = cloneDeep(e);
    copy.deployed = false;
    copy.unitId = null;
    if (copy.children) copy.children = cleanOOB(copy.children);
    return copy;
  });
  downloadJSON({
    oob: {
      bluefor: cleanOOB(state.oob.bluefor),
      opfor:   cleanOOB(state.oob.opfor)
    },
    unitTemplates: state.unitTemplates,
    modifiers: state.scenario.modifiers || [],
    scenarioName: state.scenario.name,
    exportedAt: new Date().toISOString()
  }, `bg-oob-${(state.scenario.name||'scenario').replace(/\s+/g,'_')}-${new Date().toISOString().slice(0,10)}.json`);
}

function importOOB(event) {
  const f = event.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.oob || (!data.oob.bluefor && !data.oob.opfor)) {
        alert('File does not look like a Battlegroup Clasher OOB bundle (missing .oob).');
        return;
      }
      askMergeOrReplace().then(choice => {
        if (choice === 'cancel') return;
        if (choice === 'replace') {
          state.oob.bluefor = data.oob.bluefor || [];
          state.oob.opfor   = data.oob.opfor   || [];
          if (data.unitTemplates) state.unitTemplates = data.unitTemplates;
          if (data.modifiers) state.scenario.modifiers = data.modifiers;
        } else {
          // merge: append OOB entries, add any templates/modifiers whose ids aren't
          // already present (keep the current scenario's versions in case of conflict).
          if (data.oob.bluefor) state.oob.bluefor.push(...data.oob.bluefor);
          if (data.oob.opfor)   state.oob.opfor.push(...data.oob.opfor);
          const existingTpl = new Set(state.unitTemplates.map(t => t.id));
          (data.unitTemplates || []).forEach(t => { if (!existingTpl.has(t.id)) state.unitTemplates.push(t); });
          const existingMod = new Set((state.scenario.modifiers || []).map(m => m.id));
          if (!state.scenario.modifiers) state.scenario.modifiers = [];
          (data.modifiers || []).forEach(m => { if (!existingMod.has(m.id)) state.scenario.modifiers.push(m); });
        }
        renderAllUnits();
        // Re-render scenario panel if it's open so the OOB tabs refresh.
        const title = document.getElementById('panelTitle');
        if (title && title.textContent === 'Scenario Builder') {
          renderScenarioPanel(document.getElementById('panelBody'));
        }
        alert('OOB imported.');
      });
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(f);
  event.target.value = '';
}

function importTemplates(event) {
  const f = event.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      askMergeOrReplace().then(choice => {
        if (choice === 'cancel') return;
        if (choice === 'merge') {
          if (data.unitTemplates) state.unitTemplates.push(...data.unitTemplates);
          if (data.markerTemplates) state.markerTemplates.push(...data.markerTemplates);
          if (data.symbolTemplates) state.symbolTemplates.push(...data.symbolTemplates);
          if (data.diceTemplates) state.diceTemplates.push(...data.diceTemplates);
          if (data.modifiers && Array.isArray(data.modifiers)) {
            if (!state.scenario.modifiers) state.scenario.modifiers = [];
            const existing = new Set(state.scenario.modifiers.map(m => m.id));
            data.modifiers.forEach(m => { if (!existing.has(m.id)) state.scenario.modifiers.push(m); });
          }
        } else {
          if (data.unitTemplates) state.unitTemplates = data.unitTemplates;
          if (data.markerTemplates) state.markerTemplates = data.markerTemplates;
          if (data.symbolTemplates) state.symbolTemplates = data.symbolTemplates;
          if (data.diceTemplates) state.diceTemplates = data.diceTemplates;
          if (data.modifiers && Array.isArray(data.modifiers)) state.scenario.modifiers = data.modifiers;
        }
        alert('Templates imported');
      });
    } catch (err) { alert('Error: ' + err.message); }
  };
  reader.readAsText(f);
  event.target.value = '';
}

// Three-choice modal for template import: merge into existing, replace, or cancel.
function askMergeOrReplace() {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:420px">
      <h3 style="margin-bottom:8px">Import templates</h3>
      <div style="margin:4px 0 14px">Merge imported templates with existing ones, or replace existing entirely?</div>
      <div class="btn-row">
        <button id="mr_merge">Merge (keep existing + add imported)</button>
        <button id="mr_replace" class="danger">Replace (discard existing)</button>
        <button id="mr_cancel">Cancel</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    const done = v => { overlay.remove(); resolve(v); };
    overlay.querySelector('#mr_merge').onclick = () => done('merge');
    overlay.querySelector('#mr_replace').onclick = () => done('replace');
    overlay.querySelector('#mr_cancel').onclick = () => done('cancel');
    const keyH = e => {
      if (e.key === 'Escape') { e.preventDefault(); done('cancel'); document.removeEventListener('keydown', keyH, true); }
    };
    document.addEventListener('keydown', keyH, true);
    setTimeout(() => overlay.querySelector('#mr_merge').focus(), 30);
  });
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════════
// FULL RERENDER
// ═══════════════════════════════════════════════════════════════════
function renderAll() {
  renderDrawings();
  renderAllUnits();
  renderAllMarkers();
  renderMovementOrders();
  // Sync icon scale slider
  const sl = document.getElementById('iconScaleSlider');
  const sv = document.getElementById('iconScaleVal');
  const sc = state.scenario.unitIconScale || 0.3;
  if (sl) {
    sl.min = state.scenario.iconScaleMin || 0.1;
    sl.max = state.scenario.iconScaleMax || 0.5;
    sl.value = sc;
  }
  if (sv) { sv.textContent = Math.round(sc * 100) + '%'; }
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;

  // Enter accepts active drawing / movement / measurement
  if (e.key === 'Enter') {
    if (movementDraft) {
      const minPts = movementDraft.kind === 'path' ? 2 : 1;
      if (movementDraft.points.length >= minPts) {
        finishMovementOrder();
        e.preventDefault();
        return;
      }
    }
    if (drawHandler && drawHandler._finishShape) {
      try { drawHandler._finishShape(); } catch(err) {}
      e.preventDefault();
      return;
    }
    if (currentTool === 'measure' && measurePoints.length >= 2) {
      setTool('pan');
      e.preventDefault();
      return;
    }
  }

  // Number keys for movement mode in draft
  if (movementDraft) {
    if (movementDraft && '12345678'.includes(e.key)) {
      const unit = getUnit(movementDraft.unitId);
      if (unit) {
        const mvEntries = getActiveMovement(unit);
        const idx = parseInt(e.key) - 1;
        if (idx < mvEntries.length) { setDraftMode(mvEntries[idx].id); e.preventDefault(); return; }
      }
    }
  }

  switch (e.key) {
    case 'Escape': {
      // Two-stage: first Esc cancels in-progress draft (keeps tool active);
      // second Esc (nothing in progress) falls back to Select/Pan + closes any open panel.
      if (cancelInProgressDraft()) {
        e.preventDefault();
        return;
      }
      setTool('pan');
      closePanel();
      break;
    }
    case 'u': case 'U': setTool('unit'); break;
    case 'v': case 'V': setTool('move'); break;
    case 'k': case 'K': setTool('marker'); break;
    case 'y': case 'Y': setTool('symbol'); break;
    case 'l': case 'L': setTool('line'); break;
    case 'p': case 'P': setTool('poly'); break;
    case 'c': case 'C': setTool('circle'); break;
    case 't': case 'T': setTool('text'); break;
    case 'm': case 'M': setTool('measure'); break;
    case 'a': case 'A': setTool('angle'); break;
    case 'r': case 'R': setTool('ring'); break;
    case 'z': case 'Z': if (moveUndoUnitId || moveUndoMarkerId) undoLastMove(); break;
  }
});

// Cancel any in-progress drawing/draft without changing the current tool.
// Returns true if something was cancelled.
function cancelInProgressDraft() {
  let cancelled = false;
  // Polyline / polygon mid-draw (Leaflet.Draw)
  if (drawHandler && drawHandler._poly) {
    const lls = drawHandler._poly.getLatLngs();
    const flat = Array.isArray(lls[0]) ? lls[0] : lls;
    if (flat && flat.length > 0) {
      // Reset by disabling and re-enabling the handler (keeps the tool active)
      try { drawHandler.disable(); } catch(e){}
      try { drawHandler.enable(); } catch(e){}
      cancelled = true;
    }
  }
  // Custom click-click circle
  if (circleDraft) {
    cancelCircleDraft();
    cancelled = true;
  }
  // Measurement polyline in progress
  if (measurePoints.length > 0) {
    measurePoints = [];
    LG.measure.clearLayers();
    measurePreviewLine = null;
    document.getElementById('measureReadout').textContent = '';
    document.getElementById('drawTooltip').style.display = 'none';
    cancelled = true;
  }
  // Angle measurement in progress
  if (anglePoints.length > 0) {
    anglePoints = [];
    LG.measure.clearLayers();
    anglePreviewLayer = null;
    document.getElementById('measureReadout').textContent = '';
    document.getElementById('drawTooltip').style.display = 'none';
    cancelled = true;
  }
  // Movement order draft
  if (movementDraft) {
    cancelMovementDraft();
    cancelled = true;
  }
  return cancelled;
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
function init() {
  state.unitTemplates = cloneDeep(DEFAULT_UNIT_TEMPLATES);
  state.markerTemplates = cloneDeep(DEFAULT_MARKER_TEMPLATES);
  state.symbolTemplates = cloneDeep(DEFAULT_SYMBOL_TEMPLATES);
  state.diceTemplates = cloneDeep(DEFAULT_DICE_TEMPLATES);
  state.layers = cloneDeep(DEFAULT_LAYERS);
  state.currentLayerId = state.layers[0].id;
  updateCurrentLayerDisplay();
  updateScenTimeDisplay();
  updateTooltipButtonLabel();
  updateScenarioAccess();
  setupPanelResize();
  const vd = document.getElementById('versionDisplay');
  if (vd) vd.textContent = APP_VERSION;
}

const APP_VERSION = 'v061';

function setupPanelResize() {
  const handle = document.getElementById('panelResizeHandle');
  const panel = document.getElementById('panel');
  if (!handle || !panel) return;
  let dragging = false;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const newW = Math.max(280, Math.min(window.innerWidth * 0.8, window.innerWidth - e.clientX));
    panel.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      handle.classList.remove('dragging');
      document.body.style.userSelect = '';
    }
  });
}
// Mirror-mode startup tweaks. Applied once at script end so all UI has been constructed.
if (isMirrorMode) {
  document.body.classList.add('mirror-mode');
  // Mirror starts with an empty state and will be overwritten by the first editor
  // broadcast. Trigger a proactive 'hello' if the editor is already open.
  if (syncChannel) {
    try { syncChannel.postMessage({ type: 'hello', from: SESSION_ID }); } catch (e) {}
  }
}
applySideColorsToDOM();
init();
