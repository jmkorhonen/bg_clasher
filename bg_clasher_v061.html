    points: cloneDeep(movementDraft.points),
    segmentModes: cloneDeep(movementDraft.segmentModes || []),
    startTime: null,
    endTime: null,
    duration: movementDraft.kind !== 'path' ? 60 : null, // default 60 min for non-movement
    notes: '',
    turn: state.turnNumber
  };
  state.movementOrders.push(order);
  const s = movementOrderSummary(unit, order);
  const typeName = getOrderType(order.orderType).name;
  let detail;
  if (movementDraft.kind === 'path') {
    detail = `${s.totalKm.toFixed(2)} km, ${s.turns.toFixed(1)} turns`;
  } else if (movementDraft.kind === 'area' && order.points.length >= 2) {
    detail = `area (${order.points.length} vtx)`;
  } else {
    detail = `at ${s.destLat.toFixed(4)}°N ${s.destLng.toFixed(4)}°E`;
  }
  logCommitted(`${typeName} order for ${unit.name}${unit.designation?' '+unit.designation:''} → ${detail}`);
  cancelMovementDraft();
  renderMovementOrders();
  renderUnit(unit); // refresh tooltip with new order info
  setTool('pan');
  if (document.getElementById('panelTitle').textContent === unit.name) {
    renderUnitEditPanel(document.getElementById('panelBody'), unit);
  }
}

function computePolylineDistance(points) {
  let total = 0;
  for (let i = 1; i < points.length; i++) {
    total += L.latLng(points[i-1]).distanceTo(L.latLng(points[i]));
  }
  return total;
}

function computeTurnsForSegments(unit, points, modes) {
  let turns = 0;
  for (let i = 1; i < points.length; i++) {
    const distKm = L.latLng(points[i-1]).distanceTo(L.latLng(points[i])) / 1000;
    const mode = modes[i-1] || 'easy';
    const speed = getMovementSpeed(unit, mode) || 1;
    if (speed > 0) turns += distKm / speed;
  }
  return turns;
}

function polygonAreaM2(points) {
  if (!points || points.length < 3) return 0;
  // Spherical excess approximation — reasonable accuracy for small polygons
  const R = 6378137;
  let area = 0;
  for (let i = 0; i < points.length; i++) {
    const [lat1, lng1] = points[i];
    const [lat2, lng2] = points[(i + 1) % points.length];
    area += (lng2 - lng1) * Math.PI / 180 *
            (2 + Math.sin(lat1 * Math.PI / 180) + Math.sin(lat2 * Math.PI / 180));
  }
  return Math.abs(area * R * R / 2);
}

function formatArea(m2) {
  if (m2 < 1e4) return Math.round(m2) + ' m²';
  if (m2 < 1e6) return (m2 / 1e4).toFixed(1) + ' ha';
  return (m2 / 1e6).toFixed(2) + ' km²';
}

function movementOrderSummary(unit, order) {
  const typeDef = getOrderType(order.orderType || 'move');
  const isPath = typeDef.kind === 'path' && order.points.length >= 2;
  const isArea = typeDef.kind === 'area';
  const totalM = isPath ? computePolylineDistance(order.points) : 0;
  const turns = isPath
    ? computeTurnsForSegments(unit, order.points, order.segmentModes || [])
    : ((order.duration || 0) / state.scenario.turnDurationMinutes);
  const startPt = order.points[0] || unit.latlng;
  const dest = order.points[order.points.length - 1] || startPt;

  // Compute start time
  let startMs;
  if (order.startTime) {
    startMs = new Date(order.startTime).getTime();
  } else if (order.endTime) {
    // Back-calculate from a manually set end time minus duration
    const endMsTmp = new Date(order.endTime).getTime();
    const durMin = isPath
      ? turns * state.scenario.turnDurationMinutes
      : (order.duration || 0);
    startMs = endMsTmp - durMin * 60 * 1000;
  } else {
    // Auto: use previous order's end, or scenario start + current turn
    const prevOrders = getOrdersForUnit(unit).filter(o => (o.sequenceIndex || 0) < (order.sequenceIndex || 0));
    if (prevOrders.length > 0) {
      const prev = prevOrders[prevOrders.length - 1];
      const prevSummary = movementOrderSummary(unit, prev);
      startMs = new Date(prevSummary.endIso).getTime();
    } else {
      const scenStart = new Date(state.scenario.startDateTime);
      startMs = isNaN(scenStart.getTime()) ? Date.now() : scenStart.getTime() + order.turn * state.scenario.turnDurationMinutes * 60 * 1000;
    }
  }
  // End time
  let endMs;
  if (order.endTime) {
    endMs = new Date(order.endTime).getTime();
  } else {
    const durMin = isPath
      ? turns * state.scenario.turnDurationMinutes
      : (order.duration || 0);
    endMs = startMs + durMin * 60 * 1000;
  }
  const startIso = new Date(startMs).toISOString();
  const endIso = new Date(endMs).toISOString();
  const etaText = endIso.replace('T',' ').slice(0,16) + 'Z';
  const startText = startIso.replace('T',' ').slice(0,16) + 'Z';

  return {
    totalKm: totalM/1000, totalM, turns,
    startLat: startPt[0], startLng: startPt[1],
    destLat: dest[0], destLng: dest[1],
    startIso, endIso, etaText, startText,
    durationMin: (endMs - startMs) / 60000,
    isPath, isArea
  };
}

// Offset a polyline by `offsetM` meters (positive = left, negative = right of travel direction)
function offsetPolyline(points, offsetM) {
  if (points.length < 2) return [];
  const out = [];
  for (let i = 0; i < points.length; i++) {
    const [lat, lng] = points[i];
    const cosLat = Math.cos(lat * Math.PI / 180);
    let px = 0, py = 0, count = 0;

    if (i > 0) {
      const [lat1, lng1] = points[i-1];
      const dx = (lng - lng1) * cosLat * 111320;
      const dy = (lat - lat1) * 111320;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 0) { px += -dy/len; py += dx/len; count++; }
    }
    if (i < points.length - 1) {
      const [lat2, lng2] = points[i+1];
      const dx = (lng2 - lng) * cosLat * 111320;
      const dy = (lat2 - lat) * 111320;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len > 0) { px += -dy/len; py += dx/len; count++; }
    }
    if (count > 0) { px /= count; py /= count; }

    const offLat = py * offsetM / 111320;
    const offLng = cosLat > 0.01 ? px * offsetM / (cosLat * 111320) : 0;
    out.push([lat + offLat, lng + offLng]);
  }
  return out;
}

function toggleOrderTooltips() {
  const modes = ['full', 'short', 'off'];
  const cur = state.orderLabelMode || 'full';
  state.orderLabelMode = modes[(modes.indexOf(cur) + 1) % modes.length];
  state.showOrderTooltips = state.orderLabelMode !== 'off';
  updateTooltipButtonLabel();
  renderMovementOrders();
  renderAllMarkers();
}

function updateTooltipButtonLabel() {
  const btn = document.getElementById('toggleTooltipsBtn');
  if (!btn) return;
  const icons = { full: '📋 Full', short: '📋 Short', off: '📋 Off' };
  btn.textContent = icons[state.orderLabelMode || 'full'];
  btn.classList.toggle('active', state.orderLabelMode !== 'off');
}

function renderMovementOrders() {
  LG.movement.clearLayers();
  const role = state.viewRole;

  state.movementOrders.forEach(o => {
    const unit = getUnit(o.unitId);
    if (!unit) return;
    // Visibility: own side + umpire always; opponents can't see orders
    if (role !== 'umpire' && unit.side !== role) return;
    // Respect the orders layer visibility toggle for this side
    const ordLayer = getOrdersLayer(unit.side);
    if (ordLayer && !ordLayer.visible) return;

    const sideColors = (state.scenario.sideColors) || {};
    const color = (sideColors[unit.side] && sideColors[unit.side].arrow)
      || (unit.side === 'bluefor' ? '#2a6bc4' : '#a83030');
    const typeDef = getOrderType(o.orderType || 'move');
    const isPath = typeDef.kind === 'path' && o.points.length >= 2;
    const isArea = typeDef.kind === 'area';
    const handleClick = () => { if (currentTool === 'edit' || currentTool === 'pan') openMovementOrderEditor(o); };

    // Area orders: polygon or point
    if (isArea && o.points.length > 0) {
      const s = movementOrderSummary(unit, o);
      let centroid;
      if (o.points.length === 1) {
        const pt = o.points[0];
        centroid = pt;
        const marker = L.circleMarker(pt, { radius: 9, color, fillColor: color, fillOpacity: 0.25, weight: 2 });
        marker._orderId = o.id;
        marker.on('click', handleClick);
        LG.movement.addLayer(marker);
      } else {
        const poly = L.polygon(o.points, { color, weight: 2, fillOpacity: 0.18, opacity: 0.9 });
        poly._orderId = o.id;
        poly.on('click', handleClick);
        LG.movement.addLayer(poly);
        centroid = [
          o.points.reduce((s,p)=>s+p[0],0)/o.points.length,
          o.points.reduce((s,p)=>s+p[1],0)/o.points.length
        ];
      }

      // Dashed approach line: previous endpoint (or unit position) → area centroid
      const prevOrders = getOrdersForUnit(unit).filter(x => (x.sequenceIndex || 0) < (o.sequenceIndex || 0));
      let fromPt;
      if (prevOrders.length > 0) {
        const prev = prevOrders[prevOrders.length - 1];
        fromPt = prev.points[prev.points.length - 1];
      } else {
        fromPt = unit.latlng;
      }
      if (fromPt) {
        const approach = L.polyline([fromPt, centroid], {
          color, weight: 1, dashArray: '5,5', opacity: 0.7, interactive: false
        });
        approach._orderId = o.id;
        LG.movement.addLayer(approach);
      }
      const mode = state.orderLabelMode || 'full';
      if (mode === 'full') {
        // Only the detailed tooltip in full mode
        const tipMarker = L.marker(centroid, {
          icon: L.divIcon({
            className: 'move-label ' + unit.side,
            html: `<b>${typeDef.name.toUpperCase()}</b> · ${esc(unit.name)}${unit.designation?' '+esc(unit.designation):''}<br>${s.startText} → ${s.etaText}<br>(${s.durationMin.toFixed(0)} min${o.points.length >= 3 ? ' · ' + formatArea(polygonAreaM2(o.points)) : ''})${o.notes ? '<br><i>'+esc(o.notes)+'</i>' : ''}`,
            iconSize: null, iconAnchor: [-10, 10]
          }),
          interactive: false
        });
        tipMarker._orderId = o.id;
        LG.movement.addLayer(tipMarker);
      } else if (mode === 'short') {
        const compactMarker = L.marker(centroid, {
          icon: L.divIcon({
            className: 'move-label ' + unit.side,
            html: `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`,
            iconSize: null, iconAnchor: [-10, 10]
          }),
          interactive: false
        });
        compactMarker._orderId = o.id;
        LG.movement.addLayer(compactMarker);
      }
      // 'off' = no label at all
      return;
    }

    if (!isPath) {
      // Static order (legacy) — place a verb-labelled circle marker
      const pt = o.points[0];
      const marker = L.circleMarker(pt, { radius: 9, color, fillColor: color, fillOpacity: 0.25, weight: 2 });
      marker._orderId = o.id;
      marker.on('click', handleClick);
      LG.movement.addLayer(marker);
      const s = movementOrderSummary(unit, o);
      const mode = state.orderLabelMode || 'full';
      if (mode !== 'off') {
        const labelHtml = mode === 'full'
          ? `<b>${typeDef.name.toUpperCase()}</b>${unit.designation?' · '+esc(unit.designation):''}<br>${s.startText} → ${s.etaText}<br>(${s.durationMin.toFixed(0)} min)${o.notes ? '<br><i>'+esc(o.notes)+'</i>' : ''}`
          : `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`;
        const labelMarker = L.marker(pt, {
          icon: L.divIcon({ className: 'move-label ' + unit.side, html: labelHtml, iconSize: null, iconAnchor: [-10, 10] }),
          interactive: false
        });
        labelMarker._orderId = o.id;
        LG.movement.addLayer(labelMarker);
      }
      return;
    }

    // Path order
    const n = o.points.length;
    const [latA, lngA] = o.points[n-2];
    const [latB, lngB] = o.points[n-1];
    const cosLat = Math.cos(latB * Math.PI / 180);
    const dx = (lngB - lngA) * cosLat * 111320;
    const dy = (latB - latA) * 111320;
    const lastSegLen = Math.sqrt(dx*dx + dy*dy);
    const ux = lastSegLen > 0 ? dx/lastSegLen : 0;
    const uy = lastSegLen > 0 ? dy/lastSegLen : 0;

    // Order-type visual style
    const ostyle = getOrderStyle(o.orderType || 'move');

    // Order-graphics scale + per-type weight overrides. These let a battalion-scale
    // scenario triple the visible size of every arrow without touching the templates.
    const gfx = state.scenario.orderGraphics || { scale: 1.0, lineWeights: {} };
    const gfxScale = gfx.scale || 1.0;
    const orderTypeId = o.orderType || 'move';
    const effectiveWeight = (gfx.lineWeights && gfx.lineWeights[orderTypeId] != null)
      ? gfx.lineWeights[orderTypeId] : ostyle.weight;

    // Arrowhead geometry (filled arrows are bigger). Per-style bracketAngle is the
    // included angle at the arrow tip; per-style bracketLen overrides the default.
    const hasArrowhead = ostyle.arrowhead === 'bracket' || ostyle.arrowhead === 'filled';
    const defaultBracketLen = ostyle.arrowhead === 'filled' ? 380 : 280;
    const bracketLen = (ostyle.bracketLen || defaultBracketLen) * gfxScale;
    const totalBracketDeg = ostyle.bracketAngle || 56;
    const halfAngle = (totalBracketDeg / 2) * Math.PI / 180;
    const axialBack = bracketLen * Math.cos(halfAngle);
    const sideSpread = bracketLen * Math.sin(halfAngle);
    const offsetM = 55 * gfxScale;
    const trimmedPath = [...o.points];
    if (hasArrowhead) {
      // For outlineBracket, trim so the double shaft lines land exactly on the inner
      // edge of the bracket wings at perpendicular = offsetM. Otherwise use the old
      // proportional trim that keeps the shaft behind the filled triangle / open V.
      let trimBack;
      if (ostyle.outlineBracket && sideSpread > 0) {
        const capLen = Math.max(60 * gfxScale, bracketLen * 0.2);
        trimBack = capLen + (offsetM / sideSpread) * axialBack;
      } else {
        trimBack = axialBack * 0.85;
      }
      trimBack = Math.min(trimBack, lastSegLen * 0.9);
      const trimLat = latB - uy * trimBack / 111320;
      const trimLng = lngB - ux * trimBack / (cosLat * 111320);
      trimmedPath[trimmedPath.length - 1] = [trimLat, trimLng];
    }

    // Hook radius (also used to offset the start of the line so it's tangent to the hook circle)
    const hookR = 90 * gfxScale;

    // If this order has a hook, shift the line's starting point perpendicular to travel
    // (to the LEFT-of-travel side) by hookR, so the line runs tangent to a circle
    // centered on the unit with radius hookR.
    if (ostyle.hook && o.points.length >= 2) {
      const sp = o.points[0];
      const cosLatH = Math.cos(sp[0] * Math.PI / 180);
      const [latNx, lngNx] = o.points[1];
      const dxH = (lngNx - sp[1]) * cosLatH * 111320;
      const dyH = (latNx - sp[0]) * 111320;
      const lenH = Math.sqrt(dxH*dxH + dyH*dyH) || 1;
      const uxH = dxH / lenH, uyH = dyH / lenH;
      // Left-of-travel perpendicular in (lng-metres, lat-metres): (-uy, ux)
      trimmedPath[0] = [
        sp[0] + uxH * hookR / 111320,
        sp[1] + (-uyH) * hookR / (cosLatH * 111320)
      ];
    }

    const lineStyle = {
      color, weight: effectiveWeight, opacity: 0.9,
      lineCap: 'square', lineJoin: 'miter',
      dashArray: ostyle.dashArray || null
    };

    if (ostyle.singleLine) {
      // Single centered line (no parallel offset pair)
      const poly = L.polyline(trimmedPath, lineStyle);
      poly._orderId = o.id;
      poly.on('click', handleClick);
      LG.movement.addLayer(poly);
    } else {
      const leftPath = offsetPolyline(trimmedPath, offsetM);
      const rightPath = offsetPolyline(trimmedPath, -offsetM);
      const polyL = L.polyline(leftPath, lineStyle);
      const polyR = L.polyline(rightPath, lineStyle);
      polyL._orderId = o.id; polyR._orderId = o.id;
      polyL.on('click', handleClick);
      polyR.on('click', handleClick);
      LG.movement.addLayer(polyL);
      LG.movement.addLayer(polyR);
    }

    // Hook for Withdraw orders: 270° arc centered on the unit, tangent to the line (APP-6 withdrawal)
    if (ostyle.hook && o.points.length >= 2) {
      const startPt = o.points[0];
      const cosLatS = Math.cos(startPt[0] * Math.PI / 180);
      const [latA2, lngA2] = o.points[1];
      const dxS = (lngA2 - startPt[1]) * cosLatS * 111320;
      const dyS = (latA2 - startPt[0]) * 111320;
      const lenS = Math.sqrt(dxS*dxS + dyS*dyS) || 1;
      const uxS = dxS/lenS, uyS = dyS/lenS;

      // Tangent point sits on the LEFT-of-travel perpendicular from the unit, at radius hookR.
      // Its angle from the unit centre (in standard math convention, angle 0 = +lng, π/2 = +lat):
      //   atan2(uxS, -uyS)  — derived from perp vector (-uy, ux) in (lng, lat).
      const theta0 = Math.atan2(uxS, -uyS);
      // Sweep 270° counter-clockwise so the arc wraps around the right-of-travel side,
      // leaving a 90° opening on the same side as the trailing line.
      const sweep = 1.5 * Math.PI;
      const steps = 48;
      const hookPts = [];
      for (let i = 0; i <= steps; i++) {
        const th = theta0 + sweep * i / steps;
        hookPts.push([
          startPt[0] + Math.sin(th) * hookR / 111320,
          startPt[1] + Math.cos(th) * hookR / (cosLatS * 111320)
        ]);
      }
      const hook = L.polyline(hookPts, {
        color, weight: effectiveWeight, opacity: 0.9,
        lineCap: 'round', lineJoin: 'round'
      });
      hook._orderId = o.id;
      hook.on('click', handleClick);
      LG.movement.addLayer(hook);
    }

    // Letter label (e.g. "W" for Withdraw): placed at the midpoint of the trimmed line,
    // coloured to match the arrow, no background.
    if (ostyle.letter) {
      let total = 0;
      const segLens = [];
      for (let i = 0; i < trimmedPath.length - 1; i++) {
        const [la, lo] = trimmedPath[i];
        const [lb, lob] = trimmedPath[i+1];
        const cL = Math.cos(la * Math.PI / 180);
        const sx = (lob - lo) * cL * 111320;
        const sy = (lb - la) * 111320;
        const sl = Math.sqrt(sx*sx + sy*sy);
        segLens.push(sl);
        total += sl;
      }
      const half = total / 2;
      let acc = 0, mLat = trimmedPath[0][0], mLng = trimmedPath[0][1];
      for (let i = 0; i < segLens.length; i++) {
        if (acc + segLens[i] >= half) {
          const t = segLens[i] > 0 ? (half - acc) / segLens[i] : 0;
          mLat = trimmedPath[i][0] + (trimmedPath[i+1][0] - trimmedPath[i][0]) * t;
          mLng = trimmedPath[i][1] + (trimmedPath[i+1][1] - trimmedPath[i][1]) * t;
          break;
        }
        acc += segLens[i];
      }
      const letterHtml = `<div style="color:${color};font-weight:700;font-size:20px;font-family:Arial,sans-serif;line-height:1;white-space:nowrap;">${esc(ostyle.letter)}</div>`;
      const letterMarker = L.marker([mLat, mLng], {
        icon: L.divIcon({ className: '', html: letterHtml, iconSize: [18, 20], iconAnchor: [9, 10] }),
        interactive: false
      });
      letterMarker._orderId = o.id;
      LG.movement.addLayer(letterMarker);
    }

    // Gap mark for Breach orders: small cross on the midpoint
    if (ostyle.gapMark) {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      const gapMarker = L.circleMarker(midPt, { radius: 7, color: '#fff', fillColor: color, fillOpacity: 1, weight: 2 });
      gapMarker._orderId = o.id;
      LG.movement.addLayer(gapMarker);
    }

    // Zigzag mark for Disrupt
    if (ostyle.zigzag) {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      L.marker(midPt, {
        icon: L.divIcon({ className: 'move-label ' + unit.side, html: '⚡', iconSize: null, iconAnchor: [-4, -4] }),
        interactive: false
      }).addTo(LG.movement);
    }

    // Disrupt fork: at midpoint, perpendicular branches lead to two offset lines with bracket arrowheads, staggered echelon-left
    if (ostyle.disruptFork && trimmedPath.length >= 2) {
      // ── Find midpoint along the trimmed path ──
      let fTotal = 0;
      const fSegLens = [];
      for (let fi = 0; fi < trimmedPath.length - 1; fi++) {
        const [fla, flo] = trimmedPath[fi];
        const [flb, flob] = trimmedPath[fi + 1];
        const fcL = Math.cos(fla * Math.PI / 180);
        const fsx = (flob - flo) * fcL * 111320;
        const fsy = (flb - fla) * 111320;
        fSegLens.push(Math.sqrt(fsx * fsx + fsy * fsy));
        fTotal += fSegLens[fi];
      }
      const fHalf = fTotal / 2;
      let fAcc = 0, fmLat = trimmedPath[0][0], fmLng = trimmedPath[0][1], fMidIdx = 0;
      for (let fi = 0; fi < fSegLens.length; fi++) {
        if (fAcc + fSegLens[fi] >= fHalf) {
          const ft = fSegLens[fi] > 0 ? (fHalf - fAcc) / fSegLens[fi] : 0;
          fmLat = trimmedPath[fi][0] + (trimmedPath[fi + 1][0] - trimmedPath[fi][0]) * ft;
          fmLng = trimmedPath[fi][1] + (trimmedPath[fi + 1][1] - trimmedPath[fi][1]) * ft;
          fMidIdx = fi;
          break;
        }
        fAcc += fSegLens[fi];
      }

      // ── Build second-half path: midpoint → end of trimmedPath ──
      const secHalf = [[fmLat, fmLng]];
      for (let fi = fMidIdx + 1; fi < trimmedPath.length; fi++) {
        secHalf.push([trimmedPath[fi][0], trimmedPath[fi][1]]);
      }

      // ── Offset the second half to create left/right fork paths ──
      const forkOff = 100; // perpendicular offset in metres
      const leftFork = offsetPolyline(secHalf, forkOff);
      const rightFork = offsetPolyline(secHalf, -forkOff);

      // ── Stagger: shorten left fork, extend right fork ──
      const secLen = fTotal - fHalf;
      const stag = Math.min(secLen * 0.12, 150);
      function adjustEnd(path, dist) {
        if (path.length < 2) return path;
        const r = path.map(p => [p[0], p[1]]);
        const pn = r.length;
        const [pa, poa] = r[pn - 2];
        const [pb, pob] = r[pn - 1];
        const pcL = Math.cos(pb * Math.PI / 180);
        const pdx = (pob - poa) * pcL * 111320;
        const pdy = (pb - pa) * 111320;
        const psl = Math.sqrt(pdx * pdx + pdy * pdy);
        if (psl < 0.1) return r;
        r[pn - 1] = [
          pb + (pdy / psl) * dist / 111320,
          pob + (pdx / psl) * dist / (pcL * 111320)
        ];
        return r;
      }
      const leftForkAdj = adjustEnd(leftFork, -stag);
      const rightForkAdj = adjustEnd(rightFork, stag);

      // ── Render each fork: trimmed line + bracket arrowhead ──
      function renderForkLine(forkPath) {
        const fn = forkPath.length;
        if (fn < 2) return;
        const [fEndA_lat, fEndA_lng] = forkPath[fn - 2];
        const [fEndB_lat, fEndB_lng] = forkPath[fn - 1];
        const fcLat = Math.cos(fEndB_lat * Math.PI / 180);
        const fdx = (fEndB_lng - fEndA_lng) * fcLat * 111320;
        const fdy = (fEndB_lat - fEndA_lat) * 111320;
        const fsl = Math.sqrt(fdx * fdx + fdy * fdy);
        if (fsl < 1) return;
        const fux = fdx / fsl, fuy = fdy / fsl;

        // Draw fork line (no trim — line runs all the way to the arrowhead tip)
        const fl = L.polyline(forkPath, lineStyle);
        fl._orderId = o.id;
        fl.on('click', handleClick);
        LG.movement.addLayer(fl);

        // Small bracket arrowhead at line end
        const fBracket = 50;
        const fHalfAng = 28 * Math.PI / 180;
        const fAxial = fBracket * Math.cos(fHalfAng);
        const fSpread = fBracket * Math.sin(fHalfAng);
        const lwLat = fEndB_lat + (-fuy * fAxial + fux * fSpread) / 111320;
        const lwLng = fEndB_lng + (-fux * fAxial + (-fuy) * fSpread) / (fcLat * 111320);
        const rwLat = fEndB_lat + (-fuy * fAxial - fux * fSpread) / 111320;
        const rwLng = fEndB_lng + (-fux * fAxial - (-fuy) * fSpread) / (fcLat * 111320);
        const wSt = { color, weight: Math.max(effectiveWeight, 3), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const wL = L.polyline([[fEndB_lat, fEndB_lng], [lwLat, lwLng]], wSt);
        const wR = L.polyline([[fEndB_lat, fEndB_lng], [rwLat, rwLng]], wSt);
        wL._orderId = o.id; wR._orderId = o.id;
        wL.on('click', handleClick); wR.on('click', handleClick);
        LG.movement.addLayer(wL);
        LG.movement.addLayer(wR);
      }
      renderForkLine(leftForkAdj);
      renderForkLine(rightForkAdj);

      // ── Center arrowhead (same small bracket as forks) ──
      if (lastSegLen > 0) {
        const cBracket = 50;
        const cHalfAng = 28 * Math.PI / 180;
        const cAxial = cBracket * Math.cos(cHalfAng);
        const cSpread = cBracket * Math.sin(cHalfAng);
        const ceLat = trimmedPath[trimmedPath.length - 1][0];
        const ceLng = trimmedPath[trimmedPath.length - 1][1];
        const ccL = Math.cos(ceLat * Math.PI / 180);
        const clwLat = ceLat + (-uy * cAxial + ux * cSpread) / 111320;
        const clwLng = ceLng + (-ux * cAxial + (-uy) * cSpread) / (ccL * 111320);
        const crwLat = ceLat + (-uy * cAxial - ux * cSpread) / 111320;
        const crwLng = ceLng + (-ux * cAxial - (-uy) * cSpread) / (ccL * 111320);
        const cwSt = { color, weight: Math.max(effectiveWeight, 3), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const cwL = L.polyline([[ceLat, ceLng], [clwLat, clwLng]], cwSt);
        const cwR = L.polyline([[ceLat, ceLng], [crwLat, crwLng]], cwSt);
        cwL._orderId = o.id; cwR._orderId = o.id;
        cwL.on('click', handleClick); cwR.on('click', handleClick);
        LG.movement.addLayer(cwL);
        LG.movement.addLayer(cwR);
      }

      // ── Perpendicular connectors: center midpoint → fork starts ──
      const connSt = { color, weight: effectiveWeight, opacity: 0.9, lineCap: 'square' };
      const cL = L.polyline([[fmLat, fmLng], leftFork[0]], connSt);
      const cR = L.polyline([[fmLat, fmLng], rightFork[0]], connSt);
      cL._orderId = o.id; cR._orderId = o.id;
      cL.on('click', handleClick); cR.on('click', handleClick);
      LG.movement.addLayer(cL);
      LG.movement.addLayer(cR);
    }

    // Start bar for Breach: perpendicular line across the unit spanning the corridor width
    if (ostyle.startBar && o.points.length >= 2) {
      const sp = o.points[0];
      const cosLatB = Math.cos(sp[0] * Math.PI / 180);
      const [latNx, lngNx] = o.points[1];
      const dxB = (lngNx - sp[1]) * cosLatB * 111320;
      const dyB = (latNx - sp[0]) * 111320;
      const lenB = Math.sqrt(dxB*dxB + dyB*dyB) || 1;
      const uxB = dxB/lenB, uyB = dyB/lenB;
      const barHalf = 55; // matches offsetM used for the parallel lines
      const bLat1 = sp[0] + uxB * barHalf / 111320;
      const bLng1 = sp[1] + (-uyB) * barHalf / (cosLatB * 111320);
      const bLat2 = sp[0] - uxB * barHalf / 111320;
      const bLng2 = sp[1] - (-uyB) * barHalf / (cosLatB * 111320);
      const bar = L.polyline([[bLat1, bLng1], [bLat2, bLng2]], {
        color, weight: effectiveWeight, opacity: 0.9, lineCap: 'square'
      });
      bar._orderId = o.id;
      bar.on('click', handleClick);
      LG.movement.addLayer(bar);
    }

    // End ticks for Breach: 45° flanges centered on each parallel line's endpoint, angling outward
    if (ostyle.endTicks && lastSegLen > 0 && !ostyle.singleLine) {
      const tickLen = 80; // metres (total length, half each side)
      const halfTick = tickLen / 2;
      const offsetM_local = 55;
      const lp = offsetPolyline(trimmedPath, offsetM_local);
      const rp = offsetPolyline(trimmedPath, -offsetM_local);
      const leftEnd = lp[lp.length - 1];
      const rightEnd = rp[rp.length - 1];
      const norm = Math.SQRT1_2;
      // Left tick direction: 45° angled outward = combine travel with outward-perp (-uy, ux)
      const lxDir = (ux + uy) * norm, lyDir = (uy - ux) * norm;
      // Right tick direction: 45° angled outward = combine travel with outward-perp (uy, -ux)
      const rxDir = (ux - uy) * norm, ryDir = (uy + ux) * norm;
      const cosLatL = Math.cos(leftEnd[0] * Math.PI / 180);
      const cosLatR = Math.cos(rightEnd[0] * Math.PI / 180);
      const leftTickA = [
        leftEnd[0] - lyDir * halfTick / 111320,
        leftEnd[1] - lxDir * halfTick / (cosLatL * 111320)
      ];
      const leftTickB = [
        leftEnd[0] + lyDir * halfTick / 111320,
        leftEnd[1] + lxDir * halfTick / (cosLatL * 111320)
      ];
      const rightTickA = [
        rightEnd[0] - ryDir * halfTick / 111320,
        rightEnd[1] - rxDir * halfTick / (cosLatR * 111320)
      ];
      const rightTickB = [
        rightEnd[0] + ryDir * halfTick / 111320,
        rightEnd[1] + rxDir * halfTick / (cosLatR * 111320)
      ];
      const tickStyle = { color, weight: effectiveWeight, opacity: 0.9, lineCap: 'square' };
      const tL = L.polyline([leftTickA, leftTickB], tickStyle);
      const tR = L.polyline([rightTickA, rightTickB], tickStyle);
      tL._orderId = o.id; tR._orderId = o.id;
      tL.on('click', handleClick); tR.on('click', handleClick);
      LG.movement.addLayer(tL);
      LG.movement.addLayer(tR);
    }

    // Arrowhead — bracket (open), filled (solid triangle), or outlineBracket (hollow
    // hexagonal shape with end caps parallel to the arrow direction, per NATO main-attack
    // convention).
    if (lastSegLen > 0 && hasArrowhead) {
      const leftWingLat  = latB + (-uy * axialBack + (ux)  * sideSpread) / 111320;
      const leftWingLng  = lngB + (-ux * axialBack + (-uy) * sideSpread) / (cosLat * 111320);
      const rightWingLat = latB + (-uy * axialBack - (ux)  * sideSpread) / 111320;
      const rightWingLng = lngB + (-ux * axialBack - (-uy) * sideSpread) / (cosLat * 111320);
      if (ostyle.arrowhead === 'filled') {
        const tri = L.polygon([[latB, lngB], [leftWingLat, leftWingLng], [rightWingLat, rightWingLng]], {
          color, fillColor: color, fillOpacity: 0.9, weight: 2, lineJoin: 'miter'
        });
        tri._orderId = o.id;
        tri.on('click', handleClick);
        LG.movement.addLayer(tri);
      } else if (ostyle.outlineBracket) {
        // Hollow hexagonal bracket outline. Outer edges run from the tip outward at
        // ±halfAngle; inner edges are parallel, shifted backward along the arrow axis
        // by `capLen` (the length of the end-cap segments). End caps at each wing tip
        // are parallel to the arrow direction of travel.
        // Layout in arrow-local frame (tip at origin, +axial = forward):
        //   T  = tip (0, 0)
        //   UO = (-axialBack,         +sideSpread)       outer upper tip
        //   UI = (-axialBack - capLen,+sideSpread)       inner upper tip
        //   BI = (-capLen, 0)                            inner base on shaft axis
        //   LI = (-axialBack - capLen,-sideSpread)       inner lower tip
        //   LO = (-axialBack,         -sideSpread)       outer lower tip
        // Mapped back through (ux, uy) (arrow direction) and the LEFT perpendicular
        // (-uy, ux). Moving "backward along axis" by d means: subtract d*ux from lng-m
        // and d*uy from lat-m. Moving "perpendicular +sideSpread" means: add s*(-uy) to
        // lat-m and s*ux to lng-m (that's the left-of-travel direction in this code).
        const capLen = Math.max(60, bracketLen * 0.2);
        const toLatLng = (axialOffset, perpOffset) => [
          latB + (-uy * axialOffset + (-ux) * perpOffset) / 111320,
          lngB + (-ux * axialOffset + ( uy) * perpOffset) / (cosLat * 111320)
        ];
        // Note: sideSpread-signed axis matches the existing left/right wing formulas.
        // leftWingLat/Lng used -uy*axialBack + ux*sideSpread for lat — this corresponds
        // to the "left" perpendicular being (+ux, -uy) in lat/lng metres. Re-derive UI.
        const leftPerpSignLat =  ux;   // per the left wing formula coefficient on sideSpread
        const leftPerpSignLng = -uy;
        const pt = (axial, perp) => [
          latB + (-uy * axial + leftPerpSignLat * perp) / 111320,
          lngB + (-ux * axial + leftPerpSignLng * perp) / (cosLat * 111320)
        ];
        const T  = [latB, lngB];
        const UO = pt(axialBack,           sideSpread);
        const UI = pt(axialBack + capLen,  sideSpread);
        const BI = pt(capLen,              0);
        const LI = pt(axialBack + capLen, -sideSpread);
        const LO = pt(axialBack,          -sideSpread);
        const outline = L.polyline([T, UO, UI, BI, LI, LO, T], {
          color, weight: Math.max(effectiveWeight, 3), opacity: 1,
          lineCap: 'butt', lineJoin: 'miter'
        });
        outline._orderId = o.id;
        outline.on('click', handleClick);
        LG.movement.addLayer(outline);
      } else {
        const wingStyle = { color, weight: Math.max(effectiveWeight, 4), opacity: 1, lineCap: 'square', lineJoin: 'miter' };
        const wingL = L.polyline([[latB, lngB], [leftWingLat, leftWingLng]],  wingStyle);
        const wingR = L.polyline([[latB, lngB], [rightWingLat, rightWingLng]], wingStyle);
        wingL._orderId = o.id; wingR._orderId = o.id;
        wingL.on('click', handleClick); wingR.on('click', handleClick);
        LG.movement.addLayer(wingL);
        LG.movement.addLayer(wingR);
      }
    }

    // Precompute summary
    const s = movementOrderSummary(unit, o);
    const mode = state.orderLabelMode || 'full';

    if (mode !== 'off') {
      const midIdx = Math.floor(o.points.length / 2);
      const midPt = o.points[midIdx];
      const midHtml = mode === 'full'
        ? `<b>${typeDef.name.toUpperCase()}</b>${unit.designation?' · '+esc(unit.designation):''}<br>${s.totalKm.toFixed(2)} km · ${s.turns.toFixed(1)} t · ${s.durationMin.toFixed(0)} min${o.notes ? '<br><i>'+esc(o.notes).slice(0,40)+(o.notes.length>40?'…':'')+'</i>' : ''}`
        : `<b>${typeDef.name.toUpperCase()}</b>${o.notes ? ' · '+esc(o.notes).slice(0,30) : ''}`;
      const verbLabel = L.marker(midPt, {
        icon: L.divIcon({ className: 'move-label ' + unit.side, html: midHtml, iconSize: null, iconAnchor: [-8, -6] }),
        interactive: false
      });
      verbLabel._orderId = o.id;
      LG.movement.addLayer(verbLabel);
    }

    // Endpoint tooltip: full mode only
    if (mode === 'full') {
      const endpoint = o.points[n-1];
      const labelMarker = L.marker(endpoint, {
        icon: L.divIcon({
          className: 'move-label ' + unit.side,
          html: `<b>${esc(unit.name)}${unit.designation?' '+esc(unit.designation):''}</b><br>${s.startText} → ${s.etaText}`,
          iconSize: null, iconAnchor: [-10, 14]
        }),
        interactive: false
      });
      labelMarker._orderId = o.id;
      LG.movement.addLayer(labelMarker);
    }
  });
}

function openMovementOrderEditor(order) {
  const unit = getUnit(order.unitId);
  if (!unit) return;
  const typeDef = getOrderType(order.orderType || 'move');
  const s = movementOrderSummary(unit, order);
  const isPath = order.points.length >= 2;

  const typeOpts = ORDER_TYPES.map(t =>
    `<option value="${t.id}" ${order.orderType===t.id?'selected':''}>${esc(t.name)}</option>`
  ).join('');

  let segHtml = '';
  if (isPath) {
    const mvEntries = getActiveMovement(unit);
    for (let i = 1; i < order.points.length; i++) {
      const mode = order.segmentModes && order.segmentModes[i-1] || (mvEntries.length>1?mvEntries[1].id:mvEntries[0]?.id||'');
      const dist = L.latLng(order.points[i-1]).distanceTo(L.latLng(order.points[i]));
      const opts = mvEntries.map(e => {
        const spd = getMovementSpeed(unit, e.id);
        return `<option value="${e.id}" ${mode===e.id?'selected':''}>${esc(e.abbr||e.name)} (${spd.toFixed(1)} km/t)</option>`;
      }).join('');
      segHtml += `<div class="inline-row">
        <span class="label">Seg ${i} (${formatDist(dist)})</span>
        <select onchange="setMovementSegmentMode('${order.id}',${i-1},this.value)">
          ${opts}
        </select>
      </div>`;
    }
  }

  // Convert ISO to datetime-local format (strip seconds and Z)
  const toLocal = iso => iso ? iso.slice(0,16) : '';
  const startVal = toLocal(order.startTime || s.startIso);
  const endVal = toLocal(order.endTime || s.endIso);

  showModal(`
    <h3>Edit Order — ${esc(unit.name)}</h3>
    <div class="field-group"><label>Order Type</label>
      <select onchange="setOrderType('${order.id}',this.value)">${typeOpts}</select>
      <p style="font-size:10px;color:var(--text-dim);margin-top:3px">${esc(typeDef.desc)}</p>
    </div>
    <div class="field-group row">
      <div><label>Start Time (UTC)</label>
        <input type="datetime-local" value="${startVal}" oninput="setOrderTime('${order.id}','startTime',this.value)"></div>
      <div><label>End Time (UTC)</label>
        <input type="datetime-local" value="${endVal}" oninput="setOrderTime('${order.id}','endTime',this.value)"></div>
    </div>
    <div class="btn-row">
      <button class="small ghost" onclick="clearOrderTime('${order.id}','startTime');this.closest('.modal-overlay').remove();openMovementOrderEditor(state.movementOrders.find(x=>x.id==='${order.id}'))">Auto start</button>
      <button class="small ghost" onclick="clearOrderTime('${order.id}','endTime');this.closest('.modal-overlay').remove();openMovementOrderEditor(state.movementOrders.find(x=>x.id==='${order.id}'))">Auto end</button>
    </div>
    ${!isPath ? `<div class="field-group"><label>Duration (minutes)</label>
      <input type="number" value="${order.duration || 60}" min="1" oninput="setOrderDuration('${order.id}',parseInt(this.value)||0)"></div>` : ''}
    <div class="field-group"><label>Notes</label>
      <textarea oninput="setOrderNotes('${order.id}',this.value)">${esc(order.notes||'')}</textarea></div>
    ${isPath ? '<div class="section-head">Movement Segments</div>' + segHtml : ''}
    <div style="margin-top:10px;font-size:12px;background:var(--bg-alt);padding:8px;border-radius:4px">
      ${isPath ? `<b>${s.totalKm.toFixed(2)} km</b> · <b>${s.turns.toFixed(1)} turns</b><br>` : ''}
      Dest: ${s.destLat.toFixed(4)}°N ${s.destLng.toFixed(4)}°E<br>
      Start: ${s.startText}<br>End: ${s.etaText}<br>
      Duration: ${s.durationMin.toFixed(0)} min
    </div>
    <div class="btn-row">
      <button onclick="this.closest('.modal-overlay').remove()">Done</button>
      <button class="danger" onclick="cancelMovementOrder('${order.id}');this.closest('.modal-overlay').remove()">Cancel Order</button>
    </div>`);
}

function setOrderType(orderId, type) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.orderType = type;
  const typeDef = getOrderType(type);
  // If switching between path/static, warn about geometry but don't auto-convert
  renderMovementOrders();
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) { overlay.remove(); openMovementOrderEditor(o); }
}

function setOrderTime(orderId, field, val) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o[field] = val ? val + ':00Z' : null;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function clearOrderTime(orderId, field) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o[field] = null;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function setOrderDuration(orderId, minutes) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.duration = minutes;
  renderMovementOrders();
  refreshUnitPanelIfOpen(o.unitId);
}

function setOrderNotes(orderId, notes) {
  const o = state.movementOrders.find(x => x.id === orderId);
  if (!o) return;
  o.notes = notes;
  renderMovementOrders();
}

function refreshUnitPanelIfOpen(unitId) {
  const unit = getUnit(unitId);
  if (!unit) return;
  renderUnit(unit); // refresh tooltip since orders may affect it
  if (document.getElementById('panelTitle').textContent === unit.name) {
    renderUnitEditPanel(document.getElementById('panelBody'), unit);
  }
}

function setMovementSegmentMode(orderId, segIdx, mode) {
  const order = state.movementOrders.find(o => o.id === orderId);
  if (!order) return;
  order.segmentModes[segIdx] = mode;
  renderMovementOrders();
  const overlay = document.querySelector('.modal-overlay');
  if (overlay) { overlay.remove(); openMovementOrderEditor(order); }
}

function cancelMovementOrder(orderId) {
  const order = state.movementOrders.find(o => o.id === orderId);
  if (order) {
    const unit = getUnit(order.unitId);
    const typeName = getOrderType(order.orderType || 'move').name;
    logCommitted(`${typeName} order cancelled: ${unit ? unit.name : '?'}`);
  }
  const unitId = order ? order.unitId : null;
  state.movementOrders = state.movementOrders.filter(o => o.id !== orderId);
  if (unitId) {
    const remaining = state.movementOrders.filter(o => o.unitId === unitId)
      .sort((a,b) => (a.sequenceIndex||0) - (b.sequenceIndex||0));
    remaining.forEach((o, i) => { o.sequenceIndex = i; });
  }
  renderMovementOrders();
  if (unitId) {
    const u = getUnit(unitId);
    if (u) renderUnit(u); // refresh tooltip
    refreshUnitPanelIfOpen(unitId);
  }
}

function showPlaceUnitModal(latlng) {
  // If there's a pending OOB deployment, use that
  if (deploymentPending) {
    const entry = findOOBEntry(deploymentPending.entryId);
    deployOOBEntry(deploymentPending.entryId, latlng);
    deploymentPending = null;
    setTool('pan');
    // Refresh OOB panel if it's open
    if (entry && document.getElementById('panelTitle')?.textContent === 'Scenario Builder') {
      const c = document.getElementById('scenContent');
      if (c) renderOOB(c, entry.side);
    }
    return;
  }

  const role = state.viewRole;
  // Determine which sides' OOB the current role can deploy from
  const sides = role === 'umpire' ? ['bluefor', 'opfor'] : [role];
  // Gather undeployed units from accessible OOBs
  const pool = [];
  sides.forEach(side => {
    collectUndeployedUnits(state.oob[side], side, pool, '');
  });

  const hasPool = pool.length > 0;

  // Suspected-enemy side defaults to opposite of the viewing role; umpire can choose.
  const defaultSuspSide = role === 'bluefor' ? 'opfor' : role === 'opfor' ? 'bluefor' : 'opfor';
  const suspSideField = role === 'umpire'
    ? `<div class="field-group"><label>Suspected side</label>
         <select id="ps_side">
           <option value="opfor" ${defaultSuspSide==='opfor'?'selected':''}>OPFOR (red)</option>
           <option value="bluefor" ${defaultSuspSide==='bluefor'?'selected':''}>BLUFOR (blue)</option>
         </select></div>`
    : `<input type="hidden" id="ps_side" value="${defaultSuspSide}">
       <div style="font-size:11px;color:var(--text-dim);margin:4px 0">Will be placed as suspected <b>${defaultSuspSide.toUpperCase()}</b>.</div>`;

  const oobSection = hasPool
    ? `<div class="field-group" style="border:1px solid var(--panel-border);border-radius:4px;padding:8px;margin-bottom:10px">
         <label style="font-weight:600;color:var(--success)">Deploy unit from OOB</label>
         <select id="pu_oob">${pool.map(p => `<option value="${p.entry.id}">[${sideAbbr(p.side)}] ${esc(p.pathLabel)}${esc(p.entry.name)}${p.entry.designation?' ('+esc(p.entry.designation)+')':''}</option>`).join('')}</select>
         <div class="btn-row" style="margin-top:6px"><button onclick="confirmDeployFromOOB(${latlng.lat},${latlng.lng});this.closest('.modal-overlay').remove()">Deploy</button></div>
       </div>`
    : `<div style="font-size:11px;color:var(--text-dim);margin-bottom:10px">No undeployed units in accessible OOB.</div>`;

  const suspSection = `<div class="field-group" style="border:1px solid var(--panel-border);border-radius:4px;padding:8px">
      <label style="font-weight:600;color:var(--warning)">Place suspected-enemy marker</label>
      ${suspSideField}
      <div class="field-group"><label>Notes (optional)</label>
        <textarea id="ps_notes" placeholder="e.g. Tracks NW, est. 2 vehicles" style="min-height:50px"></textarea></div>
      <div class="btn-row" style="margin-top:6px"><button onclick="confirmPlaceSuspected(${latlng.lat},${latlng.lng});this.closest('.modal-overlay').remove()">Place suspected</button></div>
    </div>`;

  const templateLink = role === 'umpire'
    ? `<div style="margin-top:8px;font-size:11px"><a href="#" style="color:var(--success)" onclick="this.closest('.modal-overlay').remove();showPlaceUnitFromTemplateModal({lat:${latlng.lat},lng:${latlng.lng}});return false">Place from raw template (umpire only)</a></div>`
    : '';

  showModal(`
    <h3>Place Unit</h3>
    ${oobSection}
    ${suspSection}
    ${templateLink}
    <div class="btn-row" style="margin-top:10px"><button onclick="this.closest('.modal-overlay').remove()">Cancel</button></div>`);
}

function confirmPlaceSuspected(lat, lng) {
  const role = state.viewRole;
  const side = document.getElementById('ps_side').value;
  const notes = document.getElementById('ps_notes').value || '';
  const unit = {
    id: uid(),
    isSuspectedMarker: true,
    name: `Suspected ${sideAbbr(side)}`,
    designation: '',
    description: '',
    type: 'other',
    side: side,
    placedBy: role,
    echelon: 'other',
    latlng: [lat, lng],
    notes: notes,
    addedAtTurn: state.turnNumber,
    addedAtTime: new Date().toISOString(),
    // Minimum shape to coexist with unit machinery
    states: [],
    activeStateId: null,
    detection: {},
    detectionId: {},
    fieldVisibility: {
      name: { showTooltip: true, showOpponent: false },
      designation: { showTooltip: false, showOpponent: false },
      side: { showTooltip: false, showOpponent: false },
      description: { showTooltip: false, showOpponent: false }
    },
    notesHistory: {},
    previousLatlng: null,
    customSVG: null
  };
  state.units.push(unit);
  renderUnit(unit);
  logCommitted(`Suspected ${sideAbbr(side)} placed at (${lat.toFixed(4)}, ${lng.toFixed(4)}) by ${role.toUpperCase()}`);
}

function collectUndeployedUnits(list, side, pool, pathPrefix) {
  if (!list) return;
  list.forEach(e => {
    if (e.type === 'unit' && !e.deployed) {
      pool.push({ entry: e, side, pathLabel: pathPrefix });
    } else if (e.type === 'formation') {
      const nextPath = pathPrefix + e.name + ' / ';
      collectUndeployedUnits(e.children, side, pool, nextPath);
    }
  });
}

function confirmDeployFromOOB(lat, lng) {
  const entryId = document.getElementById('pu_oob').value;
  deployOOBEntry(entryId, L.latLng(lat, lng));
  // If the Scenario Builder's OOB tab is open, refresh so Deploy→Withdraw flips
  const entry = findOOBEntry(entryId);
  if (entry && document.getElementById('panelTitle')?.textContent === 'Scenario Builder') {

    if (c) renderOOB(c, entry.side);
  }
}

function confirmPlaceRing(lat, lng) {
  const radii = document.getElementById('pr_radii').value.split(',').map(r => parseFloat(r.trim())).filter(r => r > 0);
  const color = document.getElementById('pr_color').value;
  const label = document.getElementById('pr_label').value || 'Range ring';
  const groupId = uid();
  const cosLat = Math.cos(lat * Math.PI / 180);
  const crossSize = Math.max(...radii) * 0.04; // cross arm length proportional to largest ring

  // Cross center marker — two short perpendicular lines
  const crossArm = crossSize / 111320;
  const crossArmLng = crossSize / (cosLat * 111320);
  addDrawing({
    layerId: state.currentLayerId, type: 'polyline',
    geometry: { points: [[lat - crossArm, lng], [lat + crossArm, lng]] },
    style: { color, weight: 2 },
    properties: { label: 'Center', group: groupId, groupLabel: label, groupType: 'Range ring' }
  });
  addDrawing({
    layerId: state.currentLayerId, type: 'polyline',
    geometry: { points: [[lat, lng - crossArmLng], [lat, lng + crossArmLng]] },
    style: { color, weight: 2 },
    properties: { label: 'Center', group: groupId, groupLabel: label, groupType: 'Range ring' }
  });

  // Ring circles
  radii.forEach(r => {
    addDrawing({
      layerId: state.currentLayerId, type: 'circle',
      geometry: { center: [lat, lng], radius: r },
      style: { color, weight: 1, fillOpacity: 0, dashArray: '4,4' },
      properties: { label: `${formatDist(r)}`, group: groupId, groupLabel: label, groupType: 'Range ring' }
    });
  });
}

function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  const ta = overlay.querySelector('textarea[autofocus]');
  if (ta) setTimeout(() => ta.focus(), 50);
  return overlay;
}

// In-app confirm dialog; avoids native window.confirm so the browser does NOT
// prompt "Prevent this page from creating additional dialogs" after repeat use.
// Usage: confirmModal('Delete foo?').then(ok => { if (ok) ... });
function confirmModal(message, opts) {
  opts = opts || {};
  const okLabel = opts.okLabel || 'OK';
  const cancelLabel = opts.cancelLabel || 'Cancel';
  const danger = opts.danger !== false; // default to danger styling for deletes
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `<div class="modal" style="max-width:420px">
      <div style="margin:4px 0 14px;white-space:pre-line">${esc(message)}</div>
      <div class="btn-row">
        <button id="cm_ok" ${danger?'class="danger"':''}>${esc(okLabel)}</button>
        <button id="cm_cancel">${esc(cancelLabel)}</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    const done = v => { overlay.remove(); resolve(v); };
    overlay.querySelector('#cm_ok').onclick = () => done(true);
    overlay.querySelector('#cm_cancel').onclick = () => done(false);
    // Esc cancels, Enter confirms
    const keyH = e => {
      if (e.key === 'Escape') { e.preventDefault(); e.stopPropagation(); done(false); document.removeEventListener('keydown', keyH, true); }
      else if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); done(true); document.removeEventListener('keydown', keyH, true); }
    };
    document.addEventListener('keydown', keyH, true);
    // Focus OK
    setTimeout(() => overlay.querySelector('#cm_ok').focus(), 30);
  });
}

// Current panel tracking so we can refresh it on role / state changes. Stored outside
// the scenario (not persisted to saves); the ctx we keep is usually just the unit or
// marker, which is looked up fresh via its id at refresh time so we don't hold stale data.
let currentPanel = { type: null, ctx: null };

function openPanel(type, ctx) {
  // In mirror mode, suppress all panels except the read-only / informational ones.
  // Clicking a unit or marker shouldn't open an editor that would diverge from the
  // editor window's canonical state.
  if (isMirrorMode && !['log','help','layers'].includes(type)) return;
  document.getElementById('panel').classList.add('open');
  currentPanel = { type, ctx };
  const body = document.getElementById('panelBody');
  const title = document.getElementById('panelTitle');

  switch (type) {
    case 'scenario': title.textContent = 'Scenario Builder'; renderScenarioPanel(body); break;
    case 'layers': title.textContent = 'Layers'; renderLayersPanel(body); break;
    case 'units': title.textContent = 'Units'; renderUnitsPanel(body); break;
    case 'markers': title.textContent = 'Game Markers'; renderMarkersPanel(body); break;
    case 'turns': title.textContent = 'Turn History'; renderTurnsPanel(body); break;
    case 'dice': title.textContent = 'Dice Roller'; renderDicePanel(body); break;
    case 'log': title.textContent = 'Action Log'; renderLogPanel(body); break;
    case 'help': title.textContent = 'Manual'; renderHelpPanel(body); break;
    case 'sync': {
      title.textContent = 'Sync Matrix';
      const requestedSide = ctx && ctx.side;
      const side = requestedSide || (state.viewRole === 'umpire' ? 'bluefor' : state.viewRole);
      renderSyncPanel(body, side);
      break;
    }
    case 'unit': title.textContent = ctx.name; renderUnitEditPanel(body, ctx); break;
    case 'marker': title.textContent = ctx.name; renderMarkerEditPanel(body, ctx); break;
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  currentPanel = { type: null, ctx: null };
}

// Re-render the currently-open panel with fresh state. Used after role changes so that
// visibility-gated content (unit tooltip sections, detection controls, side scoping
// etc.) updates without the user having to close and reopen the panel.
function refreshOpenPanel() {
  if (!currentPanel.type) return;
  if (!document.getElementById('panel').classList.contains('open')) return;
  // Look entities up fresh so we don't hold a stale reference if the user edited the unit
  // or marker through a different path.
  if (currentPanel.type === 'unit') {
    const u = currentPanel.ctx && getUnit(currentPanel.ctx.id);
    if (!u) { closePanel(); return; }
    openPanel('unit', u);
  } else if (currentPanel.type === 'marker') {
    const m = currentPanel.ctx && state.markers.find(x => x.id === currentPanel.ctx.id);
    if (!m) { closePanel(); return; }
    openPanel('marker', m);
  } else {
    openPanel(currentPanel.type, currentPanel.ctx);
  }
}

function openUnitPanel(unit) { openPanel('unit', unit); }
function openMarkerPanel(marker) { openPanel('marker', marker); }

// ── OOB (hierarchical) ────────────────────────────────────────────
function findOOBEntry(id, list) {
  const roots = list || [...state.oob.bluefor, ...state.oob.opfor];
  for (const entry of roots) {
    if (entry.id === id) return entry;
    if (entry.children && entry.children.length) {
      const f = findOOBEntry(id, entry.children);
      if (f) return f;
    }
  }
  return null;
}

function findOOBParent(entryId, side) {
  const roots = state.oob[side];
  function search(list) {
    for (const e of list) {
      if (e.children) {
        if (e.children.find(c => c.id === entryId)) return e;
        const p = search(e.children);
        if (p) return p;
      }
    }
    return null;
  }
  return search(roots);
}

// Walks up the OOB tree from a unit's OOB entry to find the nearest ancestor formation
// and returns its abbreviation. Falls back to an auto-generated abbr from the formation
// name so that units imported from older scenarios (or formations whose abbr was cleared)
// still get a sensible label rather than nothing.
function getUnitFormationAbbr(unit) {
  if (!unit || !unit.oobEntryId || !unit.side) return '';
  let parent = findOOBParent(unit.oobEntryId, unit.side);
  while (parent) {
    if (parent.type === 'formation') {
      return parent.abbr || suggestFormationAbbr(parent.name || '') || '';
    }
    parent = findOOBParent(parent.id, unit.side);
  }
  return '';
}

function removeOOBEntry(id, side) {
  function remove(list) {
    const idx = list.findIndex(e => e.id === id);
    if (idx >= 0) { list.splice(idx, 1); return true; }
    for (const e of list) {
      if (e.children && remove(e.children)) return true;
    }
    return false;
  }
  remove(state.oob[side]);
}

function addOOBEntry(side, parentId, entry) {
  entry.id = entry.id || uid();
  entry.side = side;
  entry.children = entry.children || [];
  if (parentId) {
    const parent = findOOBEntry(parentId);
    if (parent) { parent.children.push(entry); return entry; }
  }
  state.oob[side].push(entry);
  return entry;
}

function renderOOB(c, side) {
  const roots = state.oob[side];
  // Each side's OOB configures the custom SVG override for the suspected-enemy marker

function renderOOBList(list, side, depth) {
  if (!list || list.length === 0) return depth === 0 ? '<p style="font-size:11px;color:var(--text-dim)">Empty.</p>' : '';
  let html = '';
  list.forEach(e => {
    const indent = depth * 16;
    const isFormation = e.type === 'formation';
    const deployed = e.deployed ? '✓' : '';
    const icon = isFormation ? '📁' : '▲';
    const deployedStyle = e.deployed ? 'color:var(--success)' : '';
    const nameLabel = isFormation
      ? `${esc(e.name)}${e.abbr ? ` <span style="color:var(--text-dim);font-size:10px">(${esc(e.abbr)})</span>` : ''}`
      : `${esc(e.name)}${e.designation?' ('+esc(e.designation)+')':''}`;
    html += `<div class="list-item" style="margin-left:${indent}px">
      <span>${icon}</span>
      <span class="name">${nameLabel}</span>
      ${!isFormation ? `<span class="meta" style="${deployedStyle}">${e.deployed ? 'deployed' : 'pool'}</span>` : ''}
      <div class="actions">
        ${isFormation ? `
          <button class="small" onclick="promptAddOOB('${side}','${e.id}','formation')">+F</button>
          <button class="small" onclick="promptAddOOB('${side}','${e.id}','unit')">+U</button>
        ` : `
          ${!e.deployed ? `<button class="small" onclick="startDeployOOBEntry('${e.id}')">Deploy</button>` : `<button class="small" onclick="withdrawOOBUnit('${e.id}')">Withdraw</button>`}
        `}
        <button class="small" onclick="editOOBEntry('${e.id}')">Edit</button>
        <button class="small danger" onclick="confirmDeleteOOB('${e.id}','${side}')">×</button>
      </div>
    </div>`;
    if (e.children && e.children.length) {
      html += renderOOBList(e.children, side, depth + 1);
    }
  });
  return html;
}

function promptAddOOB(side, parentId, type) {
  if (type === 'formation') {
    showFormationModal({ isNew: true, side, parentId, name: 'Battlegroup Alpha', abbr: 'BG A' });

  }
  // Unit: pick template first
  const opts = state.unitTemplates.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('');
  showModal(`
    <h3>Add Unit to OOB</h3>
    <div class="field-group"><label>From Template</label>
      <select id="oob_tmpl">${opts}</select></div>
    <div class="field-group"><label>Custom Name (optional)</label>
      <input type="text" id="oob_name"></div>
    <div class="field-group"><label>Designation</label>
      <input type="text" id="oob_desig" placeholder="e.g. 1/49"></div>
    <div class="btn-row">
      <button onclick="confirmAddOOBUnit('${side}','${parentId||''}');this.closest('.modal-overlay').remove()">Add</button>
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>

}

// Modal for adding a new formation or editing an existing one. Handles both name and abbreviation.
function showFormationModal(ctx) {
  // ctx: { isNew, side, parentId?, entryId?, name, abbr }
  const overlay = showModal(`
    <h3>${ctx.isNew ? 'Add Formation' : 'Edit Formation'}</h3>
    <div class="field-group"><label>Name</label>
      <input type="text" id="fm_name" value="${esc(ctx.name || '')}" autofocus></div>
    <div class="field-group"><label>Abbreviation (short label, e.g. "BG A" for Battlegroup Alpha)</label>
      <input type="text" id="fm_abbr" value="${esc(ctx.abbr || '')}" placeholder="optional"></div>
    <div class="btn-row">
      <button id="fm_save">${ctx.isNew ? 'Add' : 'Save'}</button>
      <button onclick="this.closest('.modal-overlay').remove()">Cancel</button>
    </div>`);
  // Auto-suggest abbr as user types name, unless they've already customised abbr
  const nameEl = overlay.querySelector('#fm_name');
  const abbrEl = overlay.querySelector('#fm_abbr');
  let abbrDirty = !!(ctx.abbr && !ctx.isNew); // existing entries keep their abbr
  abbrEl.addEventListener('input', () => { abbrDirty = true; });
  nameEl.addEventListener('input', () => {
    if (abbrDirty) return;
    abbrEl.value = suggestFormationAbbr(nameEl.value);
  });
  // Focus name and select so typing replaces the template default
  setTimeout(() => { nameEl.focus(); nameEl.select(); }, 40);
  overlay.querySelector('#fm_save').onclick = () => {
    const name = nameEl.value.trim();
    const abbr = abbrEl.value.trim();
    if (!name) return;
    if (ctx.isNew) {
      addOOBEntry(ctx.side, ctx.parentId, { type: 'formation', name, abbr });
    } else {
      const entry = findOOBEntry(ctx.entryId);
      if (entry) { entry.name = name; entry.abbr = abbr; }
    }
    overlay.remove();
    renderOOB(document.getElementById('scenContent'), ctx.side);
  };
}

// Suggest a formation abbreviation: first word's first 2 letters (upper-case)
// + space + first letter of each subsequent word (upper-case).
// e.g. "Battlegroup Alpha" → "BG A", "1st Tank Battalion" → "1S T B".
function suggestFormationAbbr(name) {
  const words = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (words.length === 0) return '';
  const head = words[0].slice(0, 2).toUpperCase();
  const tail = words.slice(1).map(w => (w[0] || '').toUpperCase()).join(' ');
  return tail ? `${head} ${tail}` : head;
}

function confirmAddOOBUnit(side, parentId) {
  const tid = document.getElementById('oob_tmpl').value;
  const tmpl = state.unitTemplates.find(t => t.id === tid);
  if (!tmpl) return;
  const name = document.getElementById('oob_name').value || tmpl.name;
  const desig = document.getElementById('oob_desig').value;
  const entry = {
    type: 'unit',
    templateId: tmpl.id,
    name,
    designation: desig,
    description: tmpl.description || '',
    states: cloneDeep(tmpl.states || []),
    customSVG: tmpl.customSVG || null,
    notes: '',
    deployed: false,
    unitId: null
  };
  addOOBEntry(side, parentId === '' ? null : parentId, entry);
  renderOOB(document.getElementById('scenContent'), side);
}

function editOOBEntry(id) {

    <textarea style="min-height:60px;font-family:var(--mono);font-size:10px" oninput="findOOBEntry('${id}').customSVG=this.value||null">${esc(entry.customSVG||'')}</textarea>

function confirmDeleteOOB(id, side) {
  const entry = findOOBEntry(id);
  if (!entry) return;
  const childCount = entry.children ? entry.children.length : 0;
  confirmModal(`Delete "${entry.name}"${childCount>0?' and '+childCount+' children':''}?`).then(ok => {
    if (!ok) return;
    if (entry.deployed && entry.unitId) {
      // also remove deployed unit
      withdrawUnit(entry.unitId);
    }
    removeOOBEntry(id, side);
    renderOOB(document.getElementById('scenContent'), side);
  });
}

let deploymentPending = null; // {entryId}
function startDeployOOBEntry(entryId) {
  deploymentPending = { entryId };
  setTool('unit');
  document.getElementById('modeDisplay').textContent = `Click map to deploy OOB unit (panel stays open)`;
  // Panel stays open so user can deploy multiple units in succession
}

function withdrawOOBUnit(entryId) {
  const entry = findOOBEntry(entryId);
  if (!entry || !entry.deployed || !entry.unitId) return;
  confirmModal(`Withdraw ${entry.name} from the map? (Entry remains in OOB, ready to redeploy.)`).then(ok => {
    if (!ok) return;
    withdrawUnit(entry.unitId);
    renderOOB(document.getElementById('scenContent'), entry.side);
  });
}

function deployOOBEntry(entryId, latlng) {
  const entry = findOOBEntry(entryId);
  if (!entry || entry.type !== 'unit') return null;
  const tmpl = state.unitTemplates.find(t => t.id === entry.templateId);
  if (!tmpl) { alert('Template not found'); return null; }
  const unit = createUnitFromTemplate(tmpl, latlng, entry.side, {
    oobEntryId: entry.id,
    name: entry.name,
    designation: entry.designation,
    description: entry.description,
    states: cloneDeep(entry.states),
    notes: entry.notes || '',
    customSVG: entry.customSVG
  });
  entry.deployed = true;
  entry.unitId = unit.id;
  logCommitted(`Unit deployed: ${unit.name}${unit.designation?' '+unit.designation:''} (${entry.side})`);
  return unit;
}

function updateTemplateField(id, field, value) {

// ─── Modifier Library (Scenario Builder → Modifiers tab) ─────────────────
// Lists every modifier in the scenario library; allows editing each, adding new, deleting.
// Modifiers combine with units via state.scenario.modifiers (the library) and
// unit.modifiers (instances on a specific unit).
function renderScenModifiers(c) {
  let html = `<div class="section-head">Modifier Library</div>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">
      Modifiers are overlays applied to units (on top of the unit's active state). Boolean
      modifiers are on/off; counter modifiers have sequential levels a player can advance
      (e.g. ATGM shots 2 → 1). Each unit template can whitelist which modifiers are relevant.
    </p>`;
  const mods = (state.scenario.modifiers || []).slice().sort((a,b) => (a.stackPriority||99) - (b.stackPriority||99));
  if (mods.length === 0) {
    html += `<p style="font-size:11px;color:var(--text-dim)">No modifiers yet. Add one below.</p>`;
  }
  mods.forEach(m => {
    const typeLabel = m.type === 'counter' ? `${(m.levels||[]).length}-level counter` : 'boolean';
    const sample = m.type === 'counter' && m.levels && m.levels.length
      ? m.levels.map(l => esc(l.abbr)).join(' → ') : esc(m.abbr || '');
    html += `<div class="list-item">
      <span class="name"><b>${esc(m.name)}</b> <span style="font-size:10px;color:var(--text-dim)">(${esc(m.abbr||'')})</span></span>
      <span class="meta" style="font-size:10px">${typeLabel} · ${sample}</span>
      <button class="small" onclick="openModifierEditor('${m.id}')">Edit</button>
      <button class="small danger" onclick="deleteModifierDef('${m.id}')">×</button>
    </div>`;
  });
  html += `<div class="btn-row" style="margin-top:8px">
    <button onclick="openModifierEditor(null)">+ Add Modifier</button>
    <button class="ghost" onclick="resetModifierLibraryToDefaults()" title="Replace the current library with the Battlegroup Clash defaults">Reset to BGC Defaults</button>
  </div>`;
  c.innerHTML = html;
}

function deleteModifierDef(id) {
  confirmModal('Delete this modifier from the scenario library? Units currently using it will keep their instances but may render without an icon.').then(ok => {
    if (!ok) return;
    state.scenario.modifiers = state.scenario.modifiers.filter(m => m.id !== id);
    renderScenModifiers(document.getElementById('scenContent'));
    renderAllUnits();
  });
}

function resetModifierLibraryToDefaults() {
  confirmModal('Replace the current modifier library with the Battlegroup Clash defaults? Current custom modifiers will be lost.').then(ok => {
    if (!ok) return;
    state.scenario.modifiers = defaultModifierLibrary();
    renderScenModifiers(document.getElementById('scenContent'));
    renderAllUnits();
  });
}

// Modifier add/edit modal. If id is null → creating new; otherwise editing by id.
function openModifierEditor(id) {
  const existing = id ? findModifierDef(id) : null;
  const m = existing ? cloneDeep(existing) : {
    id: 'mod_' + Math.random().toString(36).slice(2, 8),
    name: '', abbr: '',
    description: '',
    type: 'boolean',
    color: '#888',
    iconSVG: '',
    levels: [
      { abbr: 'A', label: '', color: '#888', iconSVG: '' },

    addPermission: 'owner', removePermission: 'owner', stepPermission: 'owner'
  };
  const overlay = showModal(renderModifierEditorHTML(m, !!existing));
  wireModifierEditor(overlay, m, !!existing);
}
